<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Fordulás elemző</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; margin: 20px; }

#stateBox {
    padding: 10px;
    margin: 10px 0;
    font-weight: bold;
    width: 200px;
    text-align: center;
    border-radius: 8px;
}

.ALAP { background: #4caf50; color: white; }
.BALRA_FORDUL { background: #f44336; color: white; }
.JOBBRA_FORDUL { background: #2196f3; color: white; }
</style>
</head>
<body>

<h2>Fordulás elemzés</h2>

<input type="file" id="fileInput">

<div id="stateBox" class="ALAP">ALAP</div>

<input type="range" id="slider" min="0" value="0">

<canvas id="chart"></canvas>

<script>
let data = [];
let currentState = "ALAP";

const ctx = document.getElementById("chart").getContext("2d");

let chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [
            {
                label: "YawDelta",
                data: [],
                borderColor: "red",
                yAxisID: "y"
            },
            {
                label: "Intenzitas",
                data: [],
                borderColor: "blue",
                yAxisID: "y1"
            }
        ]
    },
    options: {
        responsive: true,
        scales: {
            y: { type: 'linear', position: 'left' },
            y1: { type: 'linear', position: 'right' }
        }
    }
});

// --- ÁLLAPOTGÉP (SZIGORÚ LOGIKA) ---
function nextState(current, row) {
    const dir = row.OUTPUT_TurnState;

    if (current === "ALAP") {
        if (dir === "BALRA") return "BALRA_FORDUL";
        if (dir === "JOBBRA") return "JOBBRA_FORDUL";
        return "ALAP";
    }

    if (current === "BALRA_FORDUL") return "ALAP";
    if (current === "JOBBRA_FORDUL") return "ALAP";

    return "ALAP";
}

function updateUI(index) {
    const row = data[index];

    currentState = nextState(currentState, row);

    const box = document.getElementById("stateBox");
    box.className = currentState;
    box.innerText = currentState;

    // highlight chart point
    chart.setActiveElements([
        { datasetIndex: 0, index: index },
        { datasetIndex: 1, index: index }
    ]);
}

// --- CSV PARSER ---
function parseCSV(text) {
    const lines = text.trim().split("\n");
    const header = lines[0].split(",");

    data = lines.slice(1).map(l => {
        const cols = l.split(",");
        let obj = {};
        header.forEach((h, i) => obj[h.trim()] = cols[i]);
        return obj;
    });

    chart.data.labels = data.map(d => d.Time_ms);
    chart.data.datasets[0].data = data.map(d => parseFloat(d.Calc_YawDelta));
    chart.data.datasets[1].data = data.map(d => parseFloat(d.Calc_Intenzitas));

    chart.update();

    document.getElementById("slider").max = data.length - 1;
}

// --- FILE LOAD ---
document.getElementById("fileInput").addEventListener("change", e => {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = ev => parseCSV(ev.target.result);
    reader.readAsText(file);
});

// --- SLIDER ---
document.getElementById("slider").addEventListener("input", e => {
    updateUI(parseInt(e.target.value));
});
</script>

</body>
</html>
