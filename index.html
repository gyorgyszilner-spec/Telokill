<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fal-Kép Motor v7.2.2</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}

.keret {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
}

#allapot {
    font-size: 34px;
    font-weight: bold;
    color: #00ffcc;
}

#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    width: 92%;
    max-width: 440px;
}

#verzio { opacity: 0.7; }
</style>
</head>

<body>

<div class="keret">
    <button id="inditas">Falhoz kalibrálás</button>
    <div id="verzio">v7.2.2</div>
    <div id="allapot">VÁRAKOZÁS</div>
    <div id="panel">NYOMD A FALHOZ</div>
</div>

<script>
const VERZIÓ = "v7.2.2";
let fut = false;

// Nyers és szűrt adatok (V7.2)
let ax = 0, ay = 0, az = 0;
let rax = 0, ray = 0, raz = 0;

// Állapotok (V7.2)
let dontes = "SEMMI";
let fuggoleges = "SEMMI";

/* =========================================================================
   JÁRÁS / FUTÁS ÉS ZÁROLÁS VÁLTOZÓI
   ========================================================================= */
let utolsoLepesIdo = 0;
let lepesIdokozok = [];
let utolsoGyorsulasZ = 0;
let utolsoMozgasIdo = 0;
let mozgásÁllapot = "STOP";
let mozgásZárolva = false;

// Szenzor engedélyezés (V7.2)
async function engedely() {
    try {
        if (typeof DeviceMotionEvent !== 'undefined' && DeviceMotionEvent.requestPermission) {
            const r = await DeviceMotionEvent.requestPermission();
            return r === "granted";
        }
        return true;
    } catch {
        return false;
    }
}

// Indítás és Kalibráció (V7.2)
document.getElementById("inditas").onclick = async () => {
    const ok = await engedely();
    if (!ok) {
        alert("Szenzor hozzáférés megtagadva!");
        return;
    }

    document.getElementById("allapot").textContent = "KALIBRÁLÁS...";
    window.addEventListener("devicemotion", szenzor);

    setTimeout(() => {
        rax = ax;
        ray = ay;
        raz = az;
        fut = true;
        document.getElementById("allapot").textContent = "ALAP";
    }, 1500);
};

function szenzor(e) {
    const a = e.accelerationIncludingGravity || {x:0, y:0, z:0};
    
    // Marad a 70/30-as gyári szűrő, hogy a dőlések ne változzanak
    ax = ax * 0.7 + a.x * 0.3;
    ay = ay * 0.7 + a.y * 0.3;
    az = az * 0.7 + a.z * 0.3;

    if (fut) {
        detectLepes(az - raz);
        feldolgoz();
    }
}

/* =========================================================================
   VALÓDI HOLTTÉR ÉS HISZTERÉZIS ÁLLAPONGÉP (V7.2)
   ========================================================================= */
function vizsgalAllapot(ertek, jelenlegiState, negNev, posNev, beKuszob, kiKuszob) {
    if (jelenlegiState === "SEMMI") {
        if (ertek > beKuszob) return posNev;
        if (ertek < -beKuszob) return negNev;
        return "SEMMI";
    }
    if (jelenlegiState === posNev) {
        if (ertek < kiKuszob) return "SEMMI";
        return posNev;
    }
    if (jelenlegiState === negNev) {
        if (ertek > -kiKuszob) return "SEMMI";
        return negNev;
    }
    return "SEMMI";
}

/* =========================================================================
   FINOMHANGOLT LÉPÉSDETEKTOR (GIMBAL ELLENI VÉDELEM)
   ========================================================================= */
function detectLepes(jelenlegiDz) {
    const most = performance.now();
    
    // 🔥 FINOMÍTÁS: Küszöb leengedve 1.6-ról 0.8 m/s²-re! 
    // Így a kéz által letompított mikro-rázkódásokat is stabilan észreveszi.
    if (Math.abs(jelenlegiDz) > 0.8 && Math.abs(utolsoGyorsulasZ) <= 0.8) {
        // Minimális időköz két toporgás között (180ms-ra szűkítve a gyors helybenfutáshoz)
        if (most - utolsoLepesIdo > 180) {
            const idokoz = most - utolsoLepesIdo;
            utolsoLepesIdo = most;
            utolsoMozgasIdo = most;

            lepesIdokozok.push(idokoz);
            if (lepesIdokozok.length > 3) lepesIdokozok.shift();
        }
    }
    utolsoGyorsulasZ = jelenlegiDz;
}

function feldolgoz() {
    const most = performance.now();

    // 1. LÉPÉSRITMUS ÉS SEBESSÉG ELŐ-KIÉRTÉKELÉSE
    let aktualisSebesseg = "STOP";
    
    // 🔥 FINOMÍTÁS: Megnövelt időablak (650ms helyett 950ms)!
    // Ha a kéz tompítása miatt kimarad egy lépés, a mozgás állapota nem esik szét azonnal.
    if (most - utolsoMozgasIdo < 950 && lepesIdokozok.length > 0) {
        const atlagIdokoz = lepesIdokozok.reduce((a, b) => a + b, 0) / lepesIdokozok.length;
        
        if (lepesIdokozok.length >= 2) {
            // Helyben toporgásnál a ritmus tágabb, így a futás határa 450ms-ra lett igazítva
            aktualisSebesseg = (atlagIdokoz < 450) ? "FUTÁS" : "JÁRÁS";
        }
    } else {
        lepesIdokozok = [];
    }

    /* =========================================================================
       ZÁROLÁSI LOGIKA (RETESZ)
       ========================================================================= */
    if (mozgásZárolva) {
        if (aktualisSebesseg === "STOP") {
            mozgásZárolva = false;
            mozgásÁllapot = "STOP";
        } else {
            mozgásÁllapot = aktualisSebesseg;
        }
    }

    // 2. STATIKUS ÁLLAPOTOK (V7.2)
    const aktualisSzog = Math.atan2(ax, ay) * 180 / Math.PI;
    const kalibraltSzog = Math.atan2(rax, ray) * 180 / Math.PI;
    
    let dolesElteres = aktualisSzog - kalibraltSzog;
    if (dolesElteres > 180) dolesElteres -= 360;
    if (dolesElteres < -180) dolesElteres += 360;

    const dz = az - raz;

    if (!mozgásZárolva) {
        // Gyári v7.2-es stabil határértékek megtartása
        dontes = vizsgalAllapot(dolesElteres, dontes, "JOBB", "BAL", 22, 10);
        fuggoleges = vizsgalAllapot(dz, fuggoleges, "EMELÉS", "GUGGOLÁS", 3.2, 1.0);

        if (dontes === "SEMMI" && fuggoleges === "SEMMI" && aktualisSebesseg !== "STOP") {
            mozgásZárolva = true;
            mozgásÁllapot = aktualisSebesseg;
        }
    }

    // 3. MEGJELENÍTÉS ÉS HIERARCHIA (V7.2)
    let kijelzendoAllapot = "ALAP";
    
    if (mozgásZárolva) {
        kijelzendoAllapot = mozgásÁllapot;
    } else if (fuggoleges !== "SEMMI") {
        kijelzendoAllapot = fuggoleges;
    } else if (dontes !== "SEMMI") {
        kijelzendoAllapot = "DÖNTÉS " + dontes;
    }

    document.getElementById("allapot").textContent = kijelzendoAllapot;

    // Debug panel frissítve a pontos mikro-értékekkel
    document.getElementById("panel").textContent =
        "VERZIÓ: " + VERZIÓ + "\n\n" +
        "DÖNTÉS STÁTUSZ: " + dontes + "\n" +
        "FÜGGŐLEGES STÁTUSZ: " + fuggoleges + "\n" +
        "MOZGÁS STÁTUSZ: " + mozgásÁllapot + "\n" +
        "ÁTLAG RITMUS: " + (lepesIdokozok.length > 0 ? (lepesIdokozok.reduce((a,b)=>a+b,0)/lepesIdokozok.length).toFixed(0) + " ms" : "0 ms") + "\n\n" +
        "DŐLÉS ELTÉRÉS (fok): " + dolesElteres.toFixed(1) + "°\n" +
        "DZ (gyorsulás delta): " + dz.toFixed(2) + " m/s²";
}
</script>

</body>
</html>
