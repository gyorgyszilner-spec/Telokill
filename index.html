<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAR Motion Controller</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<style>
  body { margin:0; background:#111; color:#0f0; font-family:monospace; }
  #state {
    margin-top:40vh;
    text-align:center;
    font-size:32px;
  }
</style>
</head>
<body>

<div id="state">Betöltés…</div>

<script>
let stateDiv = document.getElementById("state");
let imuWindow = [];
let model = null;

// 1) Modell betöltése
async function loadModel() {
  stateDiv.innerText = "Modell betöltése…";
  model = await tf.loadLayersModel("har_model/model.json");
  stateDiv.innerText = "Készen áll.";
}
loadModel();

// 2) IMU gyűjtés
window.addEventListener("devicemotion", (e) => {
  const a = e.accelerationIncludingGravity;
  const g = e.rotationRate;
  if (!a || !g) return;

  imuWindow.push([
    a.x || 0, a.y || 0, a.z || 0,
    g.alpha || 0, g.beta || 0, g.gamma || 0
  ]);

  if (imuWindow.length > 100) imuWindow.shift();
});

// 3) Állapotdetektálás
function classify() {
  if (!model || imuWindow.length < 100) return;

  const input = tf.tensor([imuWindow]);
  const logits = model.predict(input);
  const probs = logits.dataSync();

  const labels = ["alapállapot", "sétál", "fut", "ugrás", "leguggol"];

  let maxIdx = 0;
  for (let i = 1; i < probs.length; i++) {
    if (probs[i] > probs[maxIdx]) maxIdx = i;
  }

  stateDiv.innerText = labels[maxIdx];

  input.dispose();
  logits.dispose();
}

// 4) Loop
setInterval(classify, 300);
</script>

</body>
</html>
