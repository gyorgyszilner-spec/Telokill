<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motion Gamepad Prototype v2</title>
<style>
  body { margin:0; overflow:hidden; background:#222; }

  /* JÁTÉKTÉR */
  #ground {
    position:absolute;
    bottom:0;
    left:0;
    width:100vw;
    height:40vh;
    background:#444;
  }

  #player {
    position:absolute;
    width:50px;
    height:50px;
    background:#0f0;
    left:50vw;
    top:50vh;
    transform:translate(-50%, -50%);
  }

  /* HUD OVERLAY */
  #hud {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#0007;
    color:#0f0;
    font-family:monospace;
    padding:5px 10px;
    font-size:12px;
    pointer-events:none;
  }
</style>
</head>
<body>

<div id="ground"></div>
<div id="player"></div>
<div id="hud">Initializing sensors…</div>

<script>
let player = document.getElementById("player");
let hud = document.getElementById("hud");

let posX = window.innerWidth / 2;
let posY = window.innerHeight * 0.6;

let forwardIntensity = 0;   // 0..1
let leanLeft = false;
let leanRight = false;
let jump = false;
let crouch = false;

// --- STEP DETECTION ---
let lastAccelZ = 0;
let stepTimer = 0;
let stepFrequency = 0;

// --- JUMP DETECTION ---
let jumpCooldown = 0;

// --- ORIENTATION ---
let pitch = 0;
let roll = 0;
let yaw = 0;

// --- MOTION EVENTS ---
window.addEventListener("devicemotion", (e) => {
    const a = e.accelerationIncludingGravity;
    if (!a) return;

    const z = a.z;
    const dz = Math.abs(z - lastAccelZ);
    lastAccelZ = z;

    // Step detection
    if (dz > 1.2) {
        const now = performance.now();
        const diff = now - stepTimer;
        stepTimer = now;
        stepFrequency = 1000 / diff;

        if (stepFrequency > 1 && stepFrequency < 3.5) {
            forwardIntensity = Math.min(stepFrequency / 3.5, 1);
        }
    }

    // Jump detection
    if (jumpCooldown <= 0 && dz > 6) {
        jump = true;
        jumpCooldown = 800;
    }

    // Crouch detection
    crouch = (pitch > 30 && z < -2);
});

window.addEventListener("deviceorientation", (e) => {
    pitch = e.beta;
    roll = e.gamma;
    yaw = e.alpha;

    leanLeft = roll < -15;
    leanRight = roll > 15;
});

// --- GAME LOOP ---
function loop(dt) {
    // Forward movement
    posY -= forwardIntensity * 4;

    // Lean left/right
    if (leanLeft) posX -= 3;
    if (leanRight) posX += 3;

    // Jump
    if (jump) {
        posY -= 40;
        jump = false;
    }

    // Gravity
    posY += 2;

    // Ground collision
    const groundLevel = window.innerHeight * 0.6;
    if (posY > groundLevel) posY = groundLevel;

    // Crouch
    player.style.height = crouch ? "25px" : "50px";

    // Clamp
    posX = Math.max(0, Math.min(window.innerWidth - 50, posX));

    // Render
    player.style.left = posX + "px";
    player.style.top = posY + "px";

    // HUD
    hud.innerText =
        "forwardIntensity: " + forwardIntensity.toFixed(2) + " | " +
        "leanLeft: " + leanLeft + " | " +
        "leanRight: " + leanRight + " | " +
        "pitch: " + pitch.toFixed(1) + " | " +
        "roll: " + roll.toFixed(1) + " | " +
        "stepFreq: " + stepFrequency.toFixed(2) + " Hz";

    // Cooldowns
    if (jumpCooldown > 0) jumpCooldown -= dt;

    requestAnimationFrame(() => loop(16));
}

loop(16);
</script>

</body>
</html>
