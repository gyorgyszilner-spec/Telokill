<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontroller Debug V3 (HU)</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}

.wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 15px;
}

#allapot {
    font-size: 28px;
    font-weight: bold;
    color: #00ffcc;
}

#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    width: 85%;
    max-width: 420px;
}
</style>
</head>

<body>

<div class="wrap">

    <button id="startBtn">Szenzor indítása</button>

    <div id="allapot">KÉSZENLÉT</div>

    <div id="panel">VÁRAKOZÁS SZENZORRA...</div>

</div>

<script>

/* =========================
   ALAP ÁLLAPOT
========================= */
let fut = false;

let beta = 0, gamma = 0;

let alapBeta = null;
let alapGamma = null;
let kalibracioDb = 0;

/* =========================
   LÉPÉS RENDSZER
========================= */
let utolsoMag = 0;
let lepesIdok = [];
const ABLAK = 2000;

/* =========================
   UI
========================= */
const allapotEl = document.getElementById("allapot");
const panel = document.getElementById("panel");
const startBtn = document.getElementById("startBtn");

/* =========================
   ENGEDÉLY
========================= */
async function engedely() {

    try {

        if (DeviceMotionEvent?.requestPermission) {
            const r = await DeviceMotionEvent.requestPermission();
            if (r !== "granted") return false;
        }

        if (DeviceOrientationEvent?.requestPermission) {
            const r = await DeviceOrientationEvent.requestPermission();
            if (r !== "granted") return false;
        }

        return true;

    } catch {
        return false;
    }
}

/* =========================
   INDÍTÁS
========================= */
startBtn.onclick = async () => {

    const ok = await engedely();

    if (!ok) {
        allapotEl.textContent = "NINCS ENGEDÉLY";
        return;
    }

    window.addEventListener("deviceorientation", ori);
    window.addEventListener("devicemotion", mozgas);

    fut = true;
    allapotEl.textContent = "FUT";
};

/* =========================
   SZENZOR
========================= */
function ori(e) {

    if (!fut) return;

    beta = e.beta || 0;
    gamma = e.gamma || 0;
}

function mozgas(e) {

    if (!fut) return;

    const a = e.acceleration || {};
    const mag = Math.sqrt((a.x||0)**2 + (a.y||0)**2 + (a.z||0)**2);

    feldolgoz(mag, beta, gamma);
}

/* =========================
   LÉPÉS DETEKTOR
========================= */
function lepesDetektal(mag) {

    const kuszob = 1.1;

    const csucs = (mag > kuszob && utolsoMag <= kuszob);

    utolsoMag = mag;

    if (csucs) {

        const most = Date.now();
        lepesIdok.push(most);

        lepesIdok = lepesIdok.filter(t => most - t < ABLAK);
    }
}

/* =========================
   MOZGÁS SZÁMÍTÁS
========================= */
function mozgasAllapot() {

    const db = lepesIdok.length;

    if (db >= 6) return "FUTÁS";
    if (db >= 2) return "SÉTA";
    return "ÁLL";
}

/* =========================
   FŐ LOGIKA
========================= */
function feldolgoz(mag, b, g) {

    /* --- KALIBRÁCIÓ --- */
    if (alapBeta === null && kalibracioDb < 30) {

        alapBeta = (alapBeta || 0) + b;
        alapGamma = (alapGamma || 0) + g;

        kalibracioDb++;

        if (kalibracioDb === 30) {
            alapBeta /= 30;
            alapGamma /= 30;
        }

        allapotEl.textContent = "KALIBRÁLÁS";
        return;
    }

    const dDőlés = g - alapGamma;
    const dGuggolás = b - alapBeta;

    /* --- MÓD --- */
    let mod = "ÁLLÁS";

    if (dGuggolás < -20) mod = "GUGGOL";
    else if (Math.abs(dDőlés) > 30) mod = "DŐLÉS";

    /* --- LÉPÉS --- */
    lepesDetektal(mag);
    const mozgas = mozgasAllapot();

    /* --- FORDULÁS --- */
    let fordulas = 0;

    if (mod === "ÁLLÁS") {
        if (Math.abs(dDőlés) > 25) {
            fordulas = Math.max(-1, Math.min(1, dDőlés / 60));
        }
    }

    /* --- KIJELZÉS --- */
    allapotEl.textContent = mod;

    panel.textContent =
        "ÁLLAPOT: " + mod + "\n" +
        "MOZGÁS: " + mozgas + "\n" +
        "FORDULÁS: " + fordulas.toFixed(2) + "\n\n" +
        "LÉPÉSEK (2s): " + lepesIdok.length + "\n" +
        "DŐLÉS: " + dDőlés.toFixed(1) + "\n" +
        "GUGGOLÁS: " + dGuggolás.toFixed(1) + "\n" +
        "MAG: " + mag.toFixed(2);
}

</script>

</body>
</html>
