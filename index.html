<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motion Gamepad Prototype</title>
<style>
  body { margin:0; overflow:hidden; background:#111; }
  #player {
    position:absolute;
    width:50px;
    height:50px;
    background:#0f0;
    left:50vw;
    top:50vh;
    transform:translate(-50%, -50%);
  }
  #log {
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#0008;
    color:#0f0;
    font-family:monospace;
    padding:10px;
    font-size:14px;
  }
</style>
</head>
<body>

<div id="player"></div>
<div id="log">Waiting for motion...</div>

<script>
let player = document.getElementById("player");
let log = document.getElementById("log");

let posX = window.innerWidth / 2;
let posY = window.innerHeight / 2;

let forwardIntensity = 0;   // 0..1
let leanLeft = false;
let leanRight = false;
let jump = false;
let crouch = false;

// --- STEP DETECTION ---
let lastAccelZ = 0;
let stepTimer = 0;
let stepFrequency = 0;

// --- JUMP DETECTION ---
let jumpCooldown = 0;

// --- ORIENTATION ---
let pitch = 0;
let roll = 0;
let yaw = 0;

// --- MOTION EVENTS ---
window.addEventListener("devicemotion", (e) => {
    const a = e.accelerationIncludingGravity;
    if (!a) return;

    // Step detection (walk/run)
    const z = a.z;
    const dz = Math.abs(z - lastAccelZ);
    lastAccelZ = z;

    if (dz > 1.2) { // peak
        const now = performance.now();
        const diff = now - stepTimer;
        stepTimer = now;
        stepFrequency = 1000 / diff; // Hz

        if (stepFrequency > 1 && stepFrequency < 3.5) {
            forwardIntensity = Math.min(stepFrequency / 3.5, 1);
        }
    }

    // Jump detection
    if (jumpCooldown <= 0 && dz > 6) {
        jump = true;
        jumpCooldown = 800; // ms
    }

    // Crouch detection (pitch forward + low Z)
    if (pitch > 30 && z < -2) {
        crouch = true;
    } else {
        crouch = false;
    }
});

window.addEventListener("deviceorientation", (e) => {
    pitch = e.beta;   // up/down
    roll = e.gamma;   // left/right tilt
    yaw = e.alpha;    // turn

    leanLeft = roll < -15;
    leanRight = roll > 15;
});

// --- GAME LOOP ---
function loop(dt) {
    // Move forward
    posY -= forwardIntensity * 4;

    // Lean left/right
    if (leanLeft) posX -= 3;
    if (leanRight) posX += 3;

    // Jump impulse
    if (jump) {
        posY -= 40;
        jump = false;
    }

    // Crouch
    if (crouch) {
        player.style.height = "25px";
    } else {
        player.style.height = "50px";
    }

    // Clamp
    posX = Math.max(0, Math.min(window.innerWidth - 50, posX));
    posY = Math.max(0, Math.min(window.innerHeight - 50, posY));

    // Render
    player.style.left = posX + "px";
    player.style.top = posY + "px";

    // Log
    log.innerText =
        "forwardIntensity: " + forwardIntensity.toFixed(2) + "\n" +
        "leanLeft: " + leanLeft + "\n" +
        "leanRight: " + leanRight + "\n" +
        "pitch: " + pitch.toFixed(1) + "\n" +
        "roll: " + roll.toFixed(1) + "\n" +
        "yaw: " + yaw.toFixed(1) + "\n" +
        "stepFrequency: " + stepFrequency.toFixed(2) + " Hz\n";

    // Cooldowns
    if (jumpCooldown > 0) jumpCooldown -= dt;

    requestAnimationFrame(() => loop(16));
}

loop(16);
</script>

</body>
</html>
