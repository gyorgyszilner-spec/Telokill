<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helyzetdetektor v1.0.0</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}

.wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 15px;
}

#allapot {
    font-size: 30px;
    font-weight: bold;
    color: #00ffcc;
}

#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    width: 90%;
    max-width: 420px;
}
</style>
</head>

<body>

<div class="wrap">

    <button id="startBtn">Szenzor indítása</button>

    <div id="verzio">v1.0.0</div>

    <div id="allapot">VÁRAKOZÁS</div>

    <div id="panel">NINCS ADAT</div>

</div>

<script>

/* =========================
   VERZIÓ
========================= */
const VERZIO = "v1.0.0";

/* =========================
   SZENZOR ADATOK
========================= */
let fut = false;

let beta = 0;
let gamma = 0;

let alapBeta = null;
let alapGamma = null;
let kalibracioDb = 0;

/* =========================
   UI
========================= */
const allapotEl = document.getElementById("allapot");
const panel = document.getElementById("panel");
const verzioEl = document.getElementById("verzio");
const startBtn = document.getElementById("startBtn");

verzioEl.textContent = "VERZIÓ: " + VERZIO;

/* =========================
   ENGEDÉLY
========================= */
async function engedely() {

    try {

        if (DeviceMotionEvent?.requestPermission) {
            const r = await DeviceMotionEvent.requestPermission();
            if (r !== "granted") return false;
        }

        if (DeviceOrientationEvent?.requestPermission) {
            const r = await DeviceOrientationEvent.requestPermission();
            if (r !== "granted") return false;
        }

        return true;

    } catch {
        return false;
    }
}

/* =========================
   INDÍTÁS
========================= */
startBtn.onclick = async () => {

    const ok = await engedely();

    if (!ok) {
        allapotEl.textContent = "NINCS ENGEDÉLY";
        return;
    }

    window.addEventListener("deviceorientation", onOri);

    fut = true;
    allapotEl.textContent = "INDUL";
};

/* =========================
   SZENZOR
========================= */
function onOri(e) {

    if (!fut) return;

    beta = e.beta || 0;   // előre-hátra dőlés
    gamma = e.gamma || 0; // oldal dőlés

    process();
}

/* =========================
   KALIBRÁCIÓ
========================= */
function kalibral() {

    if (kalibracioDb < 30) {

        alapBeta = (alapBeta || 0) + beta;
        alapGamma = (alapGamma || 0) + gamma;

        kalibracioDb++;

        if (kalibracioDb === 30) {
            alapBeta /= 30;
            alapGamma /= 30;
        }

        return false;
    }

    return true;
}

/* =========================
   ÁLLAPOT DETEKTOR
========================= */
function getAllapot(dBeta, dGamma) {

    /* 1. LEGGUGGOLT */
    if (dBeta < -35) {
        return "LEGGUGGOLT ÁLLAPOT";
    }

    /* 2. FÖNTÖTT (döntött a padlóhoz képest) */
    if (Math.abs(dGamma) > 25) {
        return "FÖNTÖTT ÁLLAPOT";
    }

    /* 3. ALAP */
    return "ALAPÁLLAPOT";
}

/* =========================
   FŐ LOGIKA
========================= */
function process() {

    if (!kalibral()) {
        allapotEl.textContent = "KALIBRÁLÁS...";
        return;
    }

    const dBeta = beta - alapBeta;
    const dGamma = gamma - alapGamma;

    const allapot = getAllapot(dBeta, dGamma);

    allapotEl.textContent = allapot;

    panel.textContent =
        "VERZIÓ: " + VERZIO + "\n\n" +
        "BETA: " + beta.toFixed(1) + "\n" +
        "GAMMA: " + gamma.toFixed(1) + "\n\n" +
        "dBETA: " + dBeta.toFixed(1) + "\n" +
        "dGAMMA: " + dGamma.toFixed(1) + "\n\n" +
        "ÁLLAPOT: " + allapot;
}

</script>

</body>
</html>
