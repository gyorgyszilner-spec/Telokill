<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fal-Kép Motor v1.0.0</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}

.keret {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
}

#allapot {
    font-size: 30px;
    font-weight: bold;
    color: #00ffcc;
}

#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    width: 90%;
    max-width: 420px;
}
</style>
</head>

<body>

<div class="keret">

    <button id="inditas">Szenzor indítása</button>

    <div id="verzio">v1.0.0</div>

    <div id="allapot">VÁRAKOZÁS</div>

    <div id="panel">NINCS ADAT</div>

</div>

<script>

/* =========================
   VERZIÓ
========================= */
const VERZIO = "v1.0.0";

/* =========================
   SZENZOR ADATOK
========================= */
let fut = false;

let beta = 0;   // előre-hátra dőlés
let gamma = 0;  // oldal dőlés

let alapBeta = null;
let alapGamma = null;
let kalibracioDb = 0;

/* =========================
   UI
========================= */
const allapot = document.getElementById("allapot");
const panel = document.getElementById("panel");
const inditas = document.getElementById("inditas");
const verzio = document.getElementById("verzio");

verzio.textContent = "VERZIÓ: " + VERZIO;

/* =========================
   ENGEDÉLY
========================= */
async function engedely() {

    try {

        if (DeviceMotionEvent?.requestPermission) {
            const r = await DeviceMotionEvent.requestPermission();
            if (r !== "granted") return false;
        }

        if (DeviceOrientationEvent?.requestPermission) {
            const r = await DeviceOrientationEvent.requestPermission();
            if (r !== "granted") return false;
        }

        return true;

    } catch {
        return false;
    }
}

/* =========================
   INDÍTÁS
========================= */
inditas.onclick = async () => {

    const ok = await engedely();

    if (!ok) {
        allapot.textContent = "NINCS ENGEDÉLY";
        return;
    }

    window.addEventListener("deviceorientation", szenzor);

    fut = true;
    allapot.textContent = "FUT";
};

/* =========================
   SZENZOR
========================= */
function szenzor(e) {

    if (!fut) return;

    beta = e.beta || 0;
    gamma = e.gamma || 0;

    feldolgoz();
}

/* =========================
   KALIBRÁCIÓ
========================= */
function kalibral() {

    if (kalibracioDb < 30) {

        alapBeta = (alapBeta || 0) + beta;
        alapGamma = (alapGamma || 0) + gamma;

        kalibracioDb++;

        if (kalibracioDb === 30) {
            alapBeta /= 30;
            alapGamma /= 30;
        }

        return false;
    }

    return true;
}

/* =========================
   ÁLLAPOT LOGIKA
========================= */
function allapotSzamitas(ferdeseg, kinyilas) {

    // 🔴 GUGGOLÁS: elválik a faltól
    if (kinyilas > 25) {
        return "GUGGOLÁS";
    }

    // 🟡 DÖNTÖTT: ferde a falon
    if (Math.abs(ferdeseg) > 15) {
        return "DÖNTÖTT";
    }

    // 🟢 ALAP
    return "ALAPÁLLAPOT";
}

/* =========================
   FŐ FOLYAMAT
========================= */
function feldolgoz() {

    if (!kalibral()) {
        allapot.textContent = "KALIBRÁLÁS...";
        return;
    }

    const ferdeseg = gamma - alapGamma;   // falon belüli forgás
    const kinyilas = Math.abs(beta - alapBeta); // falról elválás érzete

    const all = allapotSzamitas(ferdeseg, kinyilas);

    allapot.textContent = all;

    panel.textContent =
        "VERZIÓ: " + VERZIO + "\n\n" +
        "BETA: " + beta.toFixed(1) + "\n" +
        "GAMMA: " + gamma.toFixed(1) + "\n\n" +
        "FERDESÉG: " + ferdeseg.toFixed(1) + "\n" +
        "KINYÍLÁS: " + kinyilas.toFixed(1) + "\n\n" +
        "ÁLLAPOT: " + all;
}

</script>

</body>
</html>
