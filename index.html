<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fal-Kép Játékvezérlő v9.4</title>
<style>
body { margin: 0; font-family: sans-serif; background: #111; color: #fff; }
.keret { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 12px; }
#allapot { font-size: 32px; font-weight: bold; color: #00ffcc; text-align: center; height: 40px; }
#panel { font-family: monospace; white-space: pre; background: #000; padding: 15px; border-radius: 8px; width: 92%; max-width: 440px; }
.gombok { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; width: 100%; max-width: 320px; }
.gomb { background: #222; border: 2px solid #444; padding: 12px; text-align: center; border-radius: 6px; font-weight: bold; color: #666; font-size: 14px; }
.gomb.aktiv { background: #00ffcc; border-color: #fff; color: #000; box-shadow: 0 0 10px #00ffcc; }
#inditas { padding: 15px 30px; font-size: 18px; font-weight: bold; background: #00ffcc; border: none; border-radius: 5px; cursor: pointer; }
</style>
</head>
<body>

<div class="keret">
    <button id="inditas">Falhoz kalibrálás</button>
    <div id="allapot">VÁRAKOZÁS</div>
    
    <div class="gombok">
        <div class="gomb" id="btn_BAL">BAL</div>
        <div class="gomb" id="btn_FEL">FEL (Néz)</div>
        <div class="gomb" id="btn_JOBB">JOBB</div>
        <div class="gomb" id="btn_JAR">JÁR</div>
        <div class="gomb" id="btn_LE">LE (Guggol)</div>
        <div class="gomb" id="btn_FUT">FUT</div>
    </div>

    <div id="panel">NYOMD A FALHOZ ÉS INDÍTSD</div>
</div>

<script>
const VERZIÓ = "v9.4.0";
let fut = false;

// Szenzor és szűrt adatok
let ax = 0, ay = 0, az = 0;
let rax = 0, ray = 0, raz = 0;

let utolsoParancs = "RELEASE";

/* =========================================================================
   LÉPÉSDETEKTOR VÁLTOZÓK
   ========================================================================= */
let utolsoLepesIdo = 0;
let lepesIdokozok = []; 
let utolsoGyorsulasZ = 0;
let lepesSzamlalo = 0;
let utolsoMozgasIdo = 0; 

async function engedely() {
    try {
        if (typeof DeviceMotionEvent !== 'undefined' && DeviceMotionEvent.requestPermission) {
            return await DeviceMotionEvent.requestPermission() === "granted";
        }
        return true;
    } catch { return false; }
}

document.getElementById("inditas").onclick = async () => {
    if (!await engedely()) return alert("Szenzor hozzáférés megtagadva!");
    
    document.getElementById("allapot").textContent = "KALIBRÁLÁS...";
    window.addEventListener("devicemotion", szenzor);

    setTimeout(() => {
        rax = ax; ray = ay; raz = az;
        fut = true;
        document.getElementById("allapot").textContent = "ALAPÁLLAPOT";
        kuldParancs("RELEASE");
    }, 1500);
};

function szenzor(e) {
    const a = e.accelerationIncludingGravity || {x:0, y:0, z:0};
    
    // Simító szűrő megtartása
    ax = ax * 0.75 + a.x * 0.25;
    ay = ay * 0.75 + a.y * 0.25;
    az = az * 0.75 + a.z * 0.25;
    
    if (fut) {
        detectLepes(az - raz);
        feldolgoz();
    }
}

function detectLepes(jelenlegiDz) {
    const most = performance.now();
    
    // Marad a szigorúbb lépésérzékelés, hogy dőléskor ne triggereljen be
    if (Math.abs(jelenlegiDz) > 2.0 && Math.abs(utolsoGyorsulasZ) <= 2.0) {
        if (most - utolsoLepesIdo > 250) {
            const idokoz = most - utolsoLepesIdo;
            utolsoLepesIdo = most;
            utolsoMozgasIdo = most; 
            lepesSzamlalo++;

            lepesIdokozok.push(idokoz);
            if (lepesIdokozok.length > 3) lepesIdokozok.shift();
        }
    }
    utolsoGyorsulasZ = jelenlegiDz;
}

function kuldParancs(parancs) {
    if (utolsoParancs === parancs) return;
    utolsoParancs = parancs;
    console.log("KÜLDVE ->", parancs);
    
    document.querySelectorAll('.gomb').forEach(el => el.classList.remove('aktiv'));
    const aktivGomb = document.getElementById("btn_" + parancs);
    if (aktivGomb) aktivGomb.classList.add('aktiv');
}

/* =========================================================================
   FŐ ÁLLAPONGÉP (KISZÉLESÍTETT ALAPÁLLAPOTTAL ÉS VÁLTÁSI KÜSZÖBÖKKEL)
   ========================================================================= */
function feldolgoz() {
    const most = performance.now();
    const gyorsulasDeltaZ = az - raz;

    // 1. MOZGÁS/SEBESSÉG KIÉRTÉKELÉSE
    let mozgasAllapot = "STOP";
    let atlagIdokoz = 0;

    if (most - utolsoMozgasIdo < 600 && lepesIdokozok.length > 0 && Math.abs(gyorsulasDeltaZ) > 0.8) {
        atlagIdokoz = lepesIdokozok.reduce((a, b) => a + b, 0) / lepesIdokozok.length;
        if (atlagIdokoz < 420) {
            mozgasAllapot = "FUT";
        } else {
            mozgasAllapot = "JAR";
        }
    } else {
        lepesIdokozok = [];
    }

    // 2. TENGELYELTÉRÉSEK KISZÁMÍTÁSA FOKBAN
    const aktSzogX = Math.atan2(ax, ay) * 180 / Math.PI;
    const kalSzogX = Math.atan2(rax, ray) * 180 / Math.PI;
    let dolesX = aktSzogX - kalSzogX;
    if (dolesX > 180) dolesX -= 360;
    if (dolesX < -180) dolesX += 360;

    const aktSzogZ = Math.atan2(az, ay) * 180 / Math.PI;
    const kalSzogZ = Math.atan2(raz, ray) * 180 / Math.PI;
    let dolesZ = aktSzogZ - kalSzogZ;
    if (dolesZ > 180) dolesZ -= 360;
    if (dolesZ < -180) dolesZ += 360;

    /* =========================================================================
       ÚJ, KISZÉLESÍTETT DEAD ZONE (HOLTTÉR) ÉS HISZTERÉZIS HATÁROK
       ========================================================================= */
    
    // GUGGOLÁS (Z hirtelen elmozdulás delta)
    // 3.2 m/s² felett vált lefelé, 1.2 m/s² felett tartja meg
    const isGuggol = gyorsulasDeltaZ > 3.2 || (utolsoParancs === "LE" && gyorsulasDeltaZ > 1.2);

    // FELFELÉ NÉZÉS (Z dőlésszög)
    // 🔥 NAGYON MEGEMELVE: Csak 26 fok feletti bólintásra vált be, és 12 fok alatt enged fel!
    const isFelNez = dolesZ > 26 || (utolsoParancs === "FEL" && dolesZ > 12);

    // TÖRZSDÖNTÉS BALRA ÉS JOBBRA (X dőlésszög)
    // Kiszélesítve: 18 fok felett dől be, 9 fok alatt esik vissza alapra
    const isBalraDolt = dolesX < -18 || (utolsoParancs === "BAL" && dolesX < -9);
    const isJobbraDolt = dolesX > 18 || (utolsoParancs === "JOBB" && dolesX > 9);

    /* =========================================================================
       PRIORITÁSI KIÉRTÉKELÉS
       ========================================================================= */
    
    // Ha aktív a mozgás, az zárol mindent
    if (mozgasAllapot === "FUT") {
        document.getElementById("allapot").textContent = "🏃 FUTÁS";
        kuldParancs("FUT");
    } 
    else if (mozgasAllapot === "JAR") {
        document.getElementById("allapot").textContent = "🚶 JÁRÁS";
        kuldParancs("JAR");
    } 
    // Ha nincs mozgás, jöhetnek a statikus pózok
    else if (isGuggol) {
        document.getElementById("allapot").textContent = "GUGGOLÁS / LE";
        kuldParancs("LE");
    } else if (isFelNez) {
        document.getElementById("allapot").textContent = "FELFELÉ NÉZ / FEL";
        kuldParancs("FEL");
    } else if (isBalraDolt) {
        document.getElementById("allapot").textContent = "TÖRZSDÖNTÉS BALRA";
        kuldParancs("BAL");
    } else if (isJobbraDolt) {
        document.getElementById("allapot").textContent = "TÖRZSDÖNTÉS JOBBRA";
        kuldParancs("JOBB");
    } 
    // TÁGAS, BIZTONSÁGOS ALAPÁLLAPOT (Ha senki sem lépte át a megnövelt holtteret)
    else {
        document.getElementById("allapot").textContent = "ALAP (ÁLL ÉS ELŐRE NÉZ)";
        kuldParancs("RELEASE");
    }

    // Telemetria panel
    document.getElementById("panel").textContent =
        "UTOLSÓ PARANCS:   " + utolsoParancs + "\n" +
        "MOZGÁSÁLLAPOT:    " + mozgasAllapot + "\n" +
        "LÉPÉSRITMUS (ms): " + (atlagIdokoz > 0 ? atlagIdokoz.toFixed(0) + " ms" : "0") + "\n\n" +
        "X (Bal/Jobb fok): " + dolesX.toFixed(1) + "°\n" +
        "Z (Fel/Le fok):   " + dolesZ.toFixed(1) + "°\n" +
        "Guggolás delta:   " + gyorsulasDeltaZ.toFixed(2) + " m/s²";
}
</script>

</body>
</html>
