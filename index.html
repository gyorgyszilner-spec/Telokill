<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fal-Kép Motor v4.0</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}

.keret {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
}

#allapot {
    font-size: 32px;
    font-weight: bold;
    color: #00ffcc;
}

#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    width: 90%;
    max-width: 420px;
}

#verzio {
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="keret">

    <button id="inditas">Falhoz kalibrálás</button>

    <div id="verzio">v4.0.0</div>

    <div id="allapot">VÁRAKOZÁS</div>

    <div id="panel">NYOMD A FALHOZ</div>

</div>

<script>

/* =========================
   VERZIÓ
========================= */
const VERZIÓ = "v4.0.0";

/* =========================
   SZENZOR
========================= */
let fut = false;

/* gravitáció vektor */
let gx = 0, gy = 0, gz = 0;

/* referencia (falhoz nyomott állapot) */
let rgx = 0, rgy = 0, rgz = 0;

/* =========================
   UI
========================= */
const allapotEl = document.getElementById("allapot");
const panel = document.getElementById("panel");
const inditas = document.getElementById("inditas");

/* =========================
   ENGEDÉLY
========================= */
async function engedely() {

    try {
        if (DeviceMotionEvent?.requestPermission) {
            const r = await DeviceMotionEvent.requestPermission();
            if (r !== "granted") return false;
        }
        return true;
    } catch {
        return false;
    }
}

/* =========================
   INDÍTÁS = KALIBRÁLÁS
========================= */
inditas.onclick = async () => {

    const ok = await engedely();
    if (!ok) {
        allapotEl.textContent = "NINCS ENGEDÉLY";
        return;
    }

    allapotEl.textContent = "NYOMD A FALHOZ";

    window.addEventListener("devicemotion", szenzor);

    setTimeout(() => {

        rgx = gx;
        rgy = gy;
        rgz = gz;

        fut = true;
        allapotEl.textContent = "FUT";

    }, 1000);
};

/* =========================
   SZENZOR
========================= */
function szenzor(e) {

    const a = e.accelerationIncludingGravity || {x:0,y:0,z:0};

    gx = a.x;
    gy = a.y;
    gz = a.z;

    if (!fut) return;

    feldolgoz();
}

/* =========================
   VEKTOR KÜLÖNBSÉG
========================= */
function delta(a, b) {
    return a - b;
}

/* =========================
   NORMALIZÁLT PROJEKCIÓK
========================= */
function feldolgoz() {

    // relatív gravitáció
    const dx = delta(gx, rgx);
    const dy = delta(gy, rgy);
    const dz = delta(gz, rgz);

    // 🟡 DÖNTÉS = oldalirány (X-Y sík)
    const dontes = Math.atan2(dx, dy) * 180 / Math.PI;

    // 🔴 GUGGOLÁS = “kifelé billenés” (Z komponens)
    const guggolas = dz;

    let allapot = "ALAP";

    if (Math.abs(guggolas) > 4) {
        allapot = "GUGGOLÁS";
    }
    else if (Math.abs(dontes) > 12) {
        allapot = "DÖNTÉS";
    }

    allapotEl.textContent = allapot;

    panel.textContent =
        "VERZIÓ: " + VERZIÓ + "\n\n" +
        "DÖNTÉS (fok): " + dontes.toFixed(2) + "\n" +
        "GUGGOLÁS (Z): " + guggolas.toFixed(2) + "\n\n" +
        "RGX: " + rgx.toFixed(2) + "\n" +
        "RGY: " + rgy.toFixed(2) + "\n" +
        "RGZ: " + rgz.toFixed(2) + "\n\n" +
        "ÁLLAPOT: " + allapot;
}

</script>

</body>
</html>
