<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ginger Bemelegítő</title>
<link rel="stylesheet" href="css/style.css">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js",
    "kalidokit": "https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.es.js"
  }
}
</script>
</head>
<body>

<h1>Ginger Bemelegítő</h1>
<p class="sub">Kamera-dőlés kalibráció → pozicionálás → felmérés → Ginger élőben követi a mozgásodat.</p>

<div id="stage">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <div id="gateBar" class="state-none"></div>
  <div id="instructionBar">
    <div id="phaseLabel">—</div>
    <div id="instructionText">Kattints az Indítás gombra</div>
    <div id="instructionSub"></div>
  </div>
  <div id="distanceGuide" style="display:none;">
    <div id="distanceBar"><div id="distanceFill"></div></div>
    <div id="distanceLabel"></div>
  </div>
</div>

<div id="vrmStage">
  <div id="frameIndicator" class="frame-safe"></div>
  <div id="vrmHud"><span>Ginger</span><span id="vrmStatus">élő, klasszifikátor-vezérelt</span></div>
  <button id="fullscreenBtn">⛶ Teljes képernyő</button>
  <div id="noPersonBanner" style="display:none;">⚠️ Nem látlak a kamerán keresztül.</div>
  <div id="handLogPanel">
    <button id="routineStartBtn">▶ Mérési rutin indítása</button>
    <span id="logStatus">készen áll</span>
  </div>
  <pre id="vrmDebug">—</pre>
</div>

<div id="controls">
  <button id="startBtn" class="primary">Indítás</button>
</div>

<audio id="gingerAudio" src="assets/Ginger.mp3" preload="auto"></audio>

<script type="module" src="js/main.js"></script>
</body>
</html>
