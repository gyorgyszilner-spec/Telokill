<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Heatwave Absolute Brick Engine v3</title>

<style>
body {
    font-family: sans-serif;
    background: #111;
    color: #fff;
    margin: 0;
    overflow: hidden;
    user-select: none;
}

.container {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

.version {
    position: absolute;
    top: 10px;
    color: #00ffcc;
    font-weight: bold;
}

#startBtn {
    padding: 20px 40px;
    font-size: 22px;
    background: #ff5722;
    border: none;
    color: white;
    border-radius: 10px;
}

.ctrl {
    position: absolute;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 3px solid #666;
    display: flex;
    align-items: center;
    justify-content: center;
    top: 50%;
    transform: translateY(-50%);
}

#leftBtn { left: 30px; }
#rightBtn { right: 30px; }

.ctrl.active {
    border-color: #00ffcc;
    color: #00ffcc;
}
</style>
</head>

<body>

<div class="container">

<div class="version">v3 - MODULAR ENGINE</div>

<button id="startBtn">INDÍTÁS</button>

<div id="liveState">KÉSZEN</div>
<div id="liveZone">ZÓNA: -</div>
<div id="liveTurn">IRÁNY: -</div>
<div id="debug">DEBUG</div>

<div id="leftBtn" class="ctrl">BAL</div>
<div id="rightBtn" class="ctrl">JOBB</div>

</div>

<script>
/* =========================================================
   🧠 ABSOLUTE BRICK ENGINE v3
   MODULÁRIS FELÉPÍTÉS
========================================================= */

/* =========================
   1. SYSTEM STATE
========================= */
let isRunning = false;
let systemState = "IDLE";

/* =========================
   2. UI REFS
========================= */
const startBtn = document.getElementById("startBtn");
const liveState = document.getElementById("liveState");
const liveZone = document.getElementById("liveZone");
const liveTurn = document.getElementById("liveTurn");
const debug = document.getElementById("debug");

/* =========================
   3. SENSOR BASELINE (kalibráció)
========================= */
let baseBeta = null;
let baseGamma = null;
let baseAlpha = null;
let calCount = 0;

/* =========================
   4. SENSOR INPUT VALUES
========================= */
let alpha = 0, beta = 0, gamma = 0;

/* =========================
   5. SENSOR FLAGS
========================= */
let sensorAlive = false;
let lastSensorTime = 0;

/* =========================
   6. MOTION BUFFER (stabilizálás)
========================= */
let magBuffer = [];
const BUFFER_SIZE = 10;

/* =========================================================
   7. PERMISSION (iOS SAFE)
========================================================= */
async function requestPermissions() {
    try {
        if (DeviceMotionEvent?.requestPermission) {
            const r = await DeviceMotionEvent.requestPermission();
            if (r !== "granted") return false;
        }
        if (DeviceOrientationEvent?.requestPermission) {
            const r = await DeviceOrientationEvent.requestPermission();
            if (r !== "granted") return false;
        }
        return true;
    } catch (e) {
        return false;
    }
}

/* =========================================================
   8. START
========================================================= */
startBtn.onclick = async () => {

    startBtn.disabled = true;
    systemState = "STARTING";
    liveState.textContent = "INDÍTÁS...";

    const ok = await requestPermissions();

    if (!ok) {
        liveState.textContent = "NINCS ENGEDÉLY";
        startBtn.disabled = false;
        return;
    }

    window.addEventListener("deviceorientation", onOrientation);
    window.addEventListener("devicemotion", onMotion);

    isRunning = true;
    systemState = "CALIBRATING";

    liveState.textContent = "KALIBRÁLÁS...";
};

/* =========================================================
   9. ORIENTATION HANDLER
========================================================= */
function onOrientation(e) {
    if (!isRunning) return;

    alpha = e.alpha || 0;
    beta = e.beta || 0;
    gamma = e.gamma || 0;

    sensorAlive = true;
    lastSensorTime = performance.now();
}

/* =========================================================
   10. MOTION HANDLER
========================================================= */
function onMotion(e) {
    if (!isRunning) return;

    const a = e.acceleration || {};
    let mag = Math.sqrt((a.x||0)**2 + (a.y||0)**2 + (a.z||0)**2);

    sensorAlive = true;
    lastSensorTime = performance.now();

    process(mag, alpha, beta, gamma);
}

/* =========================================================
   11. CORE PROCESSOR (CSERÉLHETŐ RÉSZ!)
========================================================= */
function process(mag, a, b, g) {

    /* ---------- CALIBRATION ---------- */
    if (baseBeta === null && calCount < 50) {
        baseAlpha += a;
        baseBeta += b;
        baseGamma += g;
        calCount++;

        if (calCount === 50) {
            baseAlpha /= 50;
            baseBeta /= 50;
            baseGamma /= 50;
        }

        liveState.textContent = "KALIBRÁLÁS...";
        return;
    }

    /* ---------- RELATIVE VALUES ---------- */
    const dTilt = g - baseGamma;
    const dCrouch = b - baseBeta;

    let state = "ÁLL";
    let zone = "ALAP";
    let turn = "KÖZÉP";

    /* ---------- LOGIC ZONES ---------- */
    if (dCrouch < -25) {
        zone = "GUGGOLÁS";
        state = "LE GUGGOLVA";
    }

    else if (dTilt > 30) {
        zone = "JOBB DŐLÉS";
        state = "JOBBRA DŐL";
    }

    else if (dTilt < -30) {
        zone = "BAL DŐLÉS";
        state = "BALRA DŐL";
    }

    else {
        if (mag > 2.0) state = "FUT";
        else if (mag > 0.7) state = "SÉTA";
    }

    /* ---------- UI ---------- */
    liveState.textContent = state;
    liveZone.textContent = "ZÓNA: " + zone;
    liveTurn.textContent = "IRÁNY: " + turn;

    debug.textContent =
        `mag=${mag.toFixed(2)} dT=${dTilt.toFixed(1)} dC=${dCrouch.toFixed(1)}`;

    systemState = "RUNNING";
}

/* =========================================================
   12. SAFETY WATCHDOG
========================================================= */
setInterval(() => {
    if (!isRunning) return;

    if (performance.now() - lastSensorTime > 3000) {
        liveState.textContent = "SZENZOR STOP";
    }
}, 2000);

/* =========================================================
   END
========================================================= */
</script>

</body>
</html>
