<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telokill Prototípus</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: sans-serif; color: white; }
        
        #game-stage { width: 100%; height: 100%; position: relative; display: flex; justify-content: center; align-items: center; }
        #crosshair { position: absolute; width: 30px; height: 30px; border: 3px solid #0f0; border-radius: 50%; pointer-events: none; z-index: 10; }
        #enemy { position: absolute; width: 100px; height: 100px; background: red; border: 3px solid white; display: none; z-index: 5; transition: background 0.1s; }
        
        #hud-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; pointer-events: none; z-index: 20; }
        .hud-left { flex: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; pointer-events: auto; }
        
        #radar { width: 140px; height: 140px; border: 2px solid #0f0; border-radius: 50%; position: relative; background: rgba(0,255,0,0.05); }
        #radar-center { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: #0f0; border-radius: 50%; transform: translate(-50%, -50%); }
        #radar-blip { position: absolute; width: 10px; height: 10px; background: red; border-radius: 50%; transform: translate(-50%, -50%); display: block; }
        
        .hud-right { flex: 1; display: flex; justify-content: flex-end; align-items: center; padding: 20px; pointer-events: auto; }
        #shoot-btn { width: 160px; height: 160px; border-radius: 50%; background: #ff3333; border: 5px solid white; color: white; font-size: 26px; font-weight: bold; box-shadow: 0 0 20px rgba(255,0,0,0.5); }
        #shoot-btn:active { background: #990000; transform: scale(0.95); }

        #start-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #start-btn { padding: 20px 40px; font-size: 22px; background: #0f0; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        #motion-debug { font-size: 16px; color: #aaa; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
<!-- === 1. RÉSZ VÉGE === -->

     <div id="start-overlay">
        <h2 style="margin-bottom: 20px; text-align:center;">Telokill Prototípus</h2>
        <button id="start-btn">JÁTÉK INDÍTÁSA & SZENZOROK</button>
    </div>

    <div id="game-stage">
        <div id="crosshair"></div>
        <div id="enemy"></div>
        
        <div id="hud-container">
            <div class="hud-left">
                <div id="radar">
                    <div id="radar-center"></div>
                    <div id="radar-blip"></div>
                </div>
                <div id="motion-debug">
                    <p id="dbg-dodge">Kitérés: Közép</p>
                    <p id="dbg-duck">Státusz: Áll</p>
                    <p id="score-view">Találat: 0</p>
                    <p id="dbg-sensor" style="font-size:10px; color:yellow;">Szenzor: Várakozás...</p>
                </div>
            </div>
            <div class="hud-right">
                <button id="shoot-btn">LÖVÉS</button>
            </div>
        </div>
    </div>

    <script>
        // Globális koordináták és állapotok
        const enemyWorldPitch = 0;    
        let currentOrientation = { alpha: 0, beta: 0 };
        const SMOOTH_FACTOR = 0.15; 

        let score = 0;
        let isEnemyVisible = false;

        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');
        const enemyEl = document.getElementById('enemy');
        const radarBlip = document.getElementById('radar-blip');
        const shootBtn = document.getElementById('shoot-btn');
        const scoreView = document.getElementById('score-view');
        const dbgDodge = document.getElementById('dbg-dodge');
        const dbgDuck = document.getElementById('dbg-duck');
        const dbgSensor = document.getElementById('dbg-sensor');

        // Az indítógomb eseménykezelője, ami kikényszeríti az engedélykérő ablakot
        startBtn.addEventListener('click', function() {
            startOverlay.style.display = 'none';
            
            // Ellenőrizzük, hogy iOS (Apple) eszközről van-e szó
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            dbgSensor.innerText = "Szenzor: iOS Engedélyezve";
                            initSensors();
                        } else {
                            dbgSensor.innerText = "Szenzor: iOS Megtagadva";
                            alert("Kérjük, engedélyezze a mozgásszenzorokat a Safari beállításaiban!");
                        }
                    })
                    .catch(error => {
                        dbgSensor.innerText = "Szenzor hiba: " + error;
                        // Hiba esetén is megpróbáljuk elindítani, hátha asztali gép
                        initSensors();
                    });
            } else {
                // Android vagy PC esetén nincs szükség ablakos engedélyre, azonnal kötünk
                dbgSensor.innerText = "Szenzor: Android/PC Mód";
                initSensors();
            }
        });

        function initSensors() {
            // Iránytű és forgás adatok fogadása
            window.addEventListener('deviceorientation', function(event) {
                if (event && event.alpha !== null) {
                    currentOrientation.alpha = event.alpha;
                    currentOrientation.beta = event.beta || 0;
                    dbgSensor.innerText = "A: " + Math.round(event.alpha) + " B: " + Math.round(event.beta);
                }
            }, true);

            // Fizikai gyorsulás (kitérés, guggolás) fogadása
            window.addEventListener('devicemotion', function(event) {
                const acc = event.accelerationIncludingGravity;
                if (!acc) return;

                // Kitérés (X tengely)
                if (acc.x > 3.5) {
                    dbgDodge.innerText = "Kitérés: BALRA";
                    dbgDodge.className = "action-active";
                } else if (acc.x < -3.5) {
                    dbgDodge.innerText = "Kitérés: JOBBRA";
                    dbgDodge.className = "action-active";
                } else {
                    dbgDodge.innerText = "Kitérés: Közép";
                    dbgDodge.className = "";
                }

                // Guggolás (Y tengely)
                if (acc.y > 14) {
                    dbgDuck.innerText = "Státusz: GUGGOLÁS";
                    dbgDuck.className = "action-active";
                } else {
                    dbgDuck.innerText = "Státusz: Áll";
                    dbgDuck.className = "";
                }
            }, true);

            // Indítjuk a fő renderelési ciklust
            requestAnimationFrame(updateGame);
        }
// <!-- === 2. RÉSZ VÉGE === -->

        // Játékmenet változók
        let enemyAngle = 45; 
        let targetAngleOffset = 0;
        let smoothedAngleOffset = 0;

        // Új ellenség generálása véletlenszerű helyre (0 és 360 fok között)
        function spawnNextEnemy() {
            enemyAngle = Math.floor(Math.random() * 360);
            isEnemyVisible = false;
            enemyEl.style.display = 'none';
        }

        // Fő játékciklus (60 FPS)
        function updateGame() {
            // Kizárólag akkor frissítünk, ha a telefon valós szenzoradatot küld
            if (currentOrientation.alpha !== 0) {
                targetAngleOffset = -currentOrientation.alpha;
                
                // Sima mozgás kiszámítása (LERP) a rángatózás ellen
                let angleDiff = targetAngleOffset - smoothedAngleOffset;
                while (angleDiff < -180) angleDiff += 360;
                while (angleDiff > 180) angleDiff -= 360;
                smoothedAngleOffset += angleDiff * SMOOTH_FACTOR;
            }

            // Kiszámoljuk az ellenség relatív helyzetét a játékos látószögéhez képest
            let deltaAzimuth = enemyAngle - smoothedAngleOffset;
            while (deltaAzimuth < -180) deltaAzimuth += 360;
            while (deltaAzimuth > 180) deltaAzimuth -= 360;

            // --- RADAR FRISSÍTÉSE ---
            const radarMaxDeg = 180;
            let radarX = (deltaAzimuth / radarMaxDeg) * 50; 
            radarX = Math.max(-50, Math.min(50, radarX));

            radarBlip.style.left = "calc(50% + " + radarX + "px)";
            radarBlip.style.top = "50%"; // Fixen a vízszintes középvonalon tartjuk

            // --- ELLENSÉG MEGJELENÍTÉSE (90 FOKOS LÁTÓMEZŐ) ---
            const fovX = 45; // 45 fok balra, 45 fok jobbra

            if (Math.abs(deltaAzimuth) < fovX) {
                isEnemyVisible = true;
                enemyEl.style.display = 'block';

                const screenWidth = window.innerWidth;
                const screenHeight = window.innerHeight;

                // Fokok lefordítása képernyő-pixel pozícióra
                let screenX = (screenWidth / 2) + (deltaAzimuth / fovX) * (screenWidth / 2);
                let screenY = screenHeight / 2;

                enemyEl.style.left = (screenX - 40) + "px";
                enemyEl.style.top = (screenY - 40) + "px";
            } else {
                isEnemyVisible = false;
                enemyEl.style.none = 'none';
                enemyEl.style.display = 'none';
            }

            requestAnimationFrame(updateGame);
        }

        // LÖVÉS KEZELŐ
        shootBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            triggerShoot();
        });
        shootBtn.addEventListener('click', function() {
            if (!('ontouchstart' in window)) triggerShoot();
        });

        function triggerShoot() {
            if (isEnemyVisible) {
                const enemyRect = enemyEl.getBoundingClientRect();
                const centerX = window.innerWidth / 2;
                const enemyCenterX = enemyRect.left + 40;
                
                // Találat ellenőrzése a célkereszt középpontjához képest
                if (Math.abs(centerX - enemyCenterX) < 60) {
                    score++;
                    scoreView.innerText = "Találat: " + score;
                    enemyEl.style.background = 'yellow';
                    
                    // Rövid villanás után eltüntetjük, és új helyre rakjuk a célpontot
                    setTimeout(function() { 
                        enemyEl.style.background = 'red';
                        spawnNextEnemy();
                    }, 150);
                }
            }
        }
    </script>
</body>
</html>
// <!-- === 3. RÉSZ VÉGE === -->
