<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fal-Kép Motor v6.3</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}
.keret {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
}
#allapot {
    font-size: 34px;
    font-weight: bold;
    color: #00ffcc;
}
#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    width: 92%;
    max-width: 440px;
}
#verzio { opacity: 0.7; }
</style>
</head>

<body>

<div class="keret">

<button id="inditas">Falhoz kalibrálás</button>

<div id="verzio">v6.3.0</div>
<div id="allapot">VÁRAKOZÁS</div>
<div id="panel">NYOMD A FALHOZ</div>

</div>

<script>

const VERZIÓ = "v6.3.0";

let gx=0, gy=0, gz=0;
let rgx=0, rgy=0, rgz=0;
let fut=false;

/* =========================
   ÁLLAPOTOK
========================= */
let dontes = "ALAP";
let fuggoleges = "ALAP";

/* =========================
   INDÍTÁS
========================= */
document.getElementById("inditas").onclick = async () => {

    window.addEventListener("devicemotion", e => {
        const a = e.accelerationIncludingGravity || {x:0,y:0,z:0};
        gx=a.x; gy=a.y; gz=a.z;
        if(fut) update();
    });

    setTimeout(()=>{
        rgx=gx; rgy=gy; rgz=gz;
        fut=true;
        document.getElementById("allapot").textContent="FUT";
    },1200);
};

/* =========================
   SEGÉD: ZÓNA
========================= */
function zone(v, dead, hold) {
    return {
        dead: Math.abs(v) < dead,
        hold: Math.abs(v) < hold
    };
}

/* =========================
   DÖNTÉS MOTOR
========================= */
function update() {

    const dx = gx - rgx;
    const dy = gy - rgy;
    const dz = gz - rgz;

    const tilt = Math.atan2(dx, dy) * 180 / Math.PI;

    const d = zone(tilt, 15, 25);

    // 🧠 DÖNTÉS LOGIKA (stabil 3 sáv)
    if (d.dead) {
        dontes = "ALAP";
    } else {
        if (dontes === "ALAP") {
            if (tilt > 25) dontes = "JOBB";
            if (tilt < -25) dontes = "BAL";
        } else {
            if (Math.abs(tilt) < 18) {
                dontes = "ALAP";
            }
        }
    }

    /* =========================
       GUGGOLÁS / EMELÉS
    ========================= */

    const z = zone(dz, 3, 6);

    if (z.dead) {
        fuggoleges = "ALAP";
    } else {
        if (fuggoleges === "ALAP") {
            if (dz > 6) fuggoleges = "GUGGOLÁS";
            if (dz < -6) fuggoleges = "EMELÉS";
        } else {
            if (Math.abs(dz) < 4) {
                fuggoleges = "ALAP";
            }
        }
    }

    /* =========================
       OUTPUT
    ========================= */

    let nagy = fuggoleges !== "ALAP"
        ? fuggoleges
        : dontes;

    document.getElementById("allapot").textContent = nagy;

    document.getElementById("panel").textContent =
        "VERZIÓ: " + VERZIÓ + "\n\n" +
        "DÖNTÉS: " + dontes + "\n" +
        "FÜGGŐLEGES: " + fuggoleges + "\n\n" +
        "TILT: " + tilt.toFixed(2) + "\n" +
        "Z: " + dz.toFixed(2);
}

</script>

</body>
</html>
