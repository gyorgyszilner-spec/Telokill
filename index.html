<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fal-Kép Motor v6.0</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}

.keret {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
}

#allapot {
    font-size: 34px;
    font-weight: bold;
    color: #00ffcc;
}

#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    width: 92%;
    max-width: 440px;
}

#verzio {
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="keret">

    <button id="inditas">Falhoz nyomás (kalibrálás)</button>

    <div id="verzio">v6.0.0</div>

    <div id="allapot">VÁRAKOZÁS</div>

    <div id="panel">NYOMD A FALHOZ</div>

</div>

<script>

const VERZIÓ = "v6.0.0";

/* =========================
   SZENZOR
========================= */
let fut = false;

let gx = 0, gy = 0, gz = 0;
let rgx = 0, rgy = 0, rgz = 0;

/* =========================
   ÁLLAPOTOK
========================= */
let dontes = "SEMMI";     // BAL / JOBB / SEMMI
let fuggoleges = "SEMMI"; // GUGGOLÁS / EMELÉS / SEMMI

/* =========================
   ENGEDÉLY
========================= */
async function engedely() {
    try {
        if (DeviceMotionEvent?.requestPermission) {
            const r = await DeviceMotionEvent.requestPermission();
            if (r !== "granted") return false;
        }
        return true;
    } catch {
        return false;
    }
}

/* =========================
   INDÍTÁS
========================= */
document.getElementById("inditas").onclick = async () => {

    const ok = await engedely();
    if (!ok) return;

    document.getElementById("allapot").textContent = "NYOMD A FALHOZ";

    window.addEventListener("devicemotion", szenzor);

    setTimeout(() => {
        rgx = gx;
        rgy = gy;
        rgz = gz;

        fut = true;
        document.getElementById("allapot").textContent = "FUT";
    }, 1200);
};

/* =========================
   SZENZOR
========================= */
function szenzor(e) {

    const a = e.accelerationIncludingGravity || {x:0,y:0,z:0};

    gx = a.x;
    gy = a.y;
    gz = a.z;

    if (fut) feldolgoz();
}

/* =========================
   STATE MACHINE
========================= */
function stateMachine(value, state, negLabel, posLabel, be, ki) {

    let newState = state;

    if (Math.abs(value) < ki) {
        newState = "SEMMI";
    }
    else if (value > be) {
        newState = posLabel;
    }
    else if (value < -be) {
        newState = negLabel;
    }

    return newState;
}

/* =========================
   FŐ LOGIKA
========================= */
function feldolgoz() {

    const dx = gx - rgx;
    const dy = gy - rgy;
    const dz = gz - rgz;

    /* -------------------------
       DÖNTÉS (BAL / JOBB)
    -------------------------- */
    const tiltRaw = Math.atan2(dx, dy) * 180 / Math.PI;

    dontes = stateMachine(
        tiltRaw,
        dontes,
        "BAL",
        "JOBB",
        20,
        12
    );

    /* -------------------------
       GUGGOLÁS / EMELÉS
    -------------------------- */
    fuggoleges = stateMachine(
        dz,
        fuggoleges,
        "GUGGOLÁS",
        "EMELÉS",
        5,
        3
    );

    /* -------------------------
       KIJELZÉS
    -------------------------- */

    let nagyAllapot = "ALAP";

    if (dontes !== "SEMMI") {
        nagyAllapot = "DÖNTÉS " + dontes;
    }

    if (fuggoleges !== "SEMMI") {
        nagyAllapot = fuggoleges;
    }

    document.getElementById("allapot").textContent = nagyAllapot;

    document.getElementById("panel").textContent =
        "VERZIÓ: " + VERZIÓ + "\n\n" +
        "DÖNTÉS: " + dontes + "\n" +
        "FÜGGŐLEGES: " + fuggoleges + "\n\n" +
        "RAW TILT: " + tiltRaw.toFixed(2) + "\n" +
        "Z: " + dz.toFixed(2);
}

</script>

</body>
</html>
