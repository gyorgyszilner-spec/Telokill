<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fal-Kép Motor v7.1</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}

.keret {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
}

#allapot {
    font-size: 34px;
    font-weight: bold;
    color: #00ffcc;
}

#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    width: 92%;
    max-width: 440px;
}

#verzio { opacity: 0.7; }
</style>
</head>

<body>

<div class="keret">
    <button id="inditas">Falhoz kalibrálás</button>
    <div id="verzio">v7.1.0</div>
    <div id="allapot">VÁRAKOZÁS</div>
    <div id="panel">NYOMD A FALHOZ</div>
</div>

<script>
const VERZIÓ = "v7.1.0";
let fut = false;

// Nyers és szűrt adatok (V7.0 EREDETI)
let ax = 0, ay = 0, az = 0;
let rax = 0, ray = 0, raz = 0;

// Állapotok (V7.0 EREDETI)
let dontes = "SEMMI";
let fuggoleges = "SEMMI";

/* =========================================================================
   ÚJ JÁRÁS / FUTÁS VÁLTOZÓK (AZ EREDETI KÓDTÓL JÓL ELKÜLÖNÍTVE)
   ========================================================================= */
let utolsoLepesIdo = 0;
let lepesIdokozok = [];
let utolsoGyorsulasZ = 0;
let utolsoMozgasIdo = 0;
let mozgásÁllapot = "STOP";

// Szenzor engedélyezés (V7.0 EREDETI)
async function engedely() {
    try {
        if (typeof DeviceMotionEvent !== 'undefined' && DeviceMotionEvent.requestPermission) {
            const r = await DeviceMotionEvent.requestPermission();
            return r === "granted";
        }
        return true;
    } catch {
        return false;
    }
}

// Indítás és Kalibráció (V7.0 EREDETI)
document.getElementById("inditas").onclick = async () => {
    const ok = await engedely();
    if (!ok) {
        alert("Szenzor hozzáférés megtagadva!");
        return;
    }

    document.getElementById("allapot").textContent = "KALIBRÁLÁS...";
    window.addEventListener("devicemotion", szenzor);

    // 1.5 másodperces ablak a fizikai stabilizálódásra és alapérték rögzítésre
    setTimeout(() => {
        rax = ax;
        ray = ay;
        raz = az;
        fut = true;
        document.getElementById("allapot").textContent = "ALAP";
    }, 1500);
};

function szenzor(e) {
    // accelerationIncludingGravity-t használunk, mert a dőlésszöghöz kell a gravitáció (V7.0 EREDETI)
    const a = e.accelerationIncludingGravity || {x:0, y:0, z:0};
    
    // Egyszerű aluláteresztő szűrő (Low-pass filter) a zajok és ugrálás kiszűrésére (V7.0 EREDETI)
    ax = ax * 0.7 + a.x * 0.3;
    ay = ay * 0.7 + a.y * 0.3;
    az = az * 0.7 + a.z * 0.3;

    if (fut) {
        // Lépésdetektálás meghívása a háttérben az eredeti szűrt adatokból
        detectLepes(az - raz);
        feldolgoz();
    }
}

/* =========================================================================
   VALÓDI HOLTTÉR ÉS HISZTERÉZIS ÁLLAPONGÉP (V7.0 EREDETI)
   ========================================================================= */
function vizsgalAllapot(ertek, jelenlegiState, negNev, posNev, beKuszob, kiKuszob) {
    if (jelenlegiState === "SEMMI") {
        if (ertek > beKuszob) return posNev;
        if (ertek < -beKuszob) return negNev;
        return "SEMMI";
    }
    if (jelenlegiState === posNev) {
        if (ertek < kiKuszob) return "SEMMI";
        return posNev;
    }
    if (jelenlegiState === negNev) {
        if (ertek > -kiKuszob) return "SEMMI";
        return negNev;
    }
    return "SEMMI";
}

/* =========================================================================
   FÜGGETLEN LÉPÉSDETEKTOR MODUL
   ========================================================================= */
function detectLepes(jelenlegiDz) {
    const most = performance.now();
    
    // Csak határozott rázkódásra lép be (1.5 m/s²), így a sima tartás nem rontja el
    if (Math.abs(jelenlegiDz) > 1.5 && Math.abs(utolsoGyorsulasZ) <= 1.5) {
        if (most - utolsoLepesIdo > 220) {
            const idokoz = most - utolsoLepesIdo;
            utolsoLepesIdo = most;
            utolsoMozgasIdo = most;

            lepesIdokozok.push(idokoz);
            if (lepesIdokozok.length > 3) lepesIdokozok.shift();
        }
    }
    utolsoGyorsulasZ = jelenlegiDz;
}

function feldolgoz() {
    const most = performance.now();

    // 1. DÖNTÉS LOGIKA (V7.0 EREDETI)
    const aktualisSzog = Math.atan2(ax, ay) * 180 / Math.PI;
    const kalibraltSzog = Math.atan2(rax, ray) * 180 / Math.PI;
    
    let dolesElteres = aktualisSzog - kalibraltSzog;
    if (dolesElteres > 180) dolesElteres -= 360;
    if (dolesElteres < -180) dolesElteres += 360;

    dontes = vizsgalAllapot(dolesElteres, dontes, "BAL", "JOBB", 15, 8);

    // 2. FÜGGŐLEGES MOZGÁS (V7.0 EREDETI)
    const dz = az - raz;
    fuggoleges = vizsgalAllapot(dz, fuggoleges, "EMELÉS", "GUGGOLÁS", 2.5, 0.8);

    /* =========================================================================
       SEBESSÉG KIÉRTÉKELÉSE (CSAK AKKOR HA AZ EREDETI ÁLLAPOTOK ALAPON VANNAK)
       ========================================================================= */
    if (dontes === "SEMMI" && fuggoleges === "SEMMI") {
        // Ha 650ms-on belül történt lépés, akkor mozgás van
        if (most - utolsoMozgasIdo < 650 && lepesIdokozok.length > 0) {
            const atlagIdokoz = lepesIdokozok.reduce((a, b) => a + b, 0) / lepesIdokozok.length;
            // 420 ms alatti ritmus = FUTÁS, felette JÁRÁS
            mozgásÁllapot = (atlagIdokoz < 420) ? "FUTÁS" : "JÁRÁS";
        } else {
            mozgásÁllapot = "STOP";
            lepesIdokozok = [];
        }
    } else {
        // Ha kimozdulunk az eredeti v7.0 állapotokba, a járás azonnal leáll
        mozgásÁllapot = "STOP";
        lepesIdokozok = [];
    }

    // 3. MEGJELENÍTÉS ÉS PRIORITÁS (V7.0 PAPÍRFORMA SZERINT)
    let kijelzendoAllapot = "ALAP";
    
    if (fuggoleges !== "SEMMI") {
        kijelzendoAllapot = fuggoleges;
    } else if (dontes !== "SEMMI") {
        kijelzendoAllapot = "DÖNTÉS " + dontes;
    } else if (mozgásÁllapot !== "STOP") {
        // Csak akkor írja felül az ALAP-ot, ha az eredetiek SEMMI-n vannak és lépkedünk
        kijelzendoAllapot = mozgásÁllapot;
    }

    document.getElementById("allapot").textContent = kijelzendoAllapot;

    // Eredeti v7.0 debug panel kiegészítve a mozgásállapottal
    document.getElementById("panel").textContent =
        "VERZIÓ: " + VERZIÓ + "\n\n" +
        "DÖNTÉS STÁTUSZ: " + dontes + "\n" +
        "FÜGGŐLEGES STÁTUSZ: " + fuggoleges + "\n" +
        "MOZGÁS STÁTUSZ: " + mozgásÁllapot + "\n\n" +
        "DŐLÉS ELTÉRÉS (fok): " + dolesElteres.toFixed(1) + "°\n" +
        "DZ (gyorsulás delta): " + dz.toFixed(2) + " m/s²";
}
</script>

</body>
</html>
