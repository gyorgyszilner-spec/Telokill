<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fal-Kép Motor v8.1.0</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
    overflow: hidden;
}

#allapot {
    font-size: 32px;
    text-align: center;
    color: #00ffcc;
    margin-top: 20px;
}

#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 12px;
    margin: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<button id="inditas">Indítás</button>
<div id="allapot">VÁRAKOZÁS</div>
<pre id="panel"></pre>

<script>
let ax=0,ay=0,az=0;
let rax=0,ray=0,raz=0;

let fordulas="SEMMI";
let dontes="SEMMI";
let fuggoleges="SEMMI";

let utolsoSzog=0;

let lepesek=[];
let intenzitasok=[];
let utolsoLepes=0;
let utolsoZ=0;
let mozgasiIdo=0;

async function engedely(){
    if(DeviceMotionEvent.requestPermission){
        const r=await DeviceMotionEvent.requestPermission();
        return r==="granted";
    }
    return true;
}

document.getElementById("inditas").onclick=async()=>{
    const ok=await engedely();
    if(!ok) return;

    window.addEventListener("devicemotion", e=>{
        const a=e.accelerationIncludingGravity||{x:0,y:0,z:0};
        ax=ax*0.7+a.x*0.3;
        ay=ay*0.7+a.y*0.3;
        az=az*0.7+a.z*0.3;
        feldolgoz();
    });

    setTimeout(()=>{
        rax=ax; ray=ay; raz=az;
        document.getElementById("allapot").textContent="ALAP";
    },1500);
};

function lepesDetekt(z, szogValt){
    const most=performance.now();

    const ugras=Math.abs(z-utolsoZ)>0.9;
    const razas=Math.abs(szogValt)>2.8;

    if(ugras||razas){
        if(most-utolsoLepes>180){
            lepesek.push(most-utolsoLepes);
            intenzitasok.push(Math.abs(z)+Math.abs(szogValt)*0.4);

            if(lepesek.length>3) lepesek.shift();
            if(intenzitasok.length>3) intenzitasok.shift();

            utolsoLepes=most;
            mozgasiIdo=most;
        }
    }
    utolsoZ=z;
}

function feldolgoz(){

    const szog=Math.atan2(ax,ay)*180/Math.PI;
    const kalSzog=Math.atan2(rax,ray)*180/Math.PI;

    let doles=szog-kalSzog;
    if(doles>180) doles-=360;
    if(doles<-180) doles+=360;

    let szogValt=szog-utolsoSzog;
    if(szogValt>180) szogValt-=360;
    if(szogValt<-180) szogValt+=360;

    utolsoSzog=szog;

    const dz=az-raz;

    // =========================
    // 🔴 FORDULÁS LOCK
    // =========================
    if(fordulas!=="SEMMI"){

        dontes="SEMMI";
        fuggoleges="SEMMI";

        if(fordulas==="BALRA" && szogValt>3.0) fordulas="SEMMI";
        if(fordulas==="JOBBRA" && szogValt<-3.0) fordulas="SEMMI";

        kiir();
        return;
    }

    // fordulás indítás
    if(Math.abs(szogValt)>3.0){
        fordulas=szogValt>0?"JOBBRA":"BALRA";
    }

    // =========================
    // LÉPÉS (JÁRÁS / FUTÁS)
    // =========================
    let mozgas="STOP";

    if(performance.now()-mozgasiIdo<800 && lepesek.length>1){

        const atlag=lepesek.reduce((a,b)=>a+b,0)/lepesek.length;
        const intenz=intenzitasok.reduce((a,b)=>a+b,0)/intenzitasok.length;

        if(atlag<310){
            mozgas=intenz>2.1?"MAGAS TÉRD FUTÁS":"FUTÁS";
        } else {
            mozgas=intenz>2.1?"MAGAS TÉRD JÁRÁS":"JÁRÁS";
        }
    }

    if(mozgas==="STOP"){
        lepesek=[];
        intenzitasok=[];
    }

    // =========================
    // TESTHELYZET
    // =========================
    dontes = vizsgal(doles,dontes,"JOBB","BAL",22,10);
    fuggoleges = vizsgal(dz,fuggoleges,"EMELÉS","GUGGOLÁS",3.2,1.0);

    kiir(mozgas);
}

function vizsgal(v,st,neg,pos,be,ki){
    if(st==="SEMMI"){
        if(v>be) return pos;
        if(v<-be) return neg;
        return "SEMMI";
    }
    if(st===pos && v<ki) return "SEMMI";
    if(st===neg && v>-ki) return "SEMMI";
    return st;
}

function kiir(mozgas="STOP"){

    let all="ALAP";

    if(fordulas!=="SEMMI") all="FORDULÁS "+fordulas;
    else if(mozgas!=="STOP") all=mozgas;
    else if(fuggoleges!=="SEMMI") all=fuggoleges;
    else if(dontes!=="SEMMI") all="DÖNTÉS "+dontes;

    document.getElementById("allapot").textContent=all;

    document.getElementById("panel").textContent=
        "FORDULÁS: "+fordulas+"\n"+
        "MOZGÁS: "+mozgas+"\n"+
        "DÖNTÉS: "+dontes+"\n"+
        "FÜGGŐLEGES: "+fuggoleges;
}
</script>

</body>
</html>
