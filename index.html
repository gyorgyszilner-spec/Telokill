<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fal-Kép Motor v3.0</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}

.keret {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
}

#allapot {
    font-size: 32px;
    font-weight: bold;
    color: #00ffcc;
}

#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    width: 90%;
    max-width: 420px;
}

#verzio {
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="keret">

    <button id="inditas">Falhoz nyomás (kalibrálás)</button>

    <div id="verzio">v3.0.0</div>

    <div id="allapot">VÁRAKOZÁS</div>

    <div id="panel">NYOMD A FALHOZ</div>

</div>

<script>

/* =========================
   VERZIÓ
========================= */
const VERZIÓ = "v3.0.0";

/* =========================
   SZENZOR
========================= */
let fut = false;

let beta = 0;   // guggolás tengely
let gamma = 0;  // döntés tengely

let alapBeta = null;
let alapGamma = null;

/* =========================
   ÁLLAPOT
========================= */
let allapot = "ALAP";

/* =========================
   UI
========================= */
const allapotEl = document.getElementById("allapot");
const panel = document.getElementById("panel");
const inditas = document.getElementById("inditas");

/* =========================
   ENGEDÉLY
========================= */
async function engedely() {

    try {
        if (DeviceOrientationEvent?.requestPermission) {
            const r = await DeviceOrientationEvent.requestPermission();
            if (r !== "granted") return false;
        }
        return true;
    } catch {
        return false;
    }
}

/* =========================
   INDÍTÁS = FALHOZ NYOMÁS
========================= */
inditas.onclick = async () => {

    const ok = await engedely();
    if (!ok) {
        allapotEl.textContent = "NINCS ENGEDÉLY";
        return;
    }

    // 📌 EZ A LÉNYEG: FIX REFERENCIA
    window.addEventListener("deviceorientation", szenzor);

    allapotEl.textContent = "NYOMD A FALHOZ";

    // kalibráció 1 pillanat
    setTimeout(() => {
        alapBeta = beta;
        alapGamma = gamma;

        fut = true;
        allapotEl.textContent = "FUT";
    }, 1000);
};

/* =========================
   SZENZOR
========================= */
function szenzor(e) {

    if (!alapBeta || !alapGamma) {
        beta = e.beta || 0;
        gamma = e.gamma || 0;
        return;
    }

    beta = e.beta || 0;
    gamma = e.gamma || 0;

    feldolgoz();
}

/* =========================
   SZÖGKÜLÖNBSÉG (KULCS!)
========================= */
function kulonbseg(aktualis, alap) {

    let d = aktualis - alap;

    while (d > 180) d -= 360;
    while (d < -180) d += 360;

    return d;
}

/* =========================
   ÁLLAPOT LOGIKA
========================= */
function allapotSzamitas(ferdeseg, kinyilas) {

    // 🔴 GUGGOLÁS (nagy billenés)
    if (Math.abs(kinyilas) > 45) {
        return "GUGGOLÁS";
    }

    // 🟡 DÖNTÉS (kormány)
    if (Math.abs(ferdeseg) > 15) {
        return "DÖNTÉS";
    }

    return "ALAP";
}

/* =========================
   FŐ LOGIKA
========================= */
function feldolgoz() {

    const ferdeseg = kulonbseg(gamma, alapGamma);
    const kinyilas = kulonbseg(beta, alapBeta);

    allapot = allapotSzamitas(ferdeseg, kinyilas);

    allapotEl.textContent = allapot;

    panel.textContent =
        "VERZIÓ: " + VERZIÓ + "\n\n" +
        "FERDESÉG (DÖNTÉS): " + ferdeseg.toFixed(1) + "\n" +
        "KINYÍLÁS (GUGGOLÁS): " + kinyilas.toFixed(1) + "\n\n" +
        "ALAP BETA: " + (alapBeta ?? 0).toFixed(1) + "\n" +
        "ALAP GAMMA: " + (alapGamma ?? 0).toFixed(1) + "\n\n" +
        "ÁLLAPOT: " + allapot;
}

</script>

</body>
</html>
