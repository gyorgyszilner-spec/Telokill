<!-- === 1. RÉSZ KEZDETE: CONTROLLER INTERFACE ÉS CSS v2.7.0 === -->
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heatwave Zóna-Exkluzív Motor</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #111; 
            color: #fff; 
            padding: 0; 
            margin: 0; 
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .container { 
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            padding: 20px;
        }
        .version-tag { 
            color: #00ffcc; 
            font-weight: bold; 
            font-size: 14px; 
            position: absolute;
            top: 15px;
            letter-spacing: 1px; 
        }
        #startBtn { 
            background: #ff5722; 
            color: white; 
            border: none; 
            padding: 20px 40px; 
            font-size: 24px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            z-index: 10;
        }
        #live-state { 
            font-size: 42px; 
            font-weight: bold; 
            margin: 10px 0; 
            color: #ffeb3b; 
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 235, 59, 0.5);
            text-align: center;
        }
        #live-zone {
            font-size: 20px;
            font-weight: bold;
            color: #ff00ff;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        #debug-vals { 
            font-size: 13px; 
            font-family: monospace;
            color: #666; 
            text-align: center;
            line-height: 1.4;
        }
        .ctrl-btn {
            position: absolute;
            width: 95px;
            height: 95px;
            border: 4px solid rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.02);
            pointer-events: auto;
        }
        #leftBtn { left: 45px; }
        #rightBtn { right: 45px; }
        .ctrl-btn.active {
            border-color: #00ffcc;
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.15);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- FRISSÍTETT VERZIÓSZÁM KIJELZÉS -->
        <div class="version-tag">VERZIÓ: v2.7.0 - ZONE EXCLUSION ENGINE</div>
        
        <button id="startBtn">▶ MOTOR INDÍTÁSA</button>

        <!-- Élő játékos parancs (ÁLL, SÉTÁL, FUT, GUGGOLÁS, TÖRZSDÖNTÉS BALRA/JOBBRA) -->
        <div id="live-state">KÉSZEN ÁLL</div>
        
        <!-- Fizikai hardveres zóna állapota -->
        <div id="live-zone">AKTÍV ZÓNA: NYUGALMI</div>
        
        <div id="debug-vals">Indításra vár...</div>

        <div id="leftBtn" class="ctrl-btn">BAL</div>
        <div id="rightBtn" class="ctrl-btn">JOBB</div>
    </div>
<!-- === 1. RÉSZ VÉGE === -->

<!-- === 2. RÉSZ KEZDETE: EXKLUZÍV ZÓNÁK ÉS LOGIKAI MÁTRIX === -->
    <script>
        let isRecording = false;

        // HTML elemek referenciái
        const startBtn = document.getElementById('startBtn');
        const liveStateDiv = document.getElementById('live-state');
        const liveZoneDiv = document.getElementById('live-zone');
        const debugValsDiv = document.getElementById('debug-vals');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        // Gombok vizuális visszajelzései
        leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); leftBtn.classList.add('active'); });
        leftBtn.addEventListener('touchend', () => { leftBtn.classList.remove('active'); });
        rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); rightBtn.classList.add('active'); });
        rightBtn.addEventListener('touchend', () => { rightBtn.classList.remove('active'); });

        // PUFFER A SEBESSÉGMÉRÉSHEZ
        const BUFFER_SIZE = 12;
        let magBuffer = [];

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                setTimeout(() => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'hu-HU';
                    utterance.rate = 1.0;
                    window.speechSynthesis.speak(utterance);
                }, 50);
            }
        }

        function processSensors(rawMag, beta, gamma, rotBeta, rotGamma) {
            if (!isRecording) return;

            // Rázkódási adatok simítása
            magBuffer.push(rawMag); if (magBuffer.length > BUFFER_SIZE) magBuffer.shift();
            if (magBuffer.length < BUFFER_SIZE) return;
            const mag = magBuffer.reduce((a, b) => a + b, 0) / magBuffer.length;

            let currentZone = "ALAPÁLLÁS";
            let state = "ÁLL";

            // --- ZÓNA FELOSZTÁS A TE FIZIKAI SZABÁLYAID ALAPJÁN ---

            // A) GUGGOLÁS ZÓNA: A kijelző 45° és 90° között felfelé néz (Beta dőlés)
            if (beta > 45.0 && beta < 90.0) {
                currentZone = "GUGGOLÁS ZÓNA";
                state = "LE VAN GUGGOLVA (C-GOMB)";
            }
            // B) TÖRZSDÖNTÉS ZÓNA: Oldalirányú billenés 25 fokon túl (Gamma dőlés)
            else if (gamma > 25.0) {
                currentZone = "TÖRZSDÖNTÉS ZÓNA";
                state = "TÖRZSDÖNTÉS JOBBRA (E-GOMB)";
            } else if (gamma < -25.0) {
                currentZone = "TÖRZSDÖNTÉS ZÓNA";
                state = "TÖRZSDÖNTÉS BALRA (Q-GOMB)";
            }
            // C) ALAPÁLLÁS ZÓNA: Ha a telefon egyenesen áll, semerre sem dől
            else {
                currentZone = "ALAPÁLLÁS ZÓNA";

                // 1. Törzsfordítás szűrése a giroszkóp tiszta szögsebességéből (Nincs elhangolódás!)
                if (rotBeta > 55 || rotGamma > 55) {
                    state = "FORDULÁS JOBBRA (EGÉR-JOBB)";
                } else if (rotBeta < -55 || rotGamma < -55) {
                    state = "FORDULÁS BALRA (EGÉR-BAL)";
                }
                // 2. Haladási sebesség szűrése (Csak ha egyenesen áll és nem fordul a törzs!)
                else {
                    if (mag > 2.0) {
                        state = "FUT (ELŐRE-SPRINT)";
                    } else if (mag > 0.7) {
                        state = "SÉTÁL (ELŐRE-SÉTA)";
                    } else {
                        state = "ÁLL";
                    }
                }
            }

            // Kijelző frissítése az exkluzív adatokkal
            liveZoneDiv.textContent = `AKTÍV ZÓNA: ${currentZone}`;
            liveStateDiv.textContent = state;
            debugValsDiv.textContent = `MAG: ${mag.toFixed(2)} | Előredőlés (Beta): ${beta.toFixed(0)}° | Oldaldőlés (Gamma): ${gamma.toFixed(0)}° | Forgás: ${rotBeta.toFixed(0)}`;
        }
<!-- === 2. RÉSZ VÉGE === -->

<!-- === 3. RÉSZ KEZDETE: HARDVERES SZENZOROK ÖSSZEKÖTÉSE v2.7.0 === -->
        // Globális változók a dőlésszögek átmeneti tárolására
        let latestAlpha = 0, latestBeta = 0, latestGamma = 0;

        // iOS 13+ engedélykérő ablak kezelése mindkét szenzorra
        async function requestPermissions() {
            try {
                let motionGranted = true;
                let orientGranted = true;

                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    const res = await DeviceMotionEvent.requestPermission();
                    motionGranted = (res === 'granted');
                }
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const res = await DeviceOrientationEvent.requestPermission();
                    orientGranted = (res === 'granted');
                }
                return motionGranted && orientGranted;
            } catch(e) {
                return true; // Androidon automatikusan engedélyezve van
            }
        }

        // A motor indítása a gombnyomásra
        startBtn.addEventListener('click', async () => {
            const hasPermission = await requestPermissions();
            if (!hasPermission) {
                alert("Szenzor hozzáférés megtagadva!");
                return;
            }

            // Képernyőzár és fekvő mód kényszerítése a kontroller hordozáshoz
            try {
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                }
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch(e) { 
                console.log("Képernyőzár rögzítése nem támogatott."); 
            }

            startBtn.style.display = 'none';
            isRecording = true;

            // Mindkét natív eseménykezelő feliratkoztatása
            window.addEventListener('deviceorientation', handleOrientation);
            window.addEventListener('devicemotion', handleMotion);
            
            speak("A zónavezérelt motor elindult. Használd a telefont fitness kontrollerként!");
        });

        // 1. Abszolút szögek (Guggolás és Törzsdöntés ellenőrzéséhez)
        function handleOrientation(event) {
            if (!isRecording) return;
            if (event.alpha !== null) latestAlpha = event.alpha;
            if (event.beta !== null) latestBeta = event.beta;
            if (event.gamma !== null) latestGamma = event.gamma;
        }

        // 2. Gyorsulás és Szögsebesség (Séta, Futás és Törzsfordítás ellenőrzéséhez)
        function handleMotion(event) {
            if (!isRecording) return;

            // Nyers gyorsulási vektor hossza
            const acc = event.acceleration || event.accelerationIncludingGravity;
            let magnitude = 0;
            if (acc && acc.x !== null) {
                magnitude = Math.sqrt(acc.x*acc.x + acc.y*acc.y + acc.z*acc.z);
            }

            // Tiszta forgási szögsebességek lekérése (fok/másodperc)
            const rot = event.rotationRate;
            let rotBeta = 0, rotGamma = 0;
            if (rot) {
                rotBeta = rot.beta || 0;
                rotGamma = rot.gamma || 0;
            }

            // Paraméterek átadása az új, zónavezérelt állapotgépnek
            processSensors(magnitude, latestBeta, latestGamma, rotBeta, rotGamma);
        }
    </script>
</body>
</html>
<!-- === 3. RÉSZ VÉGE === -->
