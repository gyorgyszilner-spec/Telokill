<!-- === 1. RÉSZ KEZDETE: CONTROLLER INTERFACE ÉS CSS v2.1.0 === -->
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heatwave Kétkezes Kalibráció</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #111; 
            color: #fff; 
            padding: 0; 
            margin: 0; 
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .container { 
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            padding: 20px;
        }
        .version-tag { 
            color: #ff9800; 
            font-weight: bold; 
            font-size: 14px; 
            position: absolute;
            top: 15px;
            letter-spacing: 1px; 
        }
        #startBtn { 
            background: #ff5722; 
            color: white; 
            border: none; 
            padding: 20px 40px; 
            font-size: 24px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            z-index: 10;
        }
        #instruction { 
            font-size: 26px; 
            font-weight: bold; 
            margin: 15px 0; 
            color: #ffeb3b; 
            max-width: 50%;
            text-align: center;
        }
        #timer { 
            font-size: 72px; 
            font-weight: bold; 
            color: #e91e63; 
            margin: 10px 0; 
        }
        #status { 
            font-size: 16px; 
            color: #aaa; 
            position: absolute;
            bottom: 15px;
        }
        .progress-bar { 
            background: #333; 
            height: 8px; 
            border-radius: 4px; 
            width: 40%; 
            margin-top: 10px; 
            overflow: hidden; 
        }
        #progress { 
            background: #4caf50; 
            height: 100%; 
            width: 0%; 
            transition: width 0.3s; 
        }

        /* VIRTUÁLIS KONTROLLER GOMBOK (Áttetsző körvonalak) */
        .ctrl-btn {
            position: absolute;
            width: 90px;
            height: 90px;
            border: 4px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.1s ease;
        }
        /* Bal gomb elhelyezése */
        #leftBtn { left: 40px; }
        /* Jobb gomb elhelyezése */
        #rightBtn { right: 40px; }

        /* Aktív (megnyomott) állapot vizuális visszajelzése */
        .ctrl-btn.active {
            border-color: #00ffcc;
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="version-tag">VERZIÓ: v2.1.0 - TWIN BUTTON CONTROLLER</div>
        
        <button id="startBtn">▶ TESZT INDÍTÁSA</button>

        <div id="instruction">Tartsd a telefont két kézzel magad előtt!</div>
        <div id="timer">--</div>

        <div class="progress-bar">
            <div id="progress"></div>
        </div>

        <div id="status">Állapot: Várakozás</div>

        <!-- A KÉT KÖRVONALÚ GOMB A HÜVELYKUJJAKNAK -->
        <div id="leftBtn" class="ctrl-btn">BAL</div>
        <div id="rightBtn" class="ctrl-btn">JOBB</div>
    </div>
<!-- === 1. RÉSZ VÉGE === -->

<!-- === 2. RÉSZ KEZDETE: JAVÍTOTT MOZGÁSFELISMERŐ ÉS SZŰRŐ MOTOR === -->
    <script>
        let isRecording = false;
        let startTimestamp = 0;
        let audioCtx = null;

        // Vizuális elemek referenciái
        const startBtn = document.getElementById('startBtn');
        const liveGestureDiv = document.getElementById('live-gesture');
        const debugValsDiv = document.getElementById('debug-vals');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        // Érintések kezelése a két körvonal kontroller gombhoz
        leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); leftBtn.classList.add('active'); });
        leftBtn.addEventListener('touchend', () => { leftBtn.classList.remove('active'); });
        rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); rightBtn.classList.add('active'); });
        rightBtn.addEventListener('touchend', () => { rightBtn.classList.remove('active'); });

        // Időablakos szűrők a ritmikus mozgásokhoz (Séta, Futás frekvencia méréséhez)
        let lastPeakTime = 0;
        let peakIntervals = [];

        // --- A TE SAJÁT SZÁMAID ALAPJÁN BEÁLLÍTOTT KÜSZÖBÉRTÉKEK (Thresholds) ---
        function processMovement(x, y, z, mag) {
            let gesture = "MOZDULATLAN";

            // 1. HARDCORE ROBBANÁSOK: Hárítás vagy Kombinált ugrás
            if (mag > 5.0) {
                if (x < -4.0 && z < -1.0) {
                    gesture = "HÁRÍTÁS / PAJZS FEL";
                } else if (y < -4.5) {
                    gesture = "GUGGOLÁSBÓL FELUGRÁS!";
                } else if (z > 3.0 || x > 3.0) {
                    gesture = "ÁTUGROS FUTÁSBÓL";
                }
            } 
            // 2. INTENZÍV MOZGÁSOK: Futás vagy Szlalom
            else if (mag > 3.0) {
                if (Math.abs(x) > 3.5 && Math.abs(z) > 1.5) {
                    gesture = "FUTÁS KITÉRÉSSEL (SZLALOM)";
                } else if (y > 2.0) {
                    gesture = "LEBUGGOLÁS (FEDEZÉK)";
                } else {
                    gesture = "FUTÁS HELYBEN";
                }
            } 
            // 3. KÖZEPES MOZGÁSOK: Séta, Lépcső, Lökés vagy Fordulás
            else if (mag > 1.5) {
                if (y < -2.5) {
                    gesture = "MAGAS TÉRD (LÉPCSŐZÉS)";
                } else if (Math.abs(y) > 2.0 && Math.abs(x) < 0.5) {
                    gesture = "TÖRZSFORDULÁS (KAMERA)";
                } else if (z > 2.0) {
                    gesture = "KAR KINYÚJTÁSA (LÖKÉS)";
                } else if (Math.abs(z) > 1.8) {
                    gesture = "TERPESZBE ÁLLÁS";
                } else {
                    gesture = "SÉTA HELYBEN";
                }
            } 
            // 4. FINOM MOZGÁSOK: Lopakodás / Lábujjhegy
            else if (mag > 0.7) {
                if (y > 0.8 && Math.abs(x) < 0.5) {
                    gesture = "LOPAKODÁS (VÁDLIEMELÉS)";
                } else {
                    gesture = "FINOM MOZGÁS";
                }
            }

            // Élő kijelzés frissítése a kontroller képernyőjén
            liveGestureDiv.textContent = gesture;
            debugValsDiv.textContent = `Mag: ${mag.toFixed(2)} | X: ${x.toFixed(1)} | Y: ${y.toFixed(1)} | Z: ${z.toFixed(1)}`;
        }
<!-- === 2. RÉSZ VÉGE === -->


<!-- === 3. RÉSZ KEZDETE: SZENZOROK AKTIVÁLÁSA ÉS LEZÁRÁS === -->
        // iOS 13+ engedélykérő ablak kezelése
        async function requestPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                const response = await DeviceMotionEvent.requestPermission();
                return response === 'granted';
            }
            return true; // Android vagy régebbi rendszerek
        }

        // A motor indítása a gombnyomásra
        startBtn.addEventListener('click', async () => {
            const hasPermission = await requestPermission();
            if (!hasPermission) {
                alert("Szenzor hozzáférés megtagadva!");
                return;
            }

            // Képernyőzár és fekvő mód kényszerítése (Kontroller tartáshoz)
            try {
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                }
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch(e) { 
                console.log("Képernyőzár rögzítése nem támogatott."); 
            }

            startBtn.style.display = 'none';
            isRecording = true;

            // Élő szenzorfigyelés elindítása
            window.addEventListener('devicemotion', handleMotion);
            
            liveGestureDiv.textContent = "MOTOR AKTÍV!";
            speak("A mozgásfelismerő motor elindult. Tartsd a telefont két kézzel!");
        });

        // A nyers adatok fogadása másodpercenként 60-szor
        function handleMotion(event) {
            if (!isRecording) return;

            // Gyorsulás gravitáció nélkül (ha elérhető), különben gravitációval együtt
            const acc = event.acceleration || event.accelerationIncludingGravity;
            if (!acc || acc.x === null) return;

            const x = acc.x;
            const y = acc.y;
            const z = acc.z;
            
            // Abszolút elmozdulás ereje (vektorhossz), függetlenül a dőlésszögtől
            const magnitude = Math.sqrt(x*x + y*y + z*z);

            // Adatok átadása a te saját számaiddal kalibrált felismerő funkciónak
            processMovement(x, y, z, magnitude);
        }
    </script>
</body>
</html>
<!-- === 3. RÉSZ VÉGE === -->
