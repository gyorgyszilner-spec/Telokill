<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fal-Kép Motor v5.2</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}

.keret {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
}

#allapot {
    font-size: 34px;
    font-weight: bold;
    color: #00ffcc;
}

#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    width: 90%;
    max-width: 420px;
}

#verzio {
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="keret">

    <button id="inditas">Falhoz kalibrálás</button>

    <div id="verzio">v5.2.0</div>

    <div id="allapot">VÁRAKOZÁS</div>

    <div id="panel">NYOMD A FALHOZ</div>

</div>

<script>

const VERZIÓ = "v5.2.0";

/* =========================
   SZENZOR
========================= */
let fut = false;

let gx = 0, gy = 0, gz = 0;
let rgx = 0, rgy = 0, rgz = 0;

/* =========================
   ÁLLAPOT
========================= */
let allapot = "ALAP";
let dontesIrany = "SEMMI"; // BAL / JOBB / SEMMI

/* =========================
   ENGEDÉLY
========================= */
async function engedely() {
    try {
        if (DeviceMotionEvent?.requestPermission) {
            const r = await DeviceMotionEvent.requestPermission();
            if (r !== "granted") return false;
        }
        return true;
    } catch {
        return false;
    }
}

/* =========================
   INDÍTÁS
========================= */
document.getElementById("inditas").onclick = async () => {

    const ok = await engedely();
    if (!ok) return;

    window.addEventListener("devicemotion", szenzor);

    document.getElementById("allapot").textContent = "NYOMD A FALHOZ";

    setTimeout(() => {
        rgx = gx; rgy = gy; rgz = gz;
        fut = true;
        document.getElementById("allapot").textContent = "FUT";
    }, 1200);
};

/* =========================
   SZENZOR
========================= */
function szenzor(e) {

    const a = e.accelerationIncludingGravity || {x:0,y:0,z:0};

    gx = a.x;
    gy = a.y;
    gz = a.z;

    if (fut) feldolgoz();
}

/* =========================
   DEADZONE (IGAZI SAFE ZÓNA)
========================= */
function dz(v, be, ki, stateActive) {

    if (!stateActive && Math.abs(v) < be) return 0;
    if (stateActive && Math.abs(v) < ki) return 0;

    return v;
}

/* =========================
   LOGIKA
========================= */
function feldolgoz() {

    const dx = gx - rgx;
    const dy = gy - rgy;
    const dzv = gz - rgz;

    /* -------------------------
       DÖNTÉS (BAL / JOBB)
    -------------------------- */

    const BE_D = 1.8;
    const KI_D = 1.0;

    const tiltRaw = Math.atan2(dx, dy) * 180 / Math.PI;

    let ujDontesIrany = dontesIrany;

    if (dontesIrany === "SEMMI" && Math.abs(tiltRaw) > BE_D) {
        ujDontesIrany = tiltRaw > 0 ? "JOBB" : "BAL";
    }

    if (dontesIrany !== "SEMMI" && Math.abs(tiltRaw) < KI_D) {
        ujDontesIrany = "SEMMI";
    }

    dontesIrany = ujDontesIrany;

    /* -------------------------
       GUGGOLÁS / EMELÉS
    -------------------------- */

    const G_BE = 4.0;
    const G_KI = 2.2;

    let ujAllapot = allapot;

    // GUGGOLÁS (negatív)
    if (allapot !== "GUGGOLÁS" && dzv < -G_BE) {
        ujAllapot = "GUGGOLÁS";
    }
    if (allapot === "GUGGOLÁS" && dzv > -G_KI) {
        ujAllapot = "ALAP";
    }

    // EMELÉS (pozitív)
    if (allapot !== "EMELÉS" && dzv > G_BE) {
        ujAllapot = "EMELÉS";
    }
    if (allapot === "EMELÉS" && dzv < G_KI) {
        ujAllapot = "ALAP";
    }

    /* -------------------------
       OUTPUT
    -------------------------- */

    if (ujAllapot === "ALAP" && dontesIrany !== "SEMMI") {
        ujAllapot = "DÖNTÉS " + dontesIrany;
    }

    allapot = ujAllapot;

    document.getElementById("allapot").textContent = allapot;

    document.getElementById("panel").textContent =
        "VERZIÓ: " + VERZIÓ + "\n\n" +
        "DÖNTÉS: " + dontesIrany + "\n" +
        "TILT: " + tiltRaw.toFixed(2) + "\n" +
        "Z: " + dzv.toFixed(2);
}

</script>

</body>
</html>
