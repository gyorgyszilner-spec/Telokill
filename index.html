<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fal-Kép Motor v2.0</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}

.keret {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
}

#allapot {
    font-size: 32px;
    font-weight: bold;
    color: #00ffcc;
}

#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    width: 90%;
    max-width: 420px;
}

#verzio {
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="keret">

    <button id="inditas">Szenzor indítása</button>

    <div id="verzio">v2.0.0</div>

    <div id="allapot">VÁRAKOZÁS</div>

    <div id="panel">NINCS ADAT</div>

</div>

<script>

/* =========================
   VERZIÓ
========================= */
const VERZIÓ = "v2.0.0";

/* =========================
   SZENZOR ADATOK
========================= */
let fut = false;

let beta = 0;   // előre-hátra (guggolás alapja)
let gamma = 0;  // oldal (döntés alapja)

let alapBeta = null;
let alapGamma = null;
let kalibracioDb = 0;

/* =========================
   ÁLLAPOTOK
========================= */
let allapot = "ALAP";

/* =========================
   UI
========================= */
const allapotEl = document.getElementById("allapot");
const panel = document.getElementById("panel");
const inditas = document.getElementById("inditas");

/* =========================
   ENGEDÉLY
========================= */
async function engedely() {

    try {

        if (DeviceOrientationEvent?.requestPermission) {
            const r = await DeviceOrientationEvent.requestPermission();
            if (r !== "granted") return false;
        }

        return true;

    } catch {
        return false;
    }
}

/* =========================
   INDÍTÁS
========================= */
inditas.onclick = async () => {

    const ok = await engedely();

    if (!ok) {
        allapotEl.textContent = "NINCS ENGEDÉLY";
        return;
    }

    window.addEventListener("deviceorientation", szenzor);

    fut = true;
    allapotEl.textContent = "FUT";
};

/* =========================
   SZENZOR
========================= */
function szenzor(e) {

    if (!fut) return;

    beta = e.beta || 0;
    gamma = e.gamma || 0;

    feldolgoz();
}

/* =========================
   KALIBRÁCIÓ
========================= */
function kalibral() {

    if (kalibracioDb < 30) {

        alapBeta = (alapBeta || 0) + beta;
        alapGamma = (alapGamma || 0) + gamma;

        kalibracioDb++;

        if (kalibracioDb === 30) {
            alapBeta /= 30;
            alapGamma /= 30;
        }

        return false;
    }

    return true;
}

/* =========================
   DÖNTÉS (KORMÁNY) LOGIKA
========================= */
function dontesAktiv(ferdeseg) {

    const BE = 18;   // belépési küszöb
    const KI = 10;   // kilépési küszöb

    if (allapot !== "DÖNTÉS" && Math.abs(ferdeseg) > BE) {
        return true;
    }

    if (allapot === "DÖNTÉS" && Math.abs(ferdeseg) < KI) {
        return false;
    }

    return allapot === "DÖNTÉS";
}

/* =========================
   GUGGOLÁS LOGIKA (FELBORULÁS)
========================= */
function guggolasAktiv(kinyilas) {

    const BE = 45;   // csak nagy billenésnél indul
    const KI = 30;   // visszaállás

    if (allapot !== "GUGGOLÁS" && kinyilas > BE) {
        return true;
    }

    if (allapot === "GUGGOLÁS" && kinyilas < KI) {
        return false;
    }

    return allapot === "GUGGOLÁS";
}

/* =========================
   FŐ LOGIKA
========================= */
function feldolgoz() {

    if (!kalibral()) {
        allapotEl.textContent = "KALIBRÁLÁS...";
        return;
    }

    const ferdeseg = gamma - alapGamma;           // DÖNTÉS tengely
    const kinyilas = Math.abs(beta - alapBeta);   // GUGGOLÁS tengely

    /* ---- ÁLLAPOT DÖNTÉS (PRIORITÁS: GUGGOLÁS) ---- */

    let ujAllapot = "ALAP";

    if (guggolasAktiv(kinyilas)) {
        ujAllapot = "GUGGOLÁS";
    }
    else if (dontesAktiv(ferdeseg)) {
        ujAllapot = "DÖNTÉS";
    }

    allapot = ujAllapot;

    /* ---- UI ---- */
    allapotEl.textContent = allapot;

    panel.textContent =
        "VERZIÓ: " + VERZIÓ + "\n\n" +
        "FERDESÉG (DÖNTÉS): " + ferdeseg.toFixed(1) + "\n" +
        "KINYÍLÁS (GUGGOLÁS): " + kinyilas.toFixed(1) + "\n\n" +
        "ÁLLAPOT: " + allapot;
}

</script>

</body>
</html>
