<script>

let isRecording = false;

// UI elemek
const startBtn = document.getElementById('startBtn');
const liveStateDiv = document.getElementById('live-state');
const liveZoneDiv = document.getElementById('live-zone');
const liveTurnDiv = document.getElementById('live-turn');
const debugValsDiv = document.getElementById('debug-vals');

// Rendszer állapot
let systemState = "IDLE";
let sensorAlive = false;
let sensorWatchdog = null;

// ==============================
// 🔊 SPEAK
// ==============================
function speak(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        setTimeout(() => {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'hu-HU';
            u.rate = 1.0;
            window.speechSynthesis.speak(u);
        }, 50);
    }
}

// ==============================
// 📡 PERMISSION (iOS SAFE)
// ==============================
async function requestPermissions() {
    try {
        let motionGranted = true;
        let orientGranted = true;

        if (typeof DeviceMotionEvent !== 'undefined' &&
            typeof DeviceMotionEvent.requestPermission === 'function') {

            const res = await DeviceMotionEvent.requestPermission();
            motionGranted = (res === 'granted');
        }

        if (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') {

            const res = await DeviceOrientationEvent.requestPermission();
            orientGranted = (res === 'granted');
        }

        return motionGranted && orientGranted;

    } catch (e) {
        console.log("Permission error:", e);
        return false;
    }
}

// ==============================
// 🚀 INDÍTÁS
// ==============================
startBtn.addEventListener('click', async () => {

    systemState = "STARTING";

    startBtn.disabled = true;
    startBtn.textContent = "INDÍTÁS...";

    liveStateDiv.textContent = "INDÍTÁS...";
    debugValsDiv.textContent = "Szenzor inicializálás...";

    // ⚠️ listener ELŐBB (iOS stabilitás miatt fontos)
    window.addEventListener('deviceorientation', handleOrientation);
    window.addEventListener('devicemotion', handleMotion);

    const ok = await requestPermissions();

    if (!ok) {
        systemState = "ERROR_PERMISSION";

        liveStateDiv.textContent = "SZENZOR MEGTAGADVA";
        debugValsDiv.textContent = "Permission denied";

        startBtn.disabled = false;
        startBtn.textContent = "ÚJRAINDÍTÁS";
        return;
    }

    // fullscreen + landscape (ha lehet)
    try {
        if (document.documentElement.requestFullscreen) {
            await document.documentElement.requestFullscreen();
        }
        if (screen.orientation && screen.orientation.lock) {
            await screen.orientation.lock('landscape');
        }
    } catch (e) {
        console.log("Fullscreen/orientation not supported");
    }

    isRecording = true;
    systemState = "CALIBRATING";

    speak("Rendszer elindult. Kalibrálás folyamatban.");

    // watchdog: ha nincs szenzor adat
    sensorWatchdog = setTimeout(() => {
        if (!sensorAlive) {
            systemState = "ERROR_NO_SENSOR";

            liveStateDiv.textContent = "NINCS SZENZOR ADAT";
            debugValsDiv.textContent =
                "Lehetséges ok: HTTPS hiányzik / böngésző tilt / iOS restriction";

            startBtn.disabled = false;
            startBtn.textContent = "ÚJRAINDÍTÁS";
        }
    }, 3000);
});

<!-- === 2. RÉSZ KEZDETE: SZENZOR INPUT STABILIZÁLÁS v3 === -->

// Globális szenzor állapot
let orientAlpha = 0, orientBeta = 0, orientGamma = 0;
let sensorAlive = false;
let lastSensorTime = 0;

// ------------------------------
// 📐 ORIENTATION (stabilizált)
// ------------------------------
function handleOrientation(event) {
    if (!isRecording) return;

    if (event.alpha !== null && !isNaN(event.alpha)) {
        orientAlpha = event.alpha;
    }
    if (event.beta !== null && !isNaN(event.beta)) {
        orientBeta = event.beta;
    }
    if (event.gamma !== null && !isNaN(event.gamma)) {
        orientGamma = event.gamma;
    }

    sensorAlive = true;
    lastSensorTime = performance.now();
}

// ------------------------------
// 🏃 MOTION (stabilizált)
// ------------------------------
function handleMotion(event) {
    if (!isRecording) return;

    const acc = event.acceleration || event.accelerationIncludingGravity;

    let magnitude = 0;

    if (acc &&
        acc.x !== null && acc.y !== null && acc.z !== null &&
        !isNaN(acc.x) && !isNaN(acc.y) && !isNaN(acc.z)) {

        magnitude = Math.sqrt(acc.x * acc.x + acc.y * acc.y + acc.z * acc.z);
    }

    const rot = event.rotationRate;

    let rotBeta = 0;
    let rotGamma = 0;

    if (rot) {
        rotBeta = rot.beta || 0;
        rotGamma = rot.gamma || 0;
    }

    // 🚨 sensor alive jelzés
    sensorAlive = true;
    lastSensorTime = performance.now();

    // watchdog reset
    if (sensorWatchdog) {
        clearTimeout(sensorWatchdog);
        sensorWatchdog = setTimeout(() => {
            if (!sensorAlive) {
                systemState = "ERROR_NO_SENSOR";
                liveStateDiv.textContent = "NINCS SZENZOR ADAT";
                debugValsDiv.textContent = "Sensor timeout (no motion data)";
                startBtn.disabled = false;
                startBtn.textContent = "ÚJRAINDÍTÁS";
            }
        }, 3000);
    }

    // továbbítás a logikai rétegnek
    processSensors(magnitude, orientAlpha, orientBeta, orientGamma, rotBeta, rotGamma);
}

// ------------------------------
// ⏱ SENSOR HEARTBEAT CHECK
// ------------------------------
setInterval(() => {
    if (!isRecording) return;

    const now = performance.now();

    if (sensorAlive && (now - lastSensorTime > 2500)) {
        sensorAlive = false;
        systemState = "ERROR_SENSOR_STALLED";

        liveStateDiv.textContent = "SZENZOR MEGÁLLT";
        debugValsDiv.textContent = "No sensor update (stalled stream)";

        startBtn.disabled = false;
        startBtn.textContent = "ÚJRAINDÍTÁS";
    }
}, 2000);

<!-- === 3. RÉSZ KEZDETE: MOZGÁS LOGIKA + KALIBRÁCIÓ v3 === -->

// ------------------------------
// 🧱 KALIBRÁCIÓS ALAPOK
// ------------------------------
let baseAlpha = null, baseBeta = null, baseGamma = null;
let calCount = 0;
const CAL_MAX = 50;

// ------------------------------
// 📦 MAG BUFFER (stabilizálás)
// ------------------------------
const BUFFER_SIZE = 10;
let magBuffer = [];

// ------------------------------
// 🧠 FŐ PROCESSZOR
// ------------------------------
function processSensors(rawMag, alpha, beta, gamma, rotBeta, rotGamma) {

    if (!isRecording) return;

    // ==========================
    // 1. KALIBRÁCIÓ
    // ==========================
    if (baseBeta === null && calCount < CAL_MAX) {

        baseAlpha = (baseAlpha || 0) + alpha;
        baseBeta = (baseBeta || 0) + beta;
        baseGamma = (baseGamma || 0) + gamma;

        calCount++;

        liveStateDiv.textContent = "KALIBRÁLÁS...";

        if (calCount === CAL_MAX) {
            baseAlpha /= CAL_MAX;
            baseBeta /= CAL_MAX;
            baseGamma /= CAL_MAX;
        }

        return;
    }

    // ==========================
    // 2. MAGNITÚDUS SIMÍTÁS
    // ==========================
    magBuffer.push(rawMag);

    if (magBuffer.length > BUFFER_SIZE) {
        magBuffer.shift();
    }

    const mag =
        magBuffer.reduce((a, b) => a + b, 0) / magBuffer.length;

    // ==========================
    // 3. RELATÍV SZÖGEK
    // ==========================
    const relativeTilt = gamma - baseGamma;
    const relativeCrouch = beta - baseBeta;

    let zone = "ALAP";
    let state = "ÁLL";
    let turn = "KÖZÉP";

    // ==========================
    // 4. GUGGOLÁS
    // ==========================
    if (relativeCrouch < -25) {
        zone = "GUGGOLÁS";
        state = "LE GUGGOLVA";
    }

    // ==========================
    // 5. TÖRZSDÖNTÉS
    // ==========================
    else if (relativeTilt > 30) {
        zone = "JOBB DŐLÉS";
        state = "SZLALOM JOBBRA";
        turn = "JOBB";
    }

    else if (relativeTilt < -30) {
        zone = "BAL DŐLÉS";
        state = "SZLALOM BALRA";
        turn = "BAL";
    }

    // ==========================
    // 6. ALAPÁLLÁS (MOZGÁS LOGIKA)
    // ==========================
    else {

        if (rotBeta > 55 || rotGamma > 55) {
            state = "FORDULÁS JOBBRA";
            turn = "JOBB FORDULÁS";
        }

        else if (rotBeta < -55 || rotGamma < -55) {
            state = "FORDULÁS BALRA";
            turn = "BAL FORDULÁS";
        }

        else {
            if (mag > 2.0) {
                state = "FUT";
            }
            else if (mag > 0.7) {
                state = "SÉTA";
            }
            else {
                state = "ÁLL";
            }
        }
    }

    // ==========================
    // 7. UGRÁS DETEKT
    // ==========================
    if (mag > 4.0) {
        state = "UGRÁS";
    }

    // ==========================
    // 8. UI FRISSÍTÉS
    // ==========================
    liveZoneDiv.textContent = "ZÓNA: " + zone;
    liveStateDiv.textContent = state;
    liveTurnDiv.textContent = turn;

    debugValsDiv.textContent =
        `MAG: ${mag.toFixed(2)} | ` +
        `dCrouch: ${relativeCrouch.toFixed(1)} | ` +
        `dTilt: ${relativeTilt.toFixed(1)}`;

    systemState = "RUNNING";
}
