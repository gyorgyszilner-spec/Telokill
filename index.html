<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controller API Debug v2</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}

.wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 15px;
}

#state {
    font-size: 28px;
    font-weight: bold;
    color: #00ffcc;
}

#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    width: 80%;
    max-width: 420px;
}
</style>
</head>

<body>

<div class="wrap">

    <button id="startBtn">Szenzor indítása</button>

    <div id="state">IDLE</div>

    <div id="panel">WAITING FOR SENSOR...</div>

</div>

<script>

/* =========================
   SENSOR STATE
========================= */
let running = false;

let alpha = 0, beta = 0, gamma = 0;

let baseBeta = null;
let baseGamma = null;
let calCount = 0;

/* =========================
   STEP ENGINE (IMPORTANT)
========================= */
let lastMag = 0;
let stepTimes = [];
const STEP_WINDOW = 2000;

/* =========================
   CONTROLLER API
========================= */
const Controller = (() => {

    let state = {
        mode: "idle",
        move: 0,
        turn: 0
    };

    return {
        set: (s) => state = s,
        get: () => state
    };

})();

/* =========================
   UI
========================= */
const stateEl = document.getElementById("state");
const panel = document.getElementById("panel");
const startBtn = document.getElementById("startBtn");

/* =========================
   PERMISSIONS
========================= */
async function requestPermissions() {

    try {

        if (DeviceMotionEvent?.requestPermission) {
            const r = await DeviceMotionEvent.requestPermission();
            if (r !== "granted") return false;
        }

        if (DeviceOrientationEvent?.requestPermission) {
            const r = await DeviceOrientationEvent.requestPermission();
            if (r !== "granted") return false;
        }

        return true;

    } catch {
        return false;
    }
}

/* =========================
   START
========================= */
startBtn.onclick = async () => {

    const ok = await requestPermissions();

    if (!ok) {
        stateEl.textContent = "NO PERMISSION";
        return;
    }

    window.addEventListener("deviceorientation", onOri);
    window.addEventListener("devicemotion", onMot);

    running = true;
    stateEl.textContent = "RUNNING";
};

/* =========================
   SENSOR HANDLERS
========================= */
function onOri(e) {

    if (!running) return;

    alpha = e.alpha || 0;
    beta = e.beta || 0;
    gamma = e.gamma || 0;
}

function onMot(e) {

    if (!running) return;

    const a = e.acceleration || {};
    const mag = Math.sqrt((a.x||0)**2 + (a.y||0)**2 + (a.z||0)**2);

    process(mag, alpha, beta, gamma);
}

/* =========================
   STEP DETECTOR
========================= */
function detectStep(mag) {

    const threshold = 1.1;

    const isPeak = (mag > threshold && lastMag <= threshold);

    lastMag = mag;

    if (isPeak) {

        const now = Date.now();
        stepTimes.push(now);

        // csak az utolsó 2 mp
        stepTimes = stepTimes.filter(t => now - t < STEP_WINDOW);
    }
}

/* =========================
   MOVE FROM STEPS
========================= */
function getMove() {

    const steps = stepTimes.length;

    if (steps >= 6) return 1;     // FUTÁS
    if (steps >= 2) return 0.5;   // SÉTA
    return 0;                     // ÁLL
}

/* =========================
   CORE LOGIC
========================= */
function process(mag, a, b, g) {

    /* --- CALIBRATION --- */
    if (baseBeta === null && calCount < 30) {

        baseBeta = (baseBeta || 0) + b;
        baseGamma = (baseGamma || 0) + g;

        calCount++;

        if (calCount === 30) {
            baseBeta /= 30;
            baseGamma /= 30;
        }

        stateEl.textContent = "CALIBRATING";
        return;
    }

    const dTilt = g - baseGamma;
    const dCrouch = b - baseBeta;

    /* --- MODE DETECTION --- */
    let mode = "stand";

    if (dCrouch < -20) mode = "crouch";
    else if (Math.abs(dTilt) > 30) mode = "tilt";

    /* --- STEP ENGINE --- */
    detectStep(mag);
    const move = getMove();

    /* --- TURN LOGIC --- */
    let turn = 0;

    if (mode === "stand") {
        if (Math.abs(dTilt) > 25) {
            turn = Math.max(-1, Math.min(1, dTilt / 60));
        }
    }

    /* --- OUTPUT --- */
    const output = {
        mode,
        move,
        turn
    };

    Controller.set(output);

    /* --- UI --- */
    const s = Controller.get();

    stateEl.textContent = s.mode.toUpperCase();

    panel.textContent =
        "MODE: " + s.mode + "\n" +
        "MOVE: " + s.move.toFixed(2) + "\n" +
        "TURN: " + s.turn.toFixed(2) + "\n\n" +
        "STEPS: " + stepTimes.length + "\n" +
        "dTilt: " + dTilt.toFixed(1) + "\n" +
        "dCrouch: " + dCrouch.toFixed(1) + "\n" +
        "MAG: " + mag.toFixed(2);

}

</script>

</body>
</html>
