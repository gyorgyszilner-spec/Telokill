<!-- === 1. RÉSZ KEZDETE: CONTROLLER INTERFACE ÉS CSS v2.4.2 === -->
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heatwave Finomhangolt Állapotmotor</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #111; 
            color: #fff; 
            padding: 0; 
            margin: 0; 
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .container { 
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            padding: 20px;
        }
        .version-tag { 
            color: #ffeb3b; 
            font-weight: bold; 
            font-size: 14px; 
            position: absolute;
            top: 15px;
            letter-spacing: 1px; 
        }
        #startBtn { 
            background: #ff5722; 
            color: white; 
            border: none; 
            padding: 20px 40px; 
            font-size: 24px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            z-index: 10;
        }
        #live-state { 
            font-size: 42px; 
            font-weight: bold; 
            margin: 10px 0; 
            color: #ff5722; 
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 87, 34, 0.5);
            text-align: center;
        }
        #live-turn {
            font-size: 24px;
            font-weight: bold;
            color: #00e5ff;
            margin-bottom: 15px;
        }
        #debug-vals { 
            font-size: 13px; 
            font-family: monospace;
            color: #666; 
            text-align: center;
            line-height: 1.4;
        }
        .ctrl-btn {
            position: absolute;
            width: 95px;
            height: 95px;
            border: 4px solid rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.02);
            pointer-events: auto;
        }
        #leftBtn { left: 45px; }
        #rightBtn { right: 45px; }
        .ctrl-btn.active {
            border-color: #00ffcc;
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.15);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ÚJ FINOMHANGOLT VERZIÓSZÁM -->
        <div class="version-tag">VERZIÓ: v2.4.2 - FINE TUNED LOGIC</div>
        
        <button id="startBtn">▶ MOTOR INDÍTÁSA</button>

        <div id="live-state">KÉSZEN ÁLL</div>
        <div id="live-turn">KÖZÉP</div>
        
        <div id="debug-vals">Kalibráció indítására vár...</div>

        <div id="leftBtn" class="ctrl-btn">BAL</div>
        <div id="rightBtn" class="ctrl-btn">JOBB</div>
    </div>
<!-- === 1. RÉSZ VÉGE === -->

<!-- === 2. RÉSZ KEZDETE: FINOMHANGOLT DÖNTÉSI MÁTRIX === -->
    <script>
        let isRecording = false;

        // HTML elemek referenciái
        const startBtn = document.getElementById('startBtn');
        const liveStateDiv = document.getElementById('live-state');
        const liveTurnDiv = document.getElementById('live-turn');
        const debugValsDiv = document.getElementById('debug-vals');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        // Gombok vizuális visszajelzései
        leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); leftBtn.classList.add('active'); });
        leftBtn.addEventListener('touchend', () => { leftBtn.classList.remove('active'); });
        rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); rightBtn.classList.add('active'); });
        rightBtn.addEventListener('touchend', () => { rightBtn.classList.remove('active'); });

        // KALIBRÁCIÓS ALAPÉRTÉKEK
        let baseBeta = null;
        let baseAlpha = null;
        let calLogsCount = 0;

        // PUFFEREK AZ ADATSIMÍTÁSHOZ (A séta és futás megnyugtatására)
        const BUFFER_SIZE = 15;
        let magBuffer = [];

        // IDŐABLAKOS UGRÁSSZŰRŐ VÁLTOZÓK
        let airTimeStart = 0;
        let jumpDetectedUntil = 0;

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                setTimeout(() => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'hu-HU';
                    utterance.rate = 1.0;
                    window.speechSynthesis.speak(utterance);
                }, 50);
            }
        }

        function processSensors(rawX, rawY, rawZ, rawMag, currentAlpha, currentBeta) {
            if (!isRecording) return;

            // 1. Kalibrálás az indítás utáni első 50 pontból
            if (baseBeta === null && calLogsCount < 50) {
                if (currentBeta !== null) {
                    baseBeta = (baseBeta || 0) + currentBeta;
                    baseAlpha = (baseAlpha || 0) + currentAlpha;
                    calLogsCount++;
                    if (calLogsCount === 50) {
                        baseBeta /= 50;
                        baseAlpha /= 50;
                    }
                }
                liveStateDiv.textContent = "KALIBRÁLÁS...";
                return;
            }

            // 2. Séta és futás adatok betolása a simító pufferbe
            magBuffer.push(rawMag); if (magBuffer.length > BUFFER_SIZE) magBuffer.shift();
            if (magBuffer.length < BUFFER_SIZE) return;

            const mag = magBuffer.reduce((a, b) => a + b, 0) / magBuffer.length;

            const now = performance.now();
            let state = "ÁLL";
            let turn = "KÖZÉP";

            // 3. FORDULÁS DETEKTÁLÁSA (30 fokos golyóálló holtzónával!)
            let alphaDiff = currentAlpha - baseAlpha;
            if (alphaDiff > 180) alphaDiff -= 360;
            if (alphaDiff < -180) alphaDiff += 360;

            if (alphaDiff > 30.0) turn = "FORDULÁS BALRA";       
            else if (alphaDiff < -30.0) turn = "FORDULÁS JOBBRA"; 
            else turn = "KÖZÉP"; // Fixen visszaáll, ha 30 fokon belül vagy

            // 4. GUGGOLÁS DETEKTÁLÁSA (Áthangolva a felfelé dőlő képernyőhöz!)
            const betaDiff = currentBeta - baseBeta;

            // 5. UGRÁS SZŰRŐ (Puffer nélkül, nyers adatokból, azonnali reakcióval)
            if (rawMag < 0.6) {
                if (airTimeStart === 0) airTimeStart = now;
            } else {
                // Ha volt súlytalanság, és utána hirtelen becsapódás érkezik
                if (airTimeStart > 0 && rawMag > 3.8 && (now - airTimeStart) > 60) {
                    jumpDetectedUntil = now + 600; // 600 ms-ig tartjuk a felugrást a kijelzőn
                }
                airTimeStart = 0;
            }

            // 6. FŐ ÁLLAPOTGÉP PRIORITÁSI SORRENDBEN
            if (now < jumpDetectedUntil) {
                state = "FELUGROTT!";
            } else if (betaDiff < -10.0) { // Felfelé dőlés jelzi a guggolást a te kéztartásod szerint
                state = "LE VAN GUGGOLVA";
            } else if (mag > 2.0) {      
                state = "FUT";
            } else if (mag > 0.7) {      
                state = "SÉTÁL";
            }

            // Élő felület frissítése
            liveStateDiv.textContent = state;
            liveTurnDiv.textContent = turn;
            debugValsDiv.textContent = `MAG: ${mag.toFixed(2)} | dBeta: ${betaDiff.toFixed(1)}° | dAlpha: ${alphaDiff.toFixed(1)}°`;
        }
<!-- === 2. RÉSZ VÉGE === -->

<!-- === 3. RÉSZ KEZDETE: SZOFTVERES ESZKÖZÖK ÉS SENSORS AKTIVÁLÁSA v2.4.2 === -->
        // Globális változók a giroszkóp szögeinek átmeneti tárolására
        let latestAlpha = 0;
        let latestBeta = 0;

        // iOS 13+ engedélykérő ablak kezelése mindkét szenzorra
        async function requestPermissions() {
            try {
                let motionGranted = true;
                let orientGranted = true;

                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    const res = await DeviceMotionEvent.requestPermission();
                    motionGranted = (res === 'granted');
                }
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const res = await DeviceOrientationEvent.requestPermission();
                    orientGranted = (res === 'granted');
                }
                return motionGranted && orientGranted;
            } catch(e) {
                return true; // Androidon vagy asztali böngészőben automatikusan true
            }
        }

        // A motor indítása a gombnyomásra
        startBtn.addEventListener('click', async () => {
            const hasPermission = await requestPermissions();
            if (!hasPermission) {
                alert("Szenzor hozzáférés megtagadva!");
                return;
            }

            // Képernyőzár és fekvő mód kényszerítése
            try {
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                }
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch(e) { 
                console.log("Képernyőzár rögzítése nem támogatott."); 
            }

            startBtn.style.display = 'none';
            isRecording = true;

            // Élő szenzorok aktiválása
            window.addEventListener('deviceorientation', handleOrientation);
            window.addEventListener('devicemotion', handleMotion);
            
            speak("A finomhangolt motor elindult. Tartsd mozdulatlanul a kalibráláshoz!");
        });

        function handleOrientation(event) {
            if (!isRecording) return;
            if (event.alpha !== null) latestAlpha = event.alpha;
            if (event.beta !== null) latestBeta = event.beta;
        }

        function handleMotion(event) {
            if (!isRecording) return;

            const acc = event.acceleration || event.accelerationIncludingGravity;
            if (!acc || acc.x === null) return;

            const x = acc.x;
            const y = acc.y;
            const z = acc.z;
            
            // Abszolút elmozdulás ereje
            const magnitude = Math.sqrt(x*x + y*y + z*z);

            processSensors(x, y, z, magnitude, latestAlpha, latestBeta);
        }
    </script>
</body>
</html>
<!-- === 3. RÉSZ VÉGE === -->
