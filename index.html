<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fal-Kép Motor v6.1</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}

.keret {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
}

#allapot {
    font-size: 34px;
    font-weight: bold;
    color: #00ffcc;
}

#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    width: 92%;
    max-width: 440px;
}

#verzio {
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="keret">

    <button id="inditas">Falhoz kalibrálás</button>

    <div id="verzio">v6.1.0</div>

    <div id="allapot">VÁRAKOZÁS</div>

    <div id="panel">NYOMD A FALHOZ</div>

</div>

<script>

const VERZIÓ = "v6.1.0";

/* =========================
   SZENZOR
========================= */
let fut = false;

let gx = 0, gy = 0, gz = 0;
let rgx = 0, rgy = 0, rgz = 0;

/* =========================
   ÁLLAPOTOK
========================= */
let dontes = "SEMMI";       // BAL / JOBB / SEMMI
let fuggoleges = "SEMMI";   // EMELÉS / GUGGOLÁS / SEMMI

/* =========================
   ENGEDÉLY
========================= */
async function engedely() {
    try {
        if (DeviceMotionEvent?.requestPermission) {
            const r = await DeviceMotionEvent.requestPermission();
            if (r !== "granted") return false;
        }
        return true;
    } catch {
        return false;
    }
}

/* =========================
   INDÍTÁS
========================= */
document.getElementById("inditas").onclick = async () => {

    const ok = await engedely();
    if (!ok) return;

    document.getElementById("allapot").textContent = "NYOMD A FALHOZ";

    window.addEventListener("devicemotion", szenzor);

    setTimeout(() => {
        rgx = gx;
        rgy = gy;
        rgz = gz;

        fut = true;
        document.getElementById("allapot").textContent = "FUT";
    }, 1200);
};

/* =========================
   SZENZOR
========================= */
function szenzor(e) {

    const a = e.accelerationIncludingGravity || {x:0,y:0,z:0};

    gx = a.x;
    gy = a.y;
    gz = a.z;

    if (fut) feldolgoz();
}

/* =========================
   STABIL STATE MACHINE
========================= */
function stateMachine(value, state, neg, pos, be, ki) {

    const CENTER = 15; // 🟢 stabil ALAP zóna

    // 🟢 mindig SEMMI, ha középen van
    if (Math.abs(value) < CENTER) {
        return "SEMMI";
    }

    // belépés SEMMI-ből
    if (state === "SEMMI") {
        if (value > be) return pos;
        if (value < -be) return neg;
        return "SEMMI";
    }

    // tartás BAL/NEG
    if (state === neg) {
        if (value > -ki) return "SEMMI";
        return neg;
    }

    // tartás JOBB/POS
    if (state === pos) {
        if (value < ki) return "SEMMI";
        return pos;
    }

    return "SEMMI";
}

/* =========================
   FŐ LOGIKA
========================= */
function feldolgoz() {

    const dx = gx - rgx;
    const dy = gy - rgy;
    const dz = gz - rgz;

    /* -------------------------
       DÖNTÉS (BAL / JOBB)
    -------------------------- */

    const tiltRaw = Math.atan2(dx, dy) * 180 / Math.PI;

    dontes = stateMachine(
        tiltRaw,
        dontes,
        "BAL",
        "JOBB",
        25,   // belépés
        15    // kilépés
    );

    /* -------------------------
       GUGGOLÁS / EMELÉS
       (FELIRATOK MÁR FELCSERÉLVE)
    -------------------------- */

    fuggoleges = stateMachine(
        dz,
        fuggoleges,
        "EMELÉS",
        "GUGGOLÁS",
        5,
        3
    );

    /* -------------------------
       OUTPUT
    -------------------------- */

    let nagy = "ALAP";

    if (fuggoleges !== "SEMMI") {
        nagy = fuggoleges;
    }
    else if (dontes !== "SEMMI") {
        nagy = "DÖNTÉS " + dontes;
    }

    document.getElementById("allapot").textContent = nagy;

    document.getElementById("panel").textContent =
        "VERZIÓ: " + VERZIÓ + "\n\n" +
        "DÖNTÉS: " + dontes + "\n" +
        "FÜGGŐLEGES: " + fuggoleges + "\n\n" +
        "TILT RAW: " + tiltRaw.toFixed(2) + "\n" +
        "DZ: " + dz.toFixed(2);
}

</script>

</body>
</html>
