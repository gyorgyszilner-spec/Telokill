<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Heatwave Smart Logger v2.6.0</title>

<style>
body {
    margin:0;
    background:#111;
    color:#fff;
    font-family:sans-serif;
    overflow:hidden;
    user-select:none;
}

.container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
}

#startBtn{
    padding:20px 40px;
    font-size:22px;
    background:#ff5722;
    border:none;
    border-radius:10px;
    color:white;
    font-weight:bold;
}

#instruction{
    font-size:24px;
    margin:20px;
    text-align:center;
    color:#ffeb3b;
}

#timer{
    font-size:60px;
    color:#e91e63;
    font-weight:bold;
}

#status{
    position:absolute;
    bottom:10px;
    font-size:12px;
    color:#aaa;
    white-space:pre-line;
    text-align:center;
}

.progress{
    width:50%;
    height:8px;
    background:#333;
    margin-top:15px;
    border-radius:5px;
}

#bar{
    height:100%;
    width:0%;
    background:#4caf50;
}

.version{
    position:absolute;
    top:10px;
    color:#ff9800;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="version">v2.6.0 SAFE EXPORT BUILD</div>

    <button id="startBtn">▶ INDÍTÁS</button>

    <div id="instruction">Készen állás</div>
    <div id="timer">--</div>

    <div class="progress"><div id="bar"></div></div>

    <div id="status">Várakozás...</div>

</div>

<script>

/* =========================
   STATE (STABIL, FAIL-SAFE)
   ========================= */

let logs = [];
let isRecording = false;
let startTime = 0;

let currentIndex = 0;

/* szenzor értékek */
let rawX = 0, rawY = 0, rawZ = 0;
let rawAlpha = 0;

/* simított értékek */
let ax = 0, ay = 0, az = 0;

/* UI */
const startBtn = document.getElementById("startBtn");
const instruction = document.getElementById("instruction");
const timer = document.getElementById("timer");
const status = document.getElementById("status");
const bar = document.getElementById("bar");

/* =========================
   SPEAK
   ========================= */

function speak(txt){
    if(!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();

    setTimeout(()=>{
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = "hu-HU";
        u.rate = 1;
        window.speechSynthesis.speak(u);
    },50);
}

/* =========================
   SENSOR PERMISSION
   ========================= */

async function requestSensors(){
    try{
        if(DeviceMotionEvent?.requestPermission){
            if(await DeviceMotionEvent.requestPermission() !== "granted")
                return false;
        }
        if(DeviceOrientationEvent?.requestPermission){
            if(await DeviceOrientationEvent.requestPermission() !== "granted")
                return false;
        }
        return true;
    }catch(e){
        return false;
    }
}

/* =========================
   START (STABIL INDÍTÁS)
   ========================= */

startBtn.onclick = async () => {

    const ok = await requestSensors();
    if(!ok){
        alert("Szenzor tiltva!");
        return;
    }

    logs = [];
    isRecording = false;
    currentIndex = 0;
    startTime = performance.now();

    startBtn.style.display = "none";

    window.addEventListener("devicemotion", onMotion);
    window.addEventListener("deviceorientation", onOrient);

    countdown(3, "Tartsd stabilan az eszközt", () => {
        isRecording = true;
        startTest();
    });
};

/* =========================
   COUNTDOWN
   ========================= */

function countdown(sec, msg, cb){
    instruction.textContent = msg;
    speak(msg);

    let t = sec;
    timer.textContent = t;

    const i = setInterval(()=>{
        t--;
        timer.textContent = t;

        if(t <= 0){
            clearInterval(i);
            cb();
        }
    },1000);
}

/* =========================
   SENSOR HANDLERS
   ========================= */

function onOrient(e){
    rawAlpha = e.alpha || 0;
}

function onMotion(e){

    const g = e.accelerationIncludingGravity;
    if(!g){
        // 🔥 FAILSAFE: akkor is logolunk később exportnál
        return;
    }

    rawX = g.x || 0;
    rawY = g.y || 0;
    rawZ = g.z || 0;

    /* simítás */
    ax = ax * 0.8 + rawX * 0.2;
    ay = ay * 0.8 + rawY * 0.2;
    az = az * 0.8 + rawZ * 0.2;

    if(!isRecording) return;

    const t = performance.now() - startTime;

    logs.push({
        t: Math.round(t),
        x: rawX,
        y: rawY,
        z: rawZ,
        ax: ax,
        ay: ay,
        az: az,
        a: rawAlpha
    });
}

/* =========================
   MINIMUM GUARANTEE (🔥 FONTOS)
   =========================
   Ez biztosítja, hogy SOHA ne legyen üres export
   ========================= */

function ensureAtLeastOneLog(){

    if(logs.length > 0) return;

    logs.push({
        t: 0,
        x: 0,
        y: 0,
        z: 0,
        ax: 0,
        ay: 0,
        az: 0,
        a: 0
    });
}

<script>

/* =========================
   EXERCISE FLOW (egyszerű, stabil)
   ========================= */

const exercises = [
    "Séta",
    "Futás",
    "Kontroll",
    "Oldalmozgás",
    "Guggolás",
    "Ugrás",
    "Végső kontroll"
];

/* =========================
   FLOW CONTROL
   ========================= */

let exerciseIndex = 0;
let exerciseTimer = null;

/* =========================
   START FLOW
   ========================= */

function startTest(){
    exerciseIndex = 0;
    nextExercise();
}

/* =========================
   NEXT EXERCISE
   ========================= */

function nextExercise(){

    if(exerciseIndex >= exercises.length){
        finishTest();
        return;
    }

    const name = exercises[exerciseIndex];

    instruction.textContent = name;
    speak(name);

    let timeLeft = 6;
    timer.textContent = timeLeft;

    clearInterval(exerciseTimer);

    exerciseTimer = setInterval(()=>{

        timeLeft--;
        timer.textContent = timeLeft;

        bar.style.width = ((exerciseIndex / exercises.length) * 100) + "%";

        if(timeLeft <= 0){
            clearInterval(exerciseTimer);
            exerciseIndex++;
            nextExercise();
        }

    },1000);
}

/* =========================
   FINISH (FAILSAFE KÖZPONT)
   ========================= */

function finishTest(){

    isRecording = false;

    // 🔥 FONTOS: mindig legyen legalább 1 log
    ensureAtLeastOneLog();

    window.removeEventListener("devicemotion", onMotion);
    window.removeEventListener("deviceorientation", onOrient);

    instruction.textContent = "Kész!";
    timer.textContent = "✔";

    speak("Mérés kész. Az adat exportálható.");

    showExportButton();
}

/* =========================
   EXPORT GOMB FELKÉSZÍTÉS
   ========================= */

function showExportButton(){

    startBtn.style.display = "block";
    startBtn.textContent = "⬇ CSV LETÖLTÉSE";
    startBtn.style.background = "#4caf50";

    startBtn.onclick = downloadCSV;
}

<script>

/* =========================
   CSV EXPORT (ROBUST VERSION)
   ========================= */

function downloadCSV(){

    // 🔥 FAILSAFE: soha ne legyen üres export
    ensureAtLeastOneLog();

    let csv = "";

    /* UTF-8 BOM (Excel miatt kötelező mobil + Windows esetén) */
    csv += "\uFEFF";
    csv += "t,x,y,z,ax,ay,az,a\n";

    for(const l of logs){
        csv += `${l.t},${l.x},${l.y},${l.z},${l.ax},${l.ay},${l.az},${l.a}\n`;
    }

    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;

    const now = new Date();
    const stamp =
        now.getFullYear() + "-" +
        String(now.getMonth()+1).padStart(2,"0") + "-" +
        String(now.getDate()).padStart(2,"0") + "_" +
        String(now.getHours()).padStart(2,"0") + "-" +
        String(now.getMinutes()).padStart(2,"0");

    a.download = `heatwave_log_${stamp}.csv`;

    document.body.appendChild(a);

    // 🔥 FONTOS: delay kell Android Chrome miatt
    setTimeout(()=>{
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }, 200);
}

/* =========================
   SAFETY FALLBACK (extra védelem)
   ========================= */

window.addEventListener("error", (e)=>{
    console.log("Hiba elnyelve:", e.message);
});

</script>

<script>

/* =========================
   STABILITÁS + GUARD RÉTEG
   ========================= */

/* 🔥 max log méret (memória védelem mobilon) */
const MAX_LOGS = 50000;

/* =========================
   MOTION HANDLER (SAFE)
   ========================= */

function onMotion(e){

    try {

        const g = e?.accelerationIncludingGravity;

        // 🔥 SAFE DEFAULT (soha nem dob hibát)
        const x = (g && typeof g.x === "number") ? g.x : 0;
        const y = (g && typeof g.y === "number") ? g.y : 0;
        const z = (g && typeof g.z === "number") ? g.z : 0;

        rawX = x;
        rawY = y;
        rawZ = z;

        /* smoothing */
        ax = ax * 0.8 + x * 0.2;
        ay = ay * 0.8 + y * 0.2;
        az = az * 0.8 + z * 0.2;

        if(!isRecording) return;

        // 🔥 memória védelem
        if(logs.length > MAX_LOGS){
            logs.shift(); // régi törlése
        }

        const t = performance.now() - startTime;

        logs.push({
            t: Math.round(t),
            x, y, z,
            ax, ay, az,
            a: rawAlpha
        });

    } catch(err){
        // 🔥 soha nem állhat meg a rendszer
        console.log("motion error suppressed:", err);
    }
}

/* =========================
   ORIENTATION SAFE
   ========================= */

function onOrient(e){

    try {
        rawAlpha = (typeof e?.alpha === "number") ? e.alpha : rawAlpha;
    } catch(err){
        // ignore
    }
}

/* =========================
   GLOBAL ERROR PROTECTION
   ========================= */

window.addEventListener("error", (e)=>{
    console.log("SAFE ERROR:", e.message);
    return true; // nem szakítja meg a flow-t
});

window.addEventListener("unhandledrejection", (e)=>{
    console.log("PROMISE ERROR SUPPRESSED:", e.reason);
    e.preventDefault();
});

</script>

<script>

/* =========================
   INIT / WIRING (FINAL STEP)
   ========================= */

/* 🔥 események bekötése */
function init(){

    // start gomb
    startBtn.addEventListener("click", async ()=>{

        const ok = await requestSensors();
        if(!ok){
            alert("Szenzor hozzáférés megtagadva");
            return;
        }

        logs = [];
        isRecording = false;
        exerciseIndex = 0;

        startTime = performance.now();

        startBtn.style.display = "none";

        window.addEventListener("devicemotion", onMotion, { passive: true });
        window.addEventListener("deviceorientation", onOrient, { passive: true });

        countdown(3, "Stabil pozíció", ()=>{
            isRecording = true;
            startTest();
        });

    });

    // safety: export gomb alapból disabled logika
    startBtn.textContent = "▶ INDÍTÁS";
}

/* =========================
   STARTUP AUTOMATIC CALL
   ========================= */

init();

/* =========================
   EXTRA SAFETY NET
   ========================= */

/* ha a finish nem futna valamiért */
setTimeout(()=>{

    if(isRecording && logs.length === 0){
        console.log("AUTO-FORCE FINISH TRIGGER");

        ensureAtLeastOneLog();
        finishTest();
    }

}, 60000); // 1 perc watchdog

</script>

</body>
</html>
