<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fal-Kép Motor v7.2</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}

.keret {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
}

#allapot {
    font-size: 34px;
    font-weight: bold;
    color: #00ffcc;
}

#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    width: 92%;
    max-width: 440px;
}

#verzio { opacity: 0.7; }
</style>
</head>

<body>

<div class="keret">
    <button id="inditas">Falhoz kalibrálás</button>
    <div id="verzio">v7.2.0</div>
    <div id="allapot">VÁRAKOZÁS</div>
    <div id="panel">NYOMD A FALHOZ</div>
</div>

<script>
const VERZIÓ = "v7.2.0";
let fut = false;

// Nyers és szűrt adatok
let ax = 0, ay = 0, az = 0;
let rax = 0, ray = 0, raz = 0;

// Állapotok
let dontes = "SEMMI";
let fuggoleges = "SEMMI";

/* =========================================================================
   JÁRÁS / FUTÁS ÉS ZÁROLÁS VÁLTOZÓI
   ========================================================================= */
let utolsoLepesIdo = 0;
let lepesIdokozok = [];
let utolsoGyorsulasZ = 0;
let utolsoMozgasIdo = 0;
let mozgásÁllapot = "STOP";
let mozgásZárolva = false; // 🔥 Ez a retesz felel a zárolásért megállásig

// Szenzor engedélyezés
async function engedely() {
    try {
        if (typeof DeviceMotionEvent !== 'undefined' && DeviceMotionEvent.requestPermission) {
            const r = await DeviceMotionEvent.requestPermission();
            return r === "granted";
        }
        return true;
    } catch {
        return false;
    }
}

// Indítás és Kalibráció
document.getElementById("inditas").onclick = async () => {
    const ok = await engedely();
    if (!ok) {
        alert("Szenzor hozzáférés megtagadva!");
        return;
    }

    document.getElementById("allapot").textContent = "KALIBRÁLÁS...";
    window.addEventListener("devicemotion", szenzor);

    setTimeout(() => {
        rax = ax;
        ray = ay;
        raz = az;
        fut = true;
        document.getElementById("allapot").textContent = "ALAP";
    }, 1500);
};

function szenzor(e) {
    const a = e.accelerationIncludingGravity || {x:0, y:0, z:0};
    
    ax = ax * 0.7 + a.x * 0.3;
    ay = ay * 0.7 + a.y * 0.3;
    az = az * 0.7 + a.z * 0.3;

    if (fut) {
        detectLepes(az - raz);
        feldolgoz();
    }
}

/* =========================================================================
   VALÓDI HOLTTÉR ÉS HISZTERÉZIS ÁLLAPONGÉP
   ========================================================================= */
function vizsgalAllapot(ertek, jelenlegiState, negNev, posNev, beKuszob, kiKuszob) {
    if (jelenlegiState === "SEMMI") {
        if (ertek > beKuszob) return posNev;
        if (ertek < -beKuszob) return negNev;
        return "SEMMI";
    }
    if (jelenlegiState === posNev) {
        if (ertek < kiKuszob) return "SEMMI";
        return posNev;
    }
    if (jelenlegiState === negNev) {
        if (ertek > -kiKuszob) return "SEMMI";
        return negNev;
    }
    return "SEMMI";
}

/* =========================================================================
   LÉPÉSDETEKTOR
   ========================================================================= */
function detectLepes(jelenlegiDz) {
    const most = performance.now();
    
    if (Math.abs(jelenlegiDz) > 1.6 && Math.abs(utolsoGyorsulasZ) <= 1.6) {
        if (most - utolsoLepesIdo > 220) {
            const idokoz = most - utolsoLepesIdo;
            utolsoLepesIdo = most;
            utolsoMozgasIdo = most;

            lepesIdokozok.push(idokoz);
            if (lepesIdokozok.length > 3) lepesIdokozok.shift();
        }
    }
    utolsoGyorsulasZ = jelenlegiDz;
}

function feldolgoz() {
    const most = performance.now();

    // 1. LÉPÉSRITMUS ÉS SEBESSÉG ELŐ-KIÉRTÉKELÉSE
    let aktualisSebesseg = "STOP";
    if (most - utolsoMozgasIdo < 650 && lepesIdokozok.length > 0) {
        const atlagIdokoz = lepesIdokozok.reduce((a, b) => a + b, 0) / lepesIdokozok.length;
        aktualisSebesseg = (atlagIdokoz < 420) ? "FUTÁS" : "JÁRÁS";
    } else {
        lepesIdokozok = [];
    }

    /* =========================================================================
       ZÁROLÁSI LOGIKA (RETESZ)
       - Ha már mozgásban vagyunk, nem engedjük kiértékelni a statikus irányokat.
       - Csak akkor oldunk fel, ha a sebesség visszaesik "STOP"-ra.
       ========================================================================= */
    if (mozgásZárolva) {
        if (aktualisSebesseg === "STOP") {
            mozgásZárolva = false; // Feloldás 0 sebességnél
            mozgásÁllapot = "STOP";
        } else {
            mozgásÁllapot = aktualisSebesseg; // Tartja a járást/futást menet közben
        }
    }

    // 2. STATIKUS ÁLLAPOTOK (Csak akkor frissülnek, ha nincs aktív mozgás-zárolás)
    const aktualisSzog = Math.atan2(ax, ay) * 180 / Math.PI;
    const kalibraltSzog = Math.atan2(rax, ray) * 180 / Math.PI;
    
    let dolesElteres = aktualisSzog - kalibraltSzog;
    if (dolesElteres > 180) dolesElteres -= 360;
    if (dolesElteres < -180) dolesElteres += 360;

    const dz = az - raz;

    if (!mozgásZárolva) {
        // 🔥 KISZÉLESÍTETT KÜSZÖBÖK: 15/8 helyett 22/10 fok a tágasabb alapállapotért
        // 🔥 FIX: "BAL" és "JOBB" megcserélése a paraméterekben
        dontes = vizsgalAllapot(dolesElteres, dontes, "JOBB", "BAL", 22, 10);

        // KISZÉLESÍTETT KÜSZÖBÖK: 2.5/0.8 helyett 3.2/1.0 m/s² függőleges mozgásnál
        fuggoleges = vizsgalAllapot(dz, fuggoleges, "EMELÉS", "GUGGOLÁS", 3.2, 1.0);

        // Ha a statikus állapotok alapon vannak ("SEMMI") ÉS észlelünk új lépést, bereteszelünk mozgásra
        if (dontes === "SEMMI" && fuggoleges === "SEMMI" && aktualisSebesseg !== "STOP") {
            mozgásZárolva = true;
            mozgásÁllapot = aktualisSebesseg;
        }
    }

    // 3. MEGJELENÍTÉS ÉS HIERARCHIA
    let kijelzendoAllapot = "ALAP";
    
    if (mozgásZárolva) {
        // Ha be van reteszelve a mozgás, az felülbírál mindent a teljes leállásig
        kijelzendoAllapot = mozgásÁllapot;
    } else if (fuggoleges !== "SEMMI") {
        kijelzendoAllapot = fuggoleges;
    } else if (dontes !== "SEMMI") {
        kijelzendoAllapot = "DÖNTÉS " + dontes;
    }

    document.getElementById("allapot").textContent = kijelzendoAllapot;

    // Debug panel
    document.getElementById("panel").textContent =
        "VERZIÓ: " + VERZIÓ + "\n\n" +
        "DÖNTÉS STÁTUSZ: " + dontes + "\n" +
        "FÜGGŐLEGES STÁTUSZ: " + fuggoleges + "\n" +
        "MOZGÁS STÁTUSZ: " + mozgásÁllapot + " (Zárolva: " + mozgásZárolva + ")\n\n" +
        "DŐLÉS ELTÉRÉS (fok): " + dolesElteres.toFixed(1) + "°\n" +
        "DZ (gyorsulás delta): " + dz.toFixed(2) + " m/s²";
}
</script>

</body>
</html>
