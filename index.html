<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fal-Kép Motor v5.0</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}

.keret {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
}

#allapot {
    font-size: 34px;
    font-weight: bold;
    color: #00ffcc;
}

#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    width: 90%;
    max-width: 420px;
}

#verzio {
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="keret">

    <button id="inditas">Falhoz nyomás (kalibrálás)</button>

    <div id="verzio">v5.0.0</div>

    <div id="allapot">VÁRAKOZÁS</div>

    <div id="panel">NYOMD A FALHOZ</div>

</div>

<script>

/* =========================
   VERZIÓ
========================= */
const VERZIÓ = "v5.0.0";

/* =========================
   SZENZOR + REFERENCIA
========================= */
let fut = false;

let gx = 0, gy = 0, gz = 0;
let rgx = 0, rgy = 0, rgz = 0;

/* =========================
   UI
========================= */
const allapotEl = document.getElementById("allapot");
const panel = document.getElementById("panel");
const inditas = document.getElementById("inditas");

/* =========================
   ENGEDÉLY
========================= */
async function engedely() {

    try {
        if (DeviceMotionEvent?.requestPermission) {
            const r = await DeviceMotionEvent.requestPermission();
            if (r !== "granted") return false;
        }
        return true;
    } catch {
        return false;
    }
}

/* =========================
   INDÍTÁS (KALIBRÁCIÓ)
========================= */
inditas.onclick = async () => {

    const ok = await engedely();
    if (!ok) {
        allapotEl.textContent = "NINCS ENGEDÉLY";
        return;
    }

    allapotEl.textContent = "NYOMD A FALHOZ";

    window.addEventListener("devicemotion", szenzor);

    setTimeout(() => {

        rgx = gx;
        rgy = gy;
        rgz = gz;

        fut = true;
        allapotEl.textContent = "FUT";

    }, 1000);
};

/* =========================
   SZENZOR
========================= */
function szenzor(e) {

    const a = e.accelerationIncludingGravity || {x:0,y:0,z:0};

    gx = a.x;
    gy = a.y;
    gz = a.z;

    if (!fut) return;

    feldolgoz();
}

/* =========================
   SAFE ZÓNA
========================= */
function deadzone(v, hatar) {
    return Math.abs(v) < hatar ? 0 : v;
}

/* =========================
   FŐ LOGIKA
========================= */
function feldolgoz() {

    // relatív vektor
    const dx = gx - rgx;
    const dy = gy - rgy;
    const dz = gz - rgz;

    // SAFE ZÓNA
    const SAFE = 0.8;

    const x = deadzone(dx, SAFE);
    const y = deadzone(dy, SAFE);
    const z = deadzone(dz, SAFE);

    // 🟡 DÖNTÉS (oldalirány)
    let dontes = Math.atan2(x, y) * 180 / Math.PI;

    // 🔴 GUGGOLÁS / EMELÉS
    let guggolas = 0;
    let emeles = 0;

    if (z < 0) guggolas = z;
    if (z > 0) emeles = z;

    // --- ÁLLAPOT ---
    let allapot = "ALAP";

    // 🔴 GUGGOLÁS prioritás
    if (Math.abs(z) > 3) {
        allapot = z < 0 ? "GUGGOLÁS" : "EMELÉS";
    }
    // 🟡 DÖNTÉS
    else if (Math.abs(dontes) > 12) {
        allapot = "DÖNTÉS";
    }

    // --- UI ---
    allapotEl.textContent = allapot;

    panel.textContent =
        "VERZIÓ: " + VERZIÓ + "\n\n" +
        "DÖNTÉS (°): " + dontes.toFixed(2) + "\n" +
        "GUGGOLÁS: " + guggolas.toFixed(2) + "\n" +
        "EMELÉS: " + emeles.toFixed(2) + "\n\n" +
        "X: " + x.toFixed(2) + "\n" +
        "Y: " + y.toFixed(2) + "\n" +
        "Z: " + z.toFixed(2);
}

</script>

</body>
</html>
