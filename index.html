<!-- === 1. RÉSZ KEZDETE: CONTROLLER INTERFACE ÉS CSS v2.5.0 === -->
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heatwave Abszolút Állapotmotor</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #111; 
            color: #fff; 
            padding: 0; 
            margin: 0; 
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .container { 
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            padding: 20px;
        }
        .version-tag { 
            color: #00ffcc; 
            font-weight: bold; 
            font-size: 14px; 
            position: absolute;
            top: 15px;
            letter-spacing: 1px; 
        }
        #startBtn { 
            background: #ff5722; 
            color: white; 
            border: none; 
            padding: 20px 40px; 
            font-size: 24px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            z-index: 10;
        }
        #live-state { 
            font-size: 42px; 
            font-weight: bold; 
            margin: 10px 0; 
            color: #ffeb3b; 
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 235, 59, 0.5);
            text-align: center;
        }
        #live-turn {
            font-size: 24px;
            font-weight: bold;
            color: #00e5ff;
            margin-bottom: 15px;
        }
        #debug-vals { 
            font-size: 13px; 
            font-family: monospace;
            color: #666; 
            text-align: center;
            line-height: 1.4;
        }
        .ctrl-btn {
            position: absolute;
            width: 95px;
            height: 95px;
            border: 4px solid rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.02);
            pointer-events: auto;
        }
        #leftBtn { left: 45px; }
        #rightBtn { right: 45px; }
        .ctrl-btn.active {
            border-color: #00ffcc;
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.15);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ÚJ, ATOMBIZTOS VERZIÓSZÁM -->
        <div class="version-tag">VERZIÓ: v2.5.0 - ABSOLUTE GYRO ENGINE</div>
        
        <button id="startBtn">▶ MOTOR INDÍTÁSA</button>

        <div id="live-state">KÉSZEN ÁLL</div>
        <div id="live-turn">KÖZÉP</div>
        
        <div id="debug-vals">Indításra vár...</div>

        <div id="leftBtn" class="ctrl-btn">BAL</div>
        <div id="rightBtn" class="ctrl-btn">JOBB</div>
    </div>
<!-- === 1. RÉSZ VÉGE === -->

<!-- === 2. RÉSZ KEZDETE: ABSOLUTE GYRO ÉS KORMÁNYZÁSI LOGIKA === -->
    <script>
        let isRecording = false;

        // HTML elemek referenciái
        const startBtn = document.getElementById('startBtn');
        const liveStateDiv = document.getElementById('live-state');
        const liveTurnDiv = document.getElementById('live-turn');
        const debugValsDiv = document.getElementById('debug-vals');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        // Gombok vizuális visszajelzései
        leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); leftBtn.classList.add('active'); });
        leftBtn.addEventListener('touchend', () => { leftBtn.classList.remove('active'); });
        rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); rightBtn.classList.add('active'); });
        rightBtn.addEventListener('touchend', () => { rightBtn.classList.remove('active'); });

        // PUFFEREK AZ ADATSIMÍTÁSHOZ (A séta és futás megnyugtatására)
        const BUFFER_SIZE = 10;
        let magBuffer = [];

        // IDŐABLAKOS UGRÁSSZŰRŐ VÁLTOZÓK
        let airTimeStart = 0;
        let jumpDetectedUntil = 0;

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                setTimeout(() => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'hu-HU';
                    utterance.rate = 1.0;
                    window.speechSynthesis.speak(utterance);
                }, 50);
            }
        }

        function processSensors(rawMag, alpha, beta, gamma, rotAlpha, rotBeta, rotGamma) {
            if (!isRecording) return;

            // 1. Rázkódási adatok simítása
            magBuffer.push(rawMag); if (magBuffer.length > BUFFER_SIZE) magBuffer.shift();
            if (magBuffer.length < BUFFER_SIZE) return;
            const mag = magBuffer.reduce((a, b) => a + b, 0) / magBuffer.length;

            const now = performance.now();
            let state = "ÁLL";
            let turn = "KÖZÉP";

            // 2. ABSZOLÚT GUGGOLÁS (A te kérésedre: ha a kijelző 45° és 90° között felfelé néz)
            // Fekvő módban a Gamma vagy a Beta tengely jelzi ezt a dőlést az eszköz típusától függően
            const isCrouched = (beta > 45 && beta < 90) || (gamma > 45 && gamma < 90);

            // 3. JAVÍTOTT ELFORDULÁS (Giroszkóp tiszta szögsebességből - Nincs elhangolódás!)
            // Ha a forgási sebesség (rotBeta/rotGamma) határozott, akkor éppen fordul a törzs
            let isTurning = false;
            if (rotBeta > 45 || rotGamma > 45) {
                turn = "FORDULÁS JOBBRA";
                isTurning = true;
            } else if (rotBeta < -45 || rotGamma < -45) {
                turn = "FORDULÁS BALRA";
                isTurning = true;
            }

            // 4. ÚJ: KORMÁNYZÁS / TÖRZSDÖNTÉS DETEKTÁLÁSA (Fixen legalább 30 fokos oldalra dőlésnél)
            // Ha nem fordul a törzs, de a telefont elbillented mint a kormányt (Fekvő módban ez a Beta/Gamma dőlése)
            if (!isTurning) {
                if (beta < -30 || gamma < -30) {
                    turn = "KORMÁNYZÁS BALRA (DÖNTÉS)";
                } else if (beta > 30 || gamma > 30) {
                    turn = "KORMÁNYZÁS JOBBRA (DÖNTÉS)";
                }
            }

            // 5. UGRÁS SZŰRŐ (Nyers adatokból, pufferelés nélkül)
            if (rawMag < 0.6) {
                if (airTimeStart === 0) airTimeStart = now;
            } else {
                if (airTimeStart > 0 && rawMag > 3.8 && (now - airTimeStart) > 60) {
                    jumpDetectedUntil = now + 500;
                }
                airTimeStart = 0;
            }

            // 6. FŐ ÁLLAPOTGÉP PRIORITÁSI SORRENDBEN
            if (now < jumpDetectedUntil) {
                state = "FELUGROTT!";
            } else if (isCrouched) { 
                state = "LE VAN GUGGOLVA";
            } else if (isTurning) {
                state = "FORDULÁS KÖZBEN"; // Ha fordul a törzs, letiltjuk a hamis lépéseket!
            } else if (mag > 2.0) {      
                state = "FUT";
            } else if (mag > 0.7) {      
                state = "SÉTÁL";
            }

            // Felület frissítése
            liveStateDiv.textContent = state;
            liveTurnDiv.textContent = turn;
            debugValsDiv.textContent = `MAG: ${mag.toFixed(2)} | Ang-B: ${beta.toFixed(0)}° | Ang-G: ${gamma.toFixed(0)}° | Rot-B: ${rotBeta.toFixed(0)}`;
        }
<!-- === 2. RÉSZ VÉGE === -->

<!-- === 3. RÉSZ KEZDETE: HARDVERES SZENZOROK ÖSSZEKÖTÉSE v2.5.0 === -->
        // Globális változók a dőlésszögek és forgási sebességek átmeneti tárolására
        let orientAlpha = 0, orientBeta = 0, orientGamma = 0;

        // iOS 13+ engedélykérő ablak kezelése mindkét szenzorra
        async function requestPermissions() {
            try {
                let motionGranted = true;
                let orientGranted = true;

                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    const res = await DeviceMotionEvent.requestPermission();
                    motionGranted = (res === 'granted');
                }
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const res = await DeviceOrientationEvent.requestPermission();
                    orientGranted = (res === 'granted');
                }
                return motionGranted && orientGranted;
            } catch(e) {
                return true; // Androidon automatikusan engedélyezve van
            }
        }

        // A motor indítása a gombnyomásra
        startBtn.addEventListener('click', async () => {
            const hasPermission = await requestPermissions();
            if (!hasPermission) {
                alert("Szenzor hozzáférés megtagadva!");
                return;
            }

            // Képernyőzár és fekvő mód kényszerítése
            try {
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                }
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch(e) { 
                console.log("Képernyőzár rögzítése nem támogatott."); 
            }

            startBtn.style.display = 'none';
            isRecording = true;

            // Mindkét natív eseménykezelő feliratkoztatása
            window.addEventListener('deviceorientation', handleOrientation);
            window.addEventListener('devicemotion', handleMotion);
            
            speak("Az abszolút motor elindult. Használd a telefont kormányként!");
        });

        // 1. Abszolút szögek (Guggolás és Kormányzás/Döntés ellenőrzéséhez)
        function handleOrientation(event) {
            if (!isRecording) return;
            if (event.alpha !== null) orientAlpha = event.alpha;
            if (event.beta !== null) orientBeta = event.beta;
            if (event.gamma !== null) orientGamma = event.gamma;
        }

        // 2. Gyorsulás és Szögsebesség (Séta, Futás, Ugrás és Törzsfordítás ellenőrzéséhez)
        function handleMotion(event) {
            if (!isRecording) return;

            // Nyers gyorsulási vektor hossza
            const acc = event.acceleration || event.accelerationIncludingGravity;
            let magnitude = 0;
            if (acc && acc.x !== null) {
                magnitude = Math.sqrt(acc.x*acc.x + acc.y*acc.y + acc.z*acc.z);
            }

            // Tiszta forgási szögsebességek lekérése (fok/másodperc)
            const rot = event.rotationRate;
            let rotAlpha = 0, rotBeta = 0, rotGamma = 0;
            if (rot) {
                rotAlpha = rot.alpha || 0;
                rotBeta = rot.beta || 0;
                rotGamma = rot.gamma || 0;
            }

            // Mind a 7 paraméter átadása az új, intelligens állapotgépnek
            processSensors(magnitude, orientAlpha, orientBeta, orientGamma, rotAlpha, rotBeta, rotGamma);
        }
    </script>
</body>
</html>
<!-- === 3. RÉSZ VÉGE === -->
