<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heatwave Irányított Kalibráció</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #111; 
            color: #fff; 
            padding: 20px; 
            text-align: center; 
            margin: 0; 
        }
        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            padding-top: 5vh; 
        }
        button { 
            background: #ff5722; 
            color: white; 
            border: none; 
            padding: 20px 40px; 
            font-size: 22px; 
            margin: 20px auto; 
            border-radius: 8px; 
            cursor: pointer; 
            display: block; 
            width: 85%; 
        }
        #instruction { 
            font-size: 32px; 
            font-weight: bold; 
            margin: 30px 0; 
            color: #ffeb3b; 
            min-height: 80px; 
            padding: 0 10px; 
        }
        #timer { 
            font-size: 64px; 
            font-weight: bold; 
            color: #e91e63; 
            margin: 20px 0; 
        }
        #status { 
            font-size: 18px; 
            color: #aaa; 
            margin-top: 40px; 
        }
        .progress-bar { 
            background: #333; 
            height: 10px; 
            border-radius: 5px; 
            width: 85%; 
            margin: 20px auto; 
            overflow: hidden; 
        }
        #progress { 
            background: #4caf50; 
            height: 100%; 
            width: 0%; 
            transition: width 0.3s; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Heatwave Kalibráció</h1>
        <p>A program végigvezet az összes mozgásformán (10-10 mp). Készülj fel, indítás után tedd a telefont a zsebedbe!</p>

        <button id="startBtn">▶ TESZT INDÍTÁSA</button>

        <div id="instruction">Nyomd meg az indítást!</div>
        <div id="timer">--</div>

        <div class="progress-bar">
            <div id="progress"></div>
        </div>

        <div id="status">Állapot: Várakozás</div>
    </div>

        <script>
        // --- 2. RÉSZ KEZDETE: GYAKORLATOK ÉS HANG LOGIKA ---
        
        // A sivatagi edzésmátrix pontos listája (minden gyakorlat 10 másodperc)
        const exercises = [
            { id: "Seta_helyben", name: "Séta helyben (Kényelmesen)" },
            { id: "Futas_helyben", name: "Futás helyben (Tempósan)" },
            { id: "Kilepes_oldalra", name: "Kilépés jobbra-balra (Sávváltás)" },
            { id: "Seta_magas_terd", name: "Séta helyben, magas térdemeléssel" },
            { id: "Futas_magas_terd", name: "Futás helyben, magas térdemeléssel" },
            { id: "Futas_kitereessel", name: "Futás kitéréssel (Szlalom jobbra-balra)" },
            { id: "Guggolas", name: "Guggolás és felállás (Folyamatosan)" },
            { id: "Kitores", name: "Kitörés előre (Váltott lábbal)" },
            { id: "Ugras_guggolasbol", name: "Ugrás leguggolásból (Felugrás)" },
            { id: "Ugras_futasbol", name: "Ugrás futásból (Átugrás)" },
            { id: "Labujjhegyre_allat", name: "Lábujjhegyre állás és vissza" },
            { id: "Rugasi_akcio", name: "Előrerúgás / Hátrarúgás (Váltva)" }
        ];

        let currentExerciseIndex = 0;
        let sensorLogs = [];
        let isRecording = false;
        let startTimestamp = 0;
        let exerciseTimer = null;
        let currentExerciseId = "Felkeszules";

        // HTML elemek referenciái
        const startBtn = document.getElementById('startBtn');
        const instructionDiv = document.getElementById('instruction');
        const timerDiv = document.getElementById('timer');
        const statusDiv = document.getElementById('status');
        const progressDiv = document.getElementById('progress');

        // Magyar nyelvű szövegfelolvasó (TTS) funkció a zsebben történő irányításhoz
        function speak(text) {
            if ('speechSynthesis' in window) {
                // Biztonsági leállítás az átfedések elkerülésére
                window.speechSynthesis.cancel(); 
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'hu-HU';
                utterance.rate = 1.1; // Kicsit gyorsabb tempó a ritmus miatt
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- 2. RÉSZ VÉGE ---

                // --- 3. RÉSZ KEZDETE: SZENZOROK ÉS FÁJL MENTÉS ---

        // iOS 13+ engedélykérő ablak kezelése
        async function requestPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                const response = await DeviceMotionEvent.requestPermission();
                return response === 'granted';
            }
            return true; // Android vagy régebbi rendszerek
        }

        startBtn.addEventListener('click', async () => {
            const hasPermission = await requestPermission();
            if (!hasPermission) {
                alert("Szenzor hozzáférés megtagadva!");
                return;
            }

            // Képernyőzár aktiválása fekvő módba a fix belső tengelyekért
            try {
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                }
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch(e) { 
                console.log("Képernyőzár nem támogatott ezen az eszközön."); 
            }

            startBtn.style.display = 'none';
            sensorLogs = [];
            currentExerciseIndex = 0;
            startTimestamp = performance.now();
            isRecording = true;

            window.addEventListener('devicemotion', handleMotion);
            
            // 5 másodperces felkészülés a zsebbe tételre
            startCountdown(5, "Tedd a telefont a zsebedbe!", () => {
                runNextExercise();
            });
        });

        function startCountdown(seconds, message, onComplete) {
            currentExerciseId = "Felkeszules";
            instructionDiv.textContent = message;
            speak(message);
            
            let timeLeft = seconds;
            timerDiv.textContent = timeLeft;

            const interval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    onComplete();
                } else {
                    timerDiv.textContent = timeLeft;
                }
            }, 1000);
        }

        function runNextExercise() {
            if (currentExerciseIndex >= exercises.length) {
                finishCalibration();
                return;
            }

            const currentEx = exercises[currentExerciseIndex];
            currentExerciseId = currentEx.id;
            instructionDiv.textContent = currentEx.name;
            statusDiv.textContent = `Gyakorlat: ${currentExerciseIndex + 1} / ${exercises.length}`;
            progressDiv.style.width = `${((currentExerciseIndex + 1) / exercises.length) * 100}%`;
            
            speak(currentEx.name);

            let timeLeft = 10;
            timerDiv.textContent = timeLeft;

            exerciseTimer = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(exerciseTimer);
                    currentExerciseIndex++;
                    runNextExercise();
                } else {
                    timerDiv.textContent = timeLeft;
                    if (timeLeft <= 3) {
                        speak(timeLeft.toString()); // Utolsó 3 mp visszaszámlálása
                    }
                }
            }, 1000);
        }

        function handleMotion(event) {
            if (!isRecording) return;

            const acc = event.acceleration || event.accelerationIncludingGravity;
            if (!acc || acc.x === null) return;

            const x = acc.x;
            const y = acc.y;
            const z = acc.z;
            const magnitude = Math.sqrt(x*x + y*y + z*z);
            const relTime = (performance.now() - startTimestamp).toFixed(0);

            // Adatsor hozzáadása a memóriához az aktuális gyakorlat azonosítójával
            sensorLogs.push({
                time: relTime,
                exercise: currentExerciseId,
                x: x.toFixed(4),
                y: y.toFixed(4),
                z: z.toFixed(4),
                mag: magnitude.toFixed(4)
            });
        }

        function finishCalibration() {
            isRecording = false;
            window.removeEventListener('devicemotion', handleMotion);
            
            instructionDiv.textContent = "Kalibráció Kész!";
            timerDiv.textContent = "✔";
            statusDiv.textContent = "Fájl letöltése...";
            speak("Gratulálok, a kalibráció befejeződött. Mentsd el a fájlt!");

            downloadCSV();
        }

        function downloadCSV() {
            if (sensorLogs.length === 0) return;

            let csvContent = "data:text/csv;charset=utf-8,Time_ms,Exercise_ID,Acc_X,Acc_Y,Acc_Z,Magnitude\n";
            
            sensorLogs.forEach(row => {
                csvContent += `${row.time},${row.exercise},${row.x},${row.y},${row.z},${row.mag}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `heatwave_kalibracio_${Date.now()}.csv`);
            document.body.appendChild(link);
            
            link.click();
            document.body.removeChild(link);
            
            statusDiv.textContent = "Mentve! Küldd el az adatokat elemzésre.";
            startBtn.style.display = 'block';
            startBtn.textContent = "▶ Újraindítás";
        }
    </script>
</body>
</html>
// --- 3. RÉSZ VÉGE ---
