<!-- === 1. RÉSZ KEZDETE: CONTROLLER INTERFACE ÉS CSS v2.3.0 === -->
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heatwave Kétkezes Stabil Motor</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #111; 
            color: #fff; 
            padding: 0; 
            margin: 0; 
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .container { 
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            padding: 20px;
        }
        .version-tag { 
            color: #00ffcc; 
            font-weight: bold; 
            font-size: 14px; 
            position: absolute;
            top: 15px;
            letter-spacing: 1px; 
        }
        #startBtn { 
            background: #ff5722; 
            color: white; 
            border: none; 
            padding: 20px 40px; 
            font-size: 24px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            z-index: 10;
        }
        #live-gesture { 
            font-size: 36px; 
            font-weight: bold; 
            margin: 15px 0; 
            color: #ffeb3b; 
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 235, 59, 0.4);
            text-align: center;
        }
        #debug-vals { 
            font-size: 14px; 
            font-family: monospace;
            color: #888; 
            margin-top: 10px;
        }
        .ctrl-btn {
            position: absolute;
            width: 95px;
            height: 95px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.03);
            pointer-events: auto;
        }
        #leftBtn { left: 45px; }
        #rightBtn { right: 45px; }
        .ctrl-btn.active {
            border-color: #00ffcc;
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.15);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ÚJ VERZIÓSZÁM KIJELZÉS -->
        <div class="version-tag">VERZIÓ: v2.3.0 - STABLE SMOOTHING ENGINE</div>
        
        <button id="startBtn">▶ MOTOR INDÍTÁSA</button>

        <div id="live-gesture">KÉSZEN ÁLL</div>
        
        <div id="debug-vals">Mag: 0.00 | X: 0.00 | Y: 0.00 | Z: 0.00</div>

        <div id="leftBtn" class="ctrl-btn">BAL</div>
        <div id="rightBtn" class="ctrl-btn">JOBB</div>
    </div>
<!-- === 1. RÉSZ VÉGE === -->

<!-- === 2. RÉSZ KEZDETE: ADATSIMÍTÓ ÉS IDŐABLAKOS MATRUX === -->
    <script>
        let isRecording = false;

        // Vizuális elemek referenciái
        const startBtn = document.getElementById('startBtn');
        const liveGestureDiv = document.getElementById('live-gesture');
        const debugValsDiv = document.getElementById('debug-vals');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        // Érintések kezelése a két kontroller gombhoz
        leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); leftBtn.classList.add('active'); });
        leftBtn.addEventListener('touchend', () => { leftBtn.classList.remove('active'); });
        rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); rightBtn.classList.add('active'); });
        rightBtn.addEventListener('touchend', () => { rightBtn.classList.remove('active'); });

        // BESZÉD-SZINTETIZÁTOR
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                setTimeout(() => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'hu-HU';
                    utterance.rate = 1.0;
                    window.speechSynthesis.speak(utterance);
                }, 50);
            }
        }

        // --- ADATSIMÍTÓ (BUFFER) ÉS IDŐZÁR VÁLTOZÓK ---
        const BUFFER_SIZE = 15; // Utolsó 15 pont átlagát nézzük (~0.25 másodperc)
        let magBuffer = [];
        let xBuffer = [], yBuffer = [], zBuffer = [];
        
        let lastGesture = "MOZDULATLAN";
        let gestureLockTime = 0; // Megakadályozza a hirtelen ugrálást
        const LOCK_DELAY = 400;  // Minimum 400 ms-ig megtartunk egy felismert akciót

        function processMovement(rawX, rawY, rawZ, rawMag) {
            // 1. Adatok betolása a simító pufferbe
            magBuffer.push(rawMag); if (magBuffer.length > BUFFER_SIZE) magBuffer.shift();
            xBuffer.push(rawX);     if (xBuffer.length > BUFFER_SIZE) xBuffer.shift();
            yBuffer.push(rawY);     if (yBuffer.length > BUFFER_SIZE) yBuffer.shift();
            zBuffer.push(rawZ);     if (zBuffer.length > BUFFER_SIZE) zBuffer.shift();

            // Ha még nincs elég adat a simításhoz, várunk
            if (magBuffer.length < BUFFER_SIZE) return;

            // 2. Matematikai átlagolás (Low-Pass Filter szimuláció)
            const mag = magBuffer.reduce((a, b) => a + b, 0) / magBuffer.length;
            const x = xBuffer.reduce((a, b) => a + b, 0) / xBuffer.length;
            const y = yBuffer.reduce((a, b) => a + b, 0) / yBuffer.length;
            const z = zBuffer.reduce((a, b) => a + b, 0) / zBuffer.length;

            const now = performance.now();
            let currentGesture = "MOZDULATLAN";

            // 3. LOGIKAI DÖNTÉSI MÁTRIX A SIMÍTOTT ÉRTÉKEKKEL
            if (mag > 4.5) {
                if (x < -2.5 && z < -0.8) {
                    currentGesture = "HÁRÍTÁS / PAJZS FEL";
                } else if (y < -3.0) {
                    currentGesture = "GUGGOLÁSBÓL FELUGRÁS!";
                } else if (z > 2.0 || x > 2.0) {
                    currentGesture = "ÁTUGROS FUTÁSBÓL";
                }
            } else if (mag > 2.5) {
                if (Math.abs(x) > 2.5 && Math.abs(z) > 1.0) {
                    currentGesture = "FUTÁS KITÉRÉSSEL (SZLALOM)";
                } else if (y > 1.5) {
                    currentGesture = "LEBUGGOLÁS (FEDEZÉK)";
                } else {
                    currentGesture = "FUTÁS HELYBEN";
                }
            } else if (mag > 1.2) {
                if (y < -1.8) {
                    currentGesture = "MAGAS TÉRD (LÉPCSŐZÉS)";
                } else if (Math.abs(y) > 1.5 && Math.abs(x) < 0.4) {
                    currentGesture = "TÖRZSFORDULÁS (KAMERA)";
                } else if (z > 1.5) {
                    currentGesture = "KAR KINYÚJTÁSA (LÖKÉS)";
                } else if (Math.abs(z) > 1.2) {
                    currentGesture = "TERPESZBE ÁLLÁS";
                } else {
                    currentGesture = "SÉTA HELYBEN";
                }
            } else if (mag > 0.6) {
                if (y > 0.5 && Math.abs(x) < 0.3) {
                    currentGesture = "LOPAKODÁS (VÁDLIEMELÉS)";
                } else {
                    currentGesture = "FINOM MOZGÁS";
                }
            }

            // 4. IDŐALAPÚ ZÁR MECHANIZMUS (Ettől nem fog ugrálni a kijelző!)
            // Ha a mozgás "fontosabb" akció (ugrás, hárítás, guggolás), zároljuk a kijelzőt LOCK_DELAY időre
            const isAction = ["HÁRÍTÁS / PAJZS FEL", "GUGGOLÁSBÓL FELUGRÁS!", "ÁTUGROS FUTÁSBÓL", "LEBUGGOLÁS (FEDEZÉK)", "FUTÁS KITÉRÉSSEL (SZLALOM)"].includes(currentGesture);

            if (now > gestureLockTime) {
                lastGesture = currentGesture;
                if (isAction) {
                    gestureLockTime = now + LOCK_DELAY; // Zárolás 400 ms-re
                }
            }

            // Felület frissítése a stabilizált állapottal
            liveGestureDiv.textContent = lastGesture;
            debugValsDiv.textContent = `SMOOTHED -> Mag: ${mag.toFixed(2)} | X: ${x.toFixed(1)} | Y: ${y.toFixed(1)} | Z: ${z.toFixed(1)}`;
        }
<!-- === 2. RÉSZ VÉGE === -->

<!-- === 3. RÉSZ KEZDETE: SZENZOROK AKTIVÁLÁSA ÉS LEZÁRÁS v2.3.0 === -->
        // iOS 13+ engedélykérő ablak kezelése
        async function requestPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                const response = await DeviceMotionEvent.requestPermission();
                return response === 'granted';
            }
            return true; // Android vagy régebbi rendszerek
        }

        // A motor indítása a gombnyomásra
        startBtn.addEventListener('click', async () => {
            const hasPermission = await requestPermission();
            if (!hasPermission) {
                alert("Szenzor hozzáférés megtagadva!");
                return;
            }

            // Képernyőzár és fekvő mód kényszerítése
            try {
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                }
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch(e) { 
                console.log("Képernyőzár rögzítése nem támogatott."); 
            }

            startBtn.style.display = 'none';
            isRecording = true;

            // Élő szenzorfigyelés elindítása
            window.addEventListener('devicemotion', handleMotion);
            
            liveGestureDiv.textContent = "MOTOR AKTÍV!";
            speak("A stabilizált mozgásfelismerő motor elindult. Tartsd a telefont két kézzel!");
        });

        // A nyers adatok fogadása másodpercenként 60-szor
        function handleMotion(event) {
            if (!isRecording) return;

            const acc = event.acceleration || event.accelerationIncludingGravity;
            if (!acc || acc.x === null) return;

            const x = acc.x;
            const y = acc.y;
            const z = acc.z;
            
            // Abszolút elmozdulás ereje (vektorhossz)
            const magnitude = Math.sqrt(x*x + y*y + z*z);

            // Adatok átadása az időablakos adatsimító funkciónak
            processMovement(x, y, z, magnitude);
        }
    </script>
</body>
</html>
<!-- === 3. RÉSZ VÉGE === -->
