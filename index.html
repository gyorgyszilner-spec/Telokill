<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Motion Controller</title>
<style>
  body { margin:0; background:#111; color:#0f0; font-family:monospace; }
  #state {
    margin-top:40vh;
    text-align:center;
    font-size:32px;
  }
  #calibBtn {
    position:fixed;
    top:5px;
    right:5px;
    padding:6px 10px;
    font-size:14px;
    background:#333;
    color:#0f0;
    border:1px solid #0f0;
    cursor:pointer;
  }
</style>
</head>
<body>

<div id="state">Nyomd meg a CALIBRATE gombot.</div>
<button id="calibBtn">CALIBRATE</button>

<script>
let stateDiv = document.getElementById("state");
let calibBtn = document.getElementById("calibBtn");

// raw sensor
let pitch = 0;
let accelZ = 0;

// baseline + noise
let baseline = { pitch:0, accelZ:0 };
let noise = { pitch:0, accelZ:0 };

let calibrated = false;
let calibrating = false;
let calibSamples = [];

// step detection
let zHistory = [];

// --- SENSOR INPUT ---
window.addEventListener("deviceorientation", (e) => {
  pitch = e.beta || 0;
});

window.addEventListener("devicemotion", (e) => {
  const a = e.accelerationIncludingGravity;
  if (!a) return;
  accelZ = a.z || 0;

  if (calibrating) {
    calibSamples.push({ pitch, accelZ });
  }

  zHistory.push(accelZ);
  if (zHistory.length > 50) zHistory.shift();
});

// --- CALIBRATION ---
function startCalibration() {
  calibrating = true;
  calibrated = false;
  calibSamples = [];
  stateDiv.innerText = "Kalibráció folyamatban…";
  setTimeout(finishCalibration, 5000);
}

function finishCalibration() {
  calibrating = false;

  if (calibSamples.length < 10) {
    stateDiv.innerText = "Kalibráció sikertelen.";
    return;
  }

  // átlag
  let sumPitch = 0, sumZ = 0;
  calibSamples.forEach(s => {
    sumPitch += s.pitch;
    sumZ += s.accelZ;
  });
  baseline.pitch = sumPitch / calibSamples.length;
  baseline.accelZ = sumZ / calibSamples.length;

  // szórás
  let varPitch = 0, varZ = 0;
  calibSamples.forEach(s => {
    varPitch += Math.pow(s.pitch - baseline.pitch, 2);
    varZ += Math.pow(s.accelZ - baseline.accelZ, 2);
  });
  noise.pitch = Math.sqrt(varPitch / calibSamples.length);
  noise.accelZ = Math.sqrt(varZ / calibSamples.length);

  calibrated = true;
  stateDiv.innerText = "alapállapot";
}

// --- MOTION DETECTION ---
function detectState() {
  if (!calibrated || calibrating) return;

  // --- GUGGOLÁS ---
  if (pitch > baseline.pitch + (noise.pitch + 15)) {
    stateDiv.innerText = "leguggol";
    return;
  }

  // --- UGRÁS ---
  const zDelta = accelZ - baseline.accelZ;
  if (Math.abs(zDelta) > noise.accelZ * 4) {
    stateDiv.innerText = "ugrás";
    return;
  }

  // --- SÉTA / FUTÁS ---
  let peaks = 0;
  for (let i = 1; i < zHistory.length - 1; i++) {
    const z0 = zHistory[i-1], z1 = zHistory[i], z2 = zHistory[i+1];
    if (z1 > z0 && z1 > z2 && (z1 - baseline.accelZ) > (noise.accelZ * 1.5)) {
      peaks++;
    }
  }
  const freq = peaks / 1.0;

  if (freq > 1 && freq < 2) {
    stateDiv.innerText = "sétál";
    return;
  }

  if (freq >= 2 && freq < 3.5) {
    stateDiv.innerText = "fut";
    return;
  }

  // --- ALAPÁLLAPOT ---
  stateDiv.innerText = "alapállapot";
}

// --- LOOP ---
function loop() {
  detectState();
  requestAnimationFrame(loop);
}

calibBtn.addEventListener("click", startCalibration);
loop();
</script>

</body>
</html>
