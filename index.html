<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fal-Kép Motor v5.1</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}

.keret {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
}

#allapot {
    font-size: 34px;
    font-weight: bold;
    color: #00ffcc;
}

#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    width: 90%;
    max-width: 420px;
}

#verzio {
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="keret">

    <button id="inditas">Falhoz kalibrálás</button>

    <div id="verzio">v5.1.0</div>

    <div id="allapot">VÁRAKOZÁS</div>

    <div id="panel">NYOMD A FALHOZ</div>

</div>

<script>

/* =========================
   VERZIÓ
========================= */
const VERZIÓ = "v5.1.0";

/* =========================
   SZENZOR
========================= */
let fut = false;

let gx = 0, gy = 0, gz = 0;
let rgx = 0, rgy = 0, rgz = 0;

/* =========================
   ÁLLAPOT
========================= */
let allapot = "ALAP";

/* =========================
   UI
========================= */
const allapotEl = document.getElementById("allapot");
const panel = document.getElementById("panel");
const inditas = document.getElementById("inditas");

/* =========================
   ENGEDÉLY
========================= */
async function engedely() {

    try {
        if (DeviceMotionEvent?.requestPermission) {
            const r = await DeviceMotionEvent.requestPermission();
            if (r !== "granted") return false;
        }
        return true;
    } catch {
        return false;
    }
}

/* =========================
   INDÍTÁS
========================= */
inditas.onclick = async () => {

    const ok = await engedely();
    if (!ok) {
        allapotEl.textContent = "NINCS ENGEDÉLY";
        return;
    }

    allapotEl.textContent = "NYOMD A FALHOZ";

    window.addEventListener("devicemotion", szenzor);

    setTimeout(() => {

        rgx = gx;
        rgy = gy;
        rgz = gz;

        fut = true;
        allapotEl.textContent = "FUT";

    }, 1000);
};

/* =========================
   SZENZOR
========================= */
function szenzor(e) {

    const a = e.accelerationIncludingGravity || {x:0,y:0,z:0};

    gx = a.x;
    gy = a.y;
    gz = a.z;

    if (!fut) return;

    feldolgoz();
}

/* =========================
   DEADZONE + ÁTFEDÉS
========================= */
function deadzone(v, h) {
    return Math.abs(v) < h ? 0 : v;
}

/* =========================
   FŐ LOGIKA (HISZTERÉZIS)
========================= */
function feldolgoz() {

    const dx = gx - rgx;
    const dy = gy - rgy;
    const dz = gz - rgz;

    // 🟩 NAGYOBB SAFE ZÓNA
    const SAFE = 1.6;

    const x = deadzone(dx, SAFE);
    const y = deadzone(dy, SAFE);
    const z = deadzone(dz, SAFE);

    // 🟡 DÖNTÉS
    let dontes = Math.atan2(x, y) * 180 / Math.PI;

    // 🔁 ÁLLAPOT GÉP HISZTERÉZISSEL
    let ujAllapot = allapot;

    // 🔴 GUGGOLÁS (MOST FELCSERÉLVE EMELÉSSEL)
    const GUGG_BE = 4.0;
    const GUGG_KI = 2.5;

    // 🔵 EMELÉS (régi guggolás helyén)
    const EMEL_BE = -4.0;
    const EMEL_KI = -2.5;

    // --- GUGGOLÁS ---
    if (allapot !== "GUGGOLÁS" && z < EMEL_BE) {
        ujAllapot = "GUGGOLÁS";
    }
    if (allapot === "GUGGOLÁS" && z > EMEL_KI) {
        ujAllapot = "ALAP";
    }

    // --- EMELÉS ---
    if (allapot !== "EMELÉS" && z > GUGG_BE) {
        ujAllapot = "EMELÉS";
    }
    if (allapot === "EMELÉS" && z < GUGG_KI) {
        ujAllapot = "ALAP";
    }

    // --- DÖNTÉS csak ha ALAP ---
    if (ujAllapot === "ALAP" && Math.abs(dontes) > 14) {
        ujAllapot = "DÖNTÉS";
    }

    allapot = ujAllapot;

    // --- UI ---
    allapotEl.textContent = allapot;

    panel.textContent =
        "VERZIÓ: " + VERZIÓ + "\n\n" +
        "DÖNTÉS (°): " + dontes.toFixed(2) + "\n" +
        "Z: " + z.toFixed(2) + "\n\n" +
        "ÁLLAPOT: " + allapot;
}

</script>

</body>
</html>
