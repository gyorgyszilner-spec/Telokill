<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fal-Kép Motor v7.3.2</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}

.keret {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
}

#allapot {
    font-size: 34px;
    font-weight: bold;
    color: #00ffcc;
}

#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    width: 92%;
    max-width: 440px;
}

#verzio { opacity: 0.7; }
</style>
</head>

<body>

<div class="keret">
    <button id="inditas">Falhoz kalibrálás</button>
    <div id="verzio">v7.3.2</div>
    <div id="allapot">VÁRAKOZÁS</div>
    <div id="panel">NYOMD A FALHOZ</div>
</div>

<script>
const VERZIÓ = "v7.3.2";
let fut = false;

// Nyers és szűrt adatok (V7.2)
let ax = 0, ay = 0, az = 0;
let rax = 0, ray = 0, raz = 0;

// Állapotok (V7.2)
let dontes = "SEMMI";
let fuggoleges = "SEMMI";

/* =========================================================================
   SEBESSÉG ALAPÚ MOZGÁS VÁLTOZÓI
   ========================================================================= */
let utolsoLepesIdo = 0;
let lepesIdokozok = [];
let utolsoGyorsulasZ = 0;
let utolsoMozgasIdo = 0;
let aktualisSebessegSzazalek = 0; 
let mozgásZárolva = false;
let utolsoSzog = 0;

// Szenzor engedélyezés (V7.2)
async function engedely() {
    try {
        if (typeof DeviceMotionEvent !== 'undefined' && DeviceMotionEvent.requestPermission) {
            const r = await DeviceMotionEvent.requestPermission();
            return r === "granted";
        }
        return true;
    } catch {
        return false;
    }
}

// Indítás és Kalibráció (V7.2)
document.getElementById("inditas").onclick = async () => {
    const ok = await engedely();
    if (!ok) {
        alert("Szenzor hozzáférés megtagadva!");
        return;
    }

    document.getElementById("allapot").textContent = "KALIBRÁLÁS...";
    window.addEventListener("devicemotion", szenzor);

    setTimeout(() => {
        rax = ax;
        ray = ay;
        raz = az;
        fut = true;
        document.getElementById("allapot").textContent = "ALAP";
    }, 1500);
};

function szenzor(e) {
    const a = e.accelerationIncludingGravity || {x:0, y:0, z:0};
    
    ax = ax * 0.7 + a.x * 0.3;
    ay = ay * 0.7 + a.y * 0.3;
    az = az * 0.7 + a.z * 0.3;

    if (fut) feldolgoz();
}

/* =========================================================================
   VALÓDI HOLTTÉR ÉS HISZTERÉZIS ÁLLAPONGÉP (V7.2)
   ========================================================================= */
function vizsgalAllapot(ertek, jelenlegiState, negNev, posNev, beKuszob, kiKuszob) {
    if (jelenlegiState === "SEMMI") {
        if (ertek > beKuszob) return posNev;
        if (ertek < -beKuszob) return negNev;
        return "SEMMI";
    }
    if (jelenlegiState === posNev) {
        if (ertek < kiKuszob) return "SEMMI";
        return posNev;
    }
    if (jelenlegiState === negNev) {
        if (ertek > -kiKuszob) return "SEMMI";
        return negNev;
    }
    return "SEMMI";
}

/* =========================================================================
   ULTRA-ÉRZÉKENY KETTŐS LÉPÉSDETEKTOR
   ========================================================================= */
function detectLepes(jelenlegiDz, szogValtozas) {
    const most = performance.now();
    
    // 🔥 KÜSZÖBÖK RADIKÁLISAN LEENGEDVE:
    // Függőleges rázkódás: 0.8 helyett 0.4 m/s²
    // Szögsebesség tüske: 1.9 helyett 0.7 fok / mintavétel
    const vanFüggőlegesRázkódás = Math.abs(jelenlegiDz) > 0.4 && Math.abs(utolsoGyorsulasZ) <= 0.4;
    const vanDőléshullámTüske = Math.abs(szogValtozas) > 0.7;

    if (vanFüggőlegesRázkódás || vanDőléshullámTüske) {
        // Időbeli de-bounce minimálisra véve (140ms), hogy a sűrű rezgést is elkapja
        if (most - utolsoLepesIdo > 140) {
            const idokoz = most - utolsoLepesIdo;
            utolsoLepesIdo = most;
            utolsoMozgasIdo = most;

            lepesIdokozok.push(idokoz);
            if (lepesIdokozok.length > 3) lepesIdokozok.shift();
        }
    }
    utolsoGyorsulasZ = jelenlegiDz;
}

function feldolgoz() {
    const most = performance.now();

    // Dőlésszög számítása
    const aktualisSzog = Math.atan2(ax, ay) * 180 / Math.PI;
    const kalibraltSzog = Math.atan2(rax, ray) * 180 / Math.PI;
    
    let dolesElteres = aktualisSzog - kalibraltSzog;
    if (dolesElteres > 180) dolesElteres -= 360;
    if (dolesElteres < -180) dolesElteres += 360;

    let szogValtozas = aktualisSzog - utolsoSzog;
    if (szogValtozas > 180) szogValtozas -= 360;
    if (szogValtozas < -180) szogValtozas += 360;
    utolsoSzog = aktualisSzog;

    const dz = az - raz;

    // Lépések gyűjtése
    detectLepes(dz, szogValtozas);

    /* =========================================================================
       SEBESSÉGSZÁMÍTÁS
       ========================================================================= */
    let nyersSebesseg = 0;

    // Megnövelt időtúllépés ablak (1200ms), hogy a ritkább lépéseket se dobja el azonnal
    if (most - utolsoMozgasIdo < 1200 && lepesIdokozok.length >= 2) {
        const atlagIdokoz = lepesIdokozok.reduce((a, b) => a + b, 0) / lepesIdokozok.length;
        
        nyersSebesseg = Math.round(100 - ((atlagIdokoz - 200) / (850 - 200)) * 90);
        nyersSebesseg = Math.max(10, Math.min(100, nyersSebesseg)); 
    } else {
        lepesIdokozok = [];
        nyersSebesseg = 0; 
    }

    // Finom átmenet a kijelzőn
    aktualisSebessegSzazalek = Math.round(aktualisSebessegSzazalek * 0.8 + nyersSebesseg * 0.2);

    /* =========================================================================
       ZÁROLÁSI LOGIKA (RETESZ)
       ========================================================================= */
    if (mozgásZárolva) {
        if (nyersSebesseg === 0) {
            mozgásZárolva = false; 
        }
    }

    // 2. STATIKUS ÁLLAPOTOK (V7.2)
    if (!mozgásZárolva) {
        dontes = vizsgalAllapot(dolesElteres, dontes, "JOBB", "BAL", 22, 10);
        fuggoleges = vizsgalAllapot(dz, fuggoleges, "EMELÉS", "GUGGOLÁS", 3.2, 1.0);

        if (dontes === "SEMMI" && fuggoleges === "SEMMI" && nyersSebesseg > 0) {
            mozgásZárolva = true;
        }
    }

    // 3. MEGJELENÍTÉS ÉS HIERARCHIA
    let kijelzendoAllapot = "ALAP";
    
    if (mozgásZárolva) {
        kijelzendoAllapot = "MOZGÁS: " + aktualisSebessegSzazalek + "%";
    } else if (fuggoleges !== "SEMMI") {
        kijelzendoAllapot = fuggoleges;
    } else if (dontes !== "SEMMI") {
        kijelzendoAllapot = "DÖNTÉS " + dontes;
    }

    document.getElementById("allapot").textContent = kijelzendoAllapot;

    // Debug panel a nyers értékek ellenőrzéséhez
    document.getElementById("panel").textContent =
        "VERZIÓ: " + VERZIÓ + "\n\n" +
        "DÖNTÉS STÁTUSZ: " + dontes + "\n" +
        "FÜGGŐLEGES STÁTUSZ: " + fuggoleges + "\n" +
        "DINAMIKUS SEBESSÉG: " + aktualisSebessegSzazalek + "%\n" +
        "NYERS SEBESSÉG:     " + nyersSebesseg + "%\n" +
        "ZÁROLVA (RETESZ):   " + mozgásZárolva + "\n" +
        "PUFFER:             " + lepesIdokozok.length + " db\n\n" +
        "SZÖG SEBESSÉG:      " + szogValtozas.toFixed(2) + "°\n" +
        "DZ (gyorsulás):     " + dz.toFixed(2) + " m/s²";
}
</script>

</body>
</html>
