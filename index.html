<!-- === 1. RÉSZ KEZDETE: CONTROLLER INTERFACE ÉS CSS v2.2.0 === -->
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heatwave Kétkezes Mozgásmotor</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #111; 
            color: #fff; 
            padding: 0; 
            margin: 0; 
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .container { 
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            padding: 20px;
        }
        .version-tag { 
            color: #00ffcc; 
            font-weight: bold; 
            font-size: 14px; 
            position: absolute;
            top: 15px;
            letter-spacing: 1px; 
        }
        #startBtn { 
            background: #ff5722; 
            color: white; 
            border: none; 
            padding: 20px 40px; 
            font-size: 24px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            z-index: 10;
        }
        #live-gesture { 
            font-size: 32px; 
            font-weight: bold; 
            margin: 15px 0; 
            color: #ffeb3b; 
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 235, 59, 0.4);
        }
        #debug-vals { 
            font-size: 14px; 
            font-family: monospace;
            color: #888; 
            margin-top: 10px;
        }
        /* Kontroller gombok körvonalai a hüvelykujjaknak */
        .ctrl-btn {
            position: absolute;
            width: 95px;
            height: 95px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.03);
            pointer-events: auto;
        }
        #leftBtn { left: 45px; }
        #rightBtn { right: 45px; }
        .ctrl-btn.active {
            border-color: #00ffcc;
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.15);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- PONTOS v2.2.0 VERZIÓSZÁM -->
        <div class="version-tag">VERZIÓ: v2.2.0 - CORE RECOGNIZER ENGINE</div>
        
        <button id="startBtn">▶ MOTOR INDÍTÁSA</button>

        <div id="live-gesture">KÉSZEN ÁLL</div>
        
        <div id="debug-vals">Mag: 0.00 | X: 0.00 | Y: 0.00 | Z: 0.00</div>

        <div id="leftBtn" class="ctrl-btn">BAL</div>
        <div id="rightBtn" class="ctrl-btn">JOBB</div>
    </div>
<!-- === 1. RÉSZ VÉGE === -->

<!-- === 2. RÉSZ KEZDETE: SAJÁT ADATOKRA HANGOLT DÖNTÉSI MÁTRIX === -->
    <script>
        let isRecording = false;

        // HTML elemek referenciái
        const startBtn = document.getElementById('startBtn');
        const liveGestureDiv = document.getElementById('live-gesture');
        const debugValsDiv = document.getElementById('debug-vals');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        // Érintések kezelése a két körvonal kontroller gombhoz
        leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); leftBtn.classList.add('active'); });
        leftBtn.addEventListener('touchend', () => { leftBtn.classList.remove('active'); });
        rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); rightBtn.classList.add('active'); });
        rightBtn.addEventListener('touchend', () => { rightBtn.classList.remove('active'); });

        // Tiszta hangvezérlés a kontroller visszajelzéshez
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                setTimeout(() => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'hu-HU';
                    utterance.rate = 1.0;
                    window.speechSynthesis.speak(utterance);
                }, 50);
            }
        }

        // --- A TE SAJÁT SZÁMAID ALAPJÁN BEÁLLÍTOTT KÜSZÖBÉRTÉKEK (Thresholds) ---
        function processMovement(x, y, z, mag) {
            let gesture = "MOZDULATLAN";

            // 1. HARDCORE ROBBANÁSOK ÉS ENERGIKUS HIIT AKCIÓK (mag > 5.0)
            if (mag > 5.0) {
                if (x < -4.0 && z < -1.0) {
                    gesture = "HÁRÍTÁS / PAJZS FEL";
                } else if (y < -4.5) {
                    gesture = "GUGGOLÁSBÓL FELUGRÁS!";
                } else if (z > 3.0 || x > 3.0) {
                    gesture = "ÁTUGROS FUTÁSBÓL";
                }
            } 
            // 2. INTENZÍV HIIT ELEMEK: Sprint vagy Szlalom (mag > 3.0)
            else if (mag > 3.0) {
                if (Math.abs(x) > 3.5 && Math.abs(z) > 1.5) {
                    gesture = "FUTÁS KITÉRÉSSEL (SZLALOM)";
                } else if (y > 2.0) {
                    gesture = "LEBUGGOLÁS (FEDEZÉK)";
                } else {
                    gesture = "FUTÁS HELYBEN";
                }
            } 
            // 3. KÖZEPES MOZGÁSOK ÉS AKCIÓ-TRIGGEREK (mag > 1.5)
            else if (mag > 1.5) {
                if (y < -2.5) {
                    gesture = "MAGAS TÉRD (LÉPCSŐZÉS)";
                } else if (Math.abs(y) > 2.0 && Math.abs(x) < 0.5) {
                    gesture = "TÖRZSFORDULÁS (KAMERA)";
                } else if (z > 2.0) {
                    gesture = "KAR KINYÚJTÁSA (LÖKÉS)";
                } else if (Math.abs(z) > 1.8) {
                    gesture = "TERPESZBE ÁLLÁS";
                } else {
                    gesture = "SÉTA HELYBEN";
                }
            } 
            // 4. FINOM RETRO MOZGÁSOK (mag > 0.7)
            else if (mag > 0.7) {
                if (y > 0.8 && Math.abs(x) < 0.5) {
                    gesture = "LOPAKODÁS (VÁDLIEMELÉS)";
                } else {
                    gesture = "FINOM MOZGÁS";
                }
            }

            // Élő kijelzés frissítése a kontroller képernyőjén
            liveGestureDiv.textContent = gesture;
            debugValsDiv.textContent = `Mag: ${mag.toFixed(2)} | X: ${x.toFixed(1)} | Y: ${y.toFixed(1)} | Z: ${z.toFixed(1)}`;
        }
<!-- === 2. RÉSZ VÉGE === -->

<!-- === 3. RÉSZ KEZDETE: SZENZOROK AKTIVÁLÁSA ÉS LEZÁRÁS v2.2.0 === -->
        // iOS 13+ engedélykérő ablak kezelése
        async function requestPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                const response = await DeviceMotionEvent.requestPermission();
                return response === 'granted';
            }
            return true; // Android vagy régebbi rendszerek
        }

        // A motor indítása a gombnyomásra
        startBtn.addEventListener('click', async () => {
            const hasPermission = await requestPermission();
            if (!hasPermission) {
                alert("Szenzor hozzáférés megtagadva!");
                return;
            }

            // Képernyőzár és fekvő mód kényszerítése (Kontroller tartáshoz)
            try {
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                }
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch(e) { 
                console.log("Képernyőzár rögzítése nem támogatott."); 
            }

            startBtn.style.display = 'none';
            isRecording = true;

            // Élő szenzorfigyelés elindítása
            window.addEventListener('devicemotion', handleMotion);
            
            liveGestureDiv.textContent = "MOTOR AKTÍV!";
            speak("A mozgásfelismerő motor elindult. Tartsd a telefont két kézzel!");
        });

        // A nyers adatok fogadása másodpercenként 60-szor
        function handleMotion(event) {
            if (!isRecording) return;

            // Gyorsulás gravitáció nélkül (ha elérhető), különben gravitációval együtt
            const acc = event.acceleration || event.accelerationIncludingGravity;
            if (!acc || acc.x === null) return;

            const x = acc.x;
            const y = acc.y;
            const z = acc.z;
            
            // Abszolút elmozdulás ereje (vektorhossz), függetlenül a dőlésszögtől
            const magnitude = Math.sqrt(x*x + y*y + z*z);

            // Adatok átadása a te saját számaiddal kalibrált felismerő funkciónak
            processMovement(x, y, z, magnitude);
        }
    </script>
</body>
</html>
<!-- === 3. RÉSZ VÉGE === -->
