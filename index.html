<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vertical Motion Controller</title>
<style>
  body { margin:0; overflow:hidden; background:#222; }

  #ground {
    position:absolute;
    bottom:0;
    left:0;
    width:100vw;
    height:40vh;
    background:#444;
  }

  #player {
    position:absolute;
    width:50px;
    height:50px;
    background:#0f0;
    left:50vw;
    transform:translateX(-50%);
  }

  #hud {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#0007;
    color:#0f0;
    font-family:monospace;
    padding:5px 10px;
    font-size:12px;
    pointer-events:none;
  }

  #calibBtn {
    position:fixed;
    top:5px;
    right:5px;
    z-index:10;
    padding:6px 10px;
    font-size:12px;
    font-family:monospace;
    background:#333;
    color:#0f0;
    border:1px solid #0f0;
    cursor:pointer;
  }
</style>
</head>
<body>

<div id="ground"></div>
<div id="player"></div>
<div id="hud">Nyomd meg a CALIBRATE gombot.</div>
<button id="calibBtn">CALIBRATE</button>

<script>
let player = document.getElementById("player");
let hud = document.getElementById("hud");
let calibBtn = document.getElementById("calibBtn");

// pozíciók
let groundY = window.innerHeight * 0.6;
let posY = groundY;

// szenzorok
let pitch = 0, roll = 0, yaw = 0;
let accelZ = 0;

// baseline + noise
let baseline = { pitch:0, accelZ:0 };
let noise = { pitch:0, accelZ:0 };

let calibrated = false;
let calibrating = false;
let calibSamples = [];

// járás/futás detektálás
let zHistory = [];

// --- SENSOR INPUT ---
window.addEventListener("deviceorientation", (e) => {
  pitch = e.beta || 0;
});

window.addEventListener("devicemotion", (e) => {
  const a = e.accelerationIncludingGravity;
  if (!a) return;
  accelZ = a.z || 0;

  if (calibrating) {
    calibSamples.push({ pitch, accelZ });
  }

  zHistory.push(accelZ);
  if (zHistory.length > 50) zHistory.shift();
});

// --- CALIBRATION ---
function startCalibration() {
  calibSamples = [];
  calibrating = true;
  calibrated = false;
  hud.innerText = "Kalibráció: tartsd stabilan (5 mp)…";
  setTimeout(finishCalibration, 5000);
}

function finishCalibration() {
  calibrating = false;

  if (calibSamples.length < 10) {
    hud.innerText = "Kalibráció sikertelen.";
    return;
  }

  // átlag
  let sumPitch = 0, sumZ = 0;
  calibSamples.forEach(s => {
    sumPitch += s.pitch;
    sumZ += s.accelZ;
  });
  baseline.pitch = sumPitch / calibSamples.length;
  baseline.accelZ = sumZ / calibSamples.length;

  // szórás
  let varPitch = 0, varZ = 0;
  calibSamples.forEach(s => {
    varPitch += Math.pow(s.pitch - baseline.pitch, 2);
    varZ += Math.pow(s.accelZ - baseline.accelZ, 2);
  });
  noise.pitch = Math.sqrt(varPitch / calibSamples.length);
  noise.accelZ = Math.sqrt(varZ / calibSamples.length);

  calibrated = true;
  posY = groundY; // középre ugrás
  player.style.top = posY + "px";

  hud.innerText = "Kalibrálva.";
}

// --- MOTION DETECTION ---
function detectMotion() {
  if (!calibrated || calibrating) return;

  // --- GUGGOLÁS ---
  const crouch = pitch > baseline.pitch + (noise.pitch + 15);

  if (crouch) {
    posY = groundY + 40; // lesüllyed
    return;
  }

  // --- UGRÁS ---
  const zDelta = accelZ - baseline.accelZ;
  if (Math.abs(zDelta) > noise.accelZ * 4) {
    posY = groundY - 50; // felugrik
    return;
  }

  // --- JÁRÁS / FUTÁS ---
  let peaks = 0;
  for (let i = 1; i < zHistory.length - 1; i++) {
    const z0 = zHistory[i-1], z1 = zHistory[i], z2 = zHistory[i+1];
    if (z1 > z0 && z1 > z2 && (z1 - baseline.accelZ) > (noise.accelZ * 1.5)) {
      peaks++;
    }
  }
  const freq = peaks / 1.0;

  if (freq > 1 && freq < 2) {
    posY = groundY - 20; // járás ritmus
  } else if (freq >= 2 && freq < 3.5) {
    posY = groundY - 35; // futás ritmus
  } else {
    posY = groundY; // alapállapot
  }
}

// --- GAME LOOP ---
function loop() {
  detectMotion();

  player.style.top = posY + "px";

  hud.innerText =
    "pitch:" + pitch.toFixed(1) +
    " | accelZ:" + accelZ.toFixed(2);

  requestAnimationFrame(loop);
}

calibBtn.addEventListener("click", startCalibration);
loop();
</script>

</body>
</html>
