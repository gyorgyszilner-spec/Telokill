<!-- === 1. RÉSZ KEZDETE: CONTROLLER INTERFACE ÉS CSS v2.1.0 === -->
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heatwave Kétkezes Kalibráció</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #111; 
            color: #fff; 
            padding: 0; 
            margin: 0; 
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .container { 
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            padding: 20px;
        }
        .version-tag { 
            color: #ff9800; 
            font-weight: bold; 
            font-size: 14px; 
            position: absolute;
            top: 15px;
            letter-spacing: 1px; 
        }
        #startBtn { 
            background: #ff5722; 
            color: white; 
            border: none; 
            padding: 20px 40px; 
            font-size: 24px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            z-index: 10;
        }
        #instruction { 
            font-size: 26px; 
            font-weight: bold; 
            margin: 15px 0; 
            color: #ffeb3b; 
            max-width: 50%;
            text-align: center;
        }
        #timer { 
            font-size: 72px; 
            font-weight: bold; 
            color: #e91e63; 
            margin: 10px 0; 
        }
        #status { 
            font-size: 16px; 
            color: #aaa; 
            position: absolute;
            bottom: 15px;
        }
        .progress-bar { 
            background: #333; 
            height: 8px; 
            border-radius: 4px; 
            width: 40%; 
            margin-top: 10px; 
            overflow: hidden; 
        }
        #progress { 
            background: #4caf50; 
            height: 100%; 
            width: 0%; 
            transition: width 0.3s; 
        }

        /* VIRTUÁLIS KONTROLLER GOMBOK (Áttetsző körvonalak) */
        .ctrl-btn {
            position: absolute;
            width: 90px;
            height: 90px;
            border: 4px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.1s ease;
        }
        /* Bal gomb elhelyezése */
        #leftBtn { left: 40px; }
        /* Jobb gomb elhelyezése */
        #rightBtn { right: 40px; }

        /* Aktív (megnyomott) állapot vizuális visszajelzése */
        .ctrl-btn.active {
            border-color: #00ffcc;
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="version-tag">VERZIÓ: v2.1.0 - TWIN BUTTON CONTROLLER</div>
        
        <button id="startBtn">▶ TESZT INDÍTÁSA</button>

        <div id="instruction">Tartsd a telefont két kézzel magad előtt!</div>
        <div id="timer">--</div>

        <div class="progress-bar">
            <div id="progress"></div>
        </div>

        <div id="status">Állapot: Várakozás</div>

        <!-- A KÉT KÖRVONALÚ GOMB A HÜVELYKUJJAKNAK -->
        <div id="leftBtn" class="ctrl-btn">BAL</div>
        <div id="rightBtn" class="ctrl-btn">JOBB</div>
    </div>
<!-- === 1. RÉSZ VÉGE === -->

<!-- === 2. RÉSZ KEZDETE: GYAKORLATOK ÉS GOMBKEZELŐ LOGIKA === -->
    <script>
        // A kétkezes fogáshoz igazított új mozgásformák listája
        const exercises = [
            { id: "Seta_helyben", name: "Séta helyben (Kényelmesen)" },
            { id: "Futas_helyben", name: "Futás helyben (Tempósan)" },
            { id: "Kilepes_oldalra", name: "Kilépés jobbra-balra" },
            { id: "Seta_magas_terd", name: "Séta helyben, magas térdemeléssel" },
            { id: "Futas_magas_terd", name: "Futás helyben, magas térdemeléssel" },
            { id: "Futas_kitereessel", name: "Futás kitéréssel jobbra-balra" },
            { id: "Guggolas", name: "Leguggolás és felállás" },
            { id: "Ugras_guggolasbol", name: "Ugrás leguggolásból" },
            { id: "Ugras_futasbol", name: "Ugrás futásból vagy sétából" },
            { id: "Terpeszbe_allis", name: "Terpeszbe állás és visszaállás" },
            { id: "Vadliemeles", name: "Lábujjhegyre állás és vissza" },
            { id: "Kez_felemelese", name: "Kéz felemelése maga elé" },
            { id: "Kez_leengedese", name: "Kéz leengedése" },
            { id: "Fordulas_jobbra", name: "Fordulás törzsből jobbra" },
            { id: "Fordulas_balra", name: "Fordulás törzsből balra" },
            { id: "Guggolas_ugras_kez", name: "Guggolásból felugrás kéz felemelésével" }
        ];

        let currentExerciseIndex = 0;
        let sensorLogs = [];
        let isRecording = false;
        let startTimestamp = 0;
        let exerciseTimer = null;
        let currentExerciseId = "Felkeszules";

        // HTML elemek referenciái
        const startBtn = document.getElementById('startBtn');
        const instructionDiv = document.getElementById('instruction');
        const timerDiv = document.getElementById('timer');
        const statusDiv = document.getElementById('status');
        const progressDiv = document.getElementById('progress');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        // GOMBOK ÉRINTÉS KEZELÉSE (Vizuális visszajelzés a hüvelykujjaknak)
        leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); leftBtn.classList.add('active'); });
        leftBtn.addEventListener('touchend', () => { leftBtn.classList.remove('active'); });
        rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); rightBtn.classList.add('active'); });
        rightBtn.addEventListener('touchend', () => { rightBtn.classList.remove('active'); });

        // Tiszta hangvezérlés
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                setTimeout(() => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'hu-HU';
                    utterance.rate = 1.0;
                    utterance.pitch = 1.0;
                    window.speechSynthesis.speak(utterance);
                }, 50);
            }
        }
<!-- === 2. RÉSZ VÉGE === -->

<!-- === 3. RÉSZ KEZDETE: SZENZOROK, IDŐZÍTŐ ÉS CSV MENTÉS === -->
        // iOS 13+ engedélykérő ablak kezelése
        async function requestPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                const response = await DeviceMotionEvent.requestPermission();
                return response === 'granted';
            }
            return true; // Android vagy régebbi rendszerek
        }

        startBtn.addEventListener('click', async () => {
            const hasPermission = await requestPermission();
            if (!hasPermission) {
                alert("Szenzor hozzáférés megtagadva!");
                return;
            }

            // Képernyőzár és fekvő mód kényszerítése
            try {
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                }
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch(e) { 
                console.log("Képernyőzár nem támogatott ezen az eszközön."); 
            }

            startBtn.style.display = 'none';
            sensorLogs = [];
            currentExerciseIndex = 0;
            startTimestamp = performance.now();
            isRecording = true;

            window.addEventListener('devicemotion', handleMotion);
            
            // 5 másodperces felkészülés a helyes fogás felvételére
            startCountdown(5, "Tartsd a telefont két kézzel magad előtt!", () => {
                runNextExercise();
            });
        });

        function startCountdown(seconds, message, onComplete) {
            currentExerciseId = "Felkeszules";
            instructionDiv.textContent = message;
            speak(message);
            
            let timeLeft = seconds;
            timerDiv.textContent = timeLeft;

            const interval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    onComplete();
                } else {
                    timerDiv.textContent = timeLeft;
                }
            }, 1000);
        }

        function runNextExercise() {
            if (currentExerciseIndex >= exercises.length) {
                finishCalibration();
                return;
            }

            const currentEx = exercises[currentExerciseIndex];
            currentExerciseId = currentEx.id;
            instructionDiv.textContent = currentEx.name;
            statusDiv.textContent = `Gyakorlat: ${currentExerciseIndex + 1} / ${exercises.length}`;
            progressDiv.style.width = `${((currentExerciseIndex + 1) / exercises.length) * 100}%`;
            
            speak(currentEx.name);

            let timeLeft = 10;
            timerDiv.textContent = timeLeft;

            exerciseTimer = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(exerciseTimer);
                    currentExerciseIndex++;
                    runNextExercise();
                } else {
                    timerDiv.textContent = timeLeft;
                    if (timeLeft <= 3) {
                        speak(timeLeft.toString()); // Utolsó 3 mp hangos visszaszámlálása
                    }
                }
            }, 1000);
        }

        function handleMotion(event) {
            if (!isRecording) return;

            const acc = event.acceleration || event.accelerationIncludingGravity;
            if (!acc || acc.x === null) return;

            const x = acc.x;
            const y = acc.y;
            const z = acc.z;
            const magnitude = Math.sqrt(x*x + y*y + z*z);
            const relTime = (performance.now() - startTimestamp).toFixed(0);

            sensorLogs.push({
                time: relTime,
                exercise: currentExerciseId,
                x: x.toFixed(4),
                y: y.toFixed(4),
                z: z.toFixed(4),
                mag: magnitude.toFixed(4)
            });
        }

        function finishCalibration() {
            isRecording = false;
            window.removeEventListener('devicemotion', handleMotion);
            
            instructionDiv.textContent = "Kalibráció Kész!";
            timerDiv.textContent = "✔";
            statusDiv.textContent = "Kattints a mentés gombra!";
            speak("Gratulálok, a kalibráció befejeződött. Mentsd el a fájlt!");

            startBtn.style.display = 'block';
            startBtn.style.background = '#4caf50';
            startBtn.textContent = "⬇ CSV FÁJL LETÖLTÉSE";
            
            startBtn.onclick = function() {
                downloadCSV();
            };
        }

        function downloadCSV() {
            if (sensorLogs.length === 0) return;

            let csvContent = "data:text/csv;charset=utf-8,Time_ms,Exercise_ID,Acc_X,Acc_Y,Acc_Z,Magnitude\n";
            
            sensorLogs.forEach(row => {
                csvContent += `${row.time},${row.exercise},${row.x},${row.y},${row.z},${row.mag}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `heatwave_kalibracio_${Date.now()}.csv`);
            document.body.appendChild(link);
            
            link.click();
            document.body.removeChild(link);
            
            statusDiv.textContent = "Fájl letöltve!";
        }
    </script>
</body>
</html>
<!-- === 3. RÉSZ VÉGE === -->
