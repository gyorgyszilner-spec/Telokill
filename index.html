<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fal-Kép Motor v7.6.1</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
}

.keret {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    width: 100vw;
    gap: 12px;
    z-index: 1;
}

#allapot {
    font-size: 34px;
    font-weight: bold;
    color: #00ffcc;
    text-align: center;
}

#panel {
    font-family: monospace;
    white-space: pre;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    width: 85%;
    max-width: 320px;
    font-size: 13px;
    z-index: 5;
}

#verzio { opacity: 0.7; }

#inditas {
    padding: 12px 24px;
    font-size: 16px;
    font-weight: bold;
    background: #222;
    border: 2px solid #00ffcc;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    z-index: 5;
}

/* KEREK HÜVELYKUIJJ GOMBOK A KÉT OLDALON */
.oldal-gomb {
    position: absolute;
    bottom: 15%;
    width: 85px;
    height: 85px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.07);
    border: 3px solid rgba(0, 255, 204, 0.4);
    color: rgba(200, 255, 240, 0.7);
    font-weight: bold;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    touch-action: none;
    transition: background 0.1s, border-color 0.1s;
}

#gomb-bal { left: 20px; }
#gomb-jobb { right: 20px; }

.oldal-gomb:active {
    background: rgba(0, 255, 204, 0.3);
    border-color: #00ffcc;
    color: #fff;
    box-shadow: 0 0 15px #00ffcc;
}
</style>
</head>

<body>

<!-- Érintőgombok a két szélen -->
<div class="oldal-gomb" id="gomb-bal">BAL</div>
<div class="oldal-gomb" id="gomb-jobb">JOBB</div>

<div class="keret">
    <button id="inditas">Falhoz kalibrálás</button>
    <div id="verzio">v7.6.1</div>
    <div id="allapot">VÁRAKOZÁS</div>
    <div id="panel">NYOMD A FALHOZ</div>
</div>

<!-- Ide van bekötve a külső JS motor fájl -->
<script src="motor.js"></script>

</body>
</html>
