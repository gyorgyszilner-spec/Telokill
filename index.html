<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motion Controller Prototype</title>
<style>
  body { margin:0; overflow:hidden; background:#222; }

  #ground {
    position:absolute;
    bottom:0;
    left:0;
    width:100vw;
    height:40vh;
    background:#444;
  }

  #player {
    position:absolute;
    width:50px;
    height:50px;
    background:#0f0;
    left:50vw;
    top:60vh;
    transform:translate(-50%, -50%);
  }

  #hud {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#0007;
    color:#0f0;
    font-family:monospace;
    padding:5px 10px;
    font-size:12px;
    pointer-events:none;
  }
</style>
</head>
<body>

<div id="ground"></div>
<div id="player"></div>
<div id="hud">Calibrating…</div>

<script>
let player = document.getElementById("player");
let hud = document.getElementById("hud");

let posX = window.innerWidth / 2;
let posY = window.innerHeight * 0.6;

// --- CONTROLLER STATE ---
let moveForward = 0;
let leanLeft = false;
let leanRight = false;
let jump = false;
let crouch = false;

// --- CALIBRATION ---
let neutralPitch = 0;
let neutralRoll = 0;
let calibrated = false;

// --- STEP DETECTION ---
let zHistory = [];
let lastAccelZ = 0;

// --- ORIENTATION ---
let pitch = 0;
let roll = 0;
let yaw = 0;

// --- CALIBRATE ---
function calibrate() {
    neutralPitch = pitch;
    neutralRoll = roll;
    calibrated = true;
    hud.innerText = "Ready";
}

// --- SENSOR INPUT ---
window.addEventListener("deviceorientation", (e) => {
    pitch = e.beta;
    roll = e.gamma;
    yaw = e.alpha;

    if (!calibrated) calibrate();
});

window.addEventListener("devicemotion", (e) => {
    const a = e.accelerationIncludingGravity;
    if (!a) return;

    const z = a.z;
    const dz = Math.abs(z - lastAccelZ);
    lastAccelZ = z;

    // Collect Z history for step frequency
    zHistory.push(z);
    if (zHistory.length > 30) zHistory.shift();
});

// --- MOTION RECOGNITION ---
function detectMotion() {
    if (!calibrated) return;

    // --- WALK/RUN DETECTION ---
    let peaks = 0;
    for (let i = 1; i < zHistory.length - 1; i++) {
        if (zHistory[i] > zHistory[i-1] && zHistory[i] > zHistory[i+1] && zHistory[i] > neutralPitch + 1.2) {
            peaks++;
        }
    }

    let freq = peaks / 1.0; // approx Hz

    if (freq > 1 && freq < 2) moveForward = 0.4;      // walk
    else if (freq >= 2 && freq < 3.5) moveForward = 1; // run
    else moveForward = 0;                              // stand

    // --- LEAN ---
    leanLeft = (roll < neutralRoll - 15);
    leanRight = (roll > neutralRoll + 15);

    // --- CROUCH ---
    crouch = (pitch > neutralPitch + 25);

    // --- JUMP ---
    if (Math.abs(lastAccelZ - neutralPitch) > 6) {
        jump = true;
    }
}

// --- GAME LOOP ---
function loop() {
    detectMotion();

    // Move forward only if walking/running
    posY -= moveForward * 3;

    // Lean left/right
    if (leanLeft) posX -= 3;
    if (leanRight) posX += 3;

    // Jump
    if (jump) {
        posY -= 40;
        jump = false;
    }

    // Gravity
    posY += 2;

    // Ground collision
    const groundLevel = window.innerHeight * 0.6;
    if (posY > groundLevel) posY = groundLevel;

    // Crouch
    player.style.height = crouch ? "25px" : "50px";

    // Clamp
    posX = Math.max(0, Math.min(window.innerWidth - 50, posX));

    // Render
    player.style.left = posX + "px";
    player.style.top = posY + "px";

    // HUD
    hud.innerText =
        "Forward: " + moveForward.toFixed(2) +
        " | LeanL: " + leanLeft +
        " | LeanR: " + leanRight +
        " | Crouch: " + crouch;

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
